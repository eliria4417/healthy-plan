","½ banana, sliced on top in the morning"],steps:["Night before: mix oats, yogurt, milk, honey and cinnamon in a small jar. Cover and refrigerate.","Morning: grab from fridge, slice banana on top, eat in 2 minutes, go lift.","This is the best pre-workout option if you prep Sunday — grab a jar every morning without thinking.","🏋️ Slow-release oat carbs + fast banana carbs + protein from yogurt = sustained energy through your whole lifting session.","The jar size is intentionally small — this is a pre-workout fuel, not breakfast. Eat your proper breakfast post-workout."]},{title:"Rice Cake with Banana & Almond Butter",category:"Snack",cal:160,protein:4,time:"1 min",airfryer:false,pcos:"good",bloat:"low",imperial:["2 Lundberg rice cakes","1 tbsp almond or peanut butter","½ banana, sliced","Pinch of cinnamon"],metric:["2 Lundberg rice cakes","15ml almond or peanut butter","½ banana, sliced","Pinch of cinnamon"],steps:["Spread nut butter on rice cakes.","Top with banana slices and cinnamon.","Done in 60 seconds — the lightest pre-workout option on the list.","🏋️ Best if your stomach is very sensitive early morning — rice cakes are extremely easy to digest, almost zero bloating risk. Pure fast carbs to fuel the lift without any heaviness.","If 160 kcal feels too light add a second rice cake or a small spoonful more of nut butter."]},{title:"Protein Smoothie Pre-Workout Shot",category:"Snack",cal:180,protein:20,time:"3 min",airfryer:false,pcos:"good",bloat:"low",imperial:["½ scoop vanilla whey protein","½ cup HEB 2% milk","½ banana","3 ice cubes"],metric:["½ scoop vanilla whey protein","120ml HEB 2% milk","½ banana","3 ice cubes"],steps:["Blend all ingredients 20 seconds.","Drink immediately — small, cold, fast.","🏋️ This is your highest protein pre-workout option at 20g. Good for heavier lifting days when muscle preservation matters most.","Keep it to half a scoop — a full scoop pre-workout can cause stomach discomfort during lifts for some people.","Chase with a glass of water before you leave — hydration matters more than food for lifting performance."]},// ── LATE NIGHT SWEET SNACKS ────────────────────────────────
{title:"Warm Cinnamon Cottage Cheese Bowl",category:"Snack",cal:120,protein:14,time:"3 min",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup low-fat cottage cheese","1 tsp honey","½ tsp cinnamon","Pinch of vanilla (optional)","Optional: 4–5 frozen blueberries, thawed"],metric:["120g low-fat cottage cheese","5ml honey","2.5ml cinnamon","Pinch of vanilla","Optional: 4–5 frozen blueberries, thawed"],steps:["Microwave cottage cheese 20 seconds — just enough to take the cold edge off, not fully warm.","Stir in cinnamon and honey.","Top with blueberries if using.","🌙 Why this works late at night: cottage cheese is high in casein protein — the slow-digesting kind that feeds your muscles overnight while you sleep. This is genuinely one of the best things you can eat before bed for a lifting programme.","🌸 PCOS bonus: cinnamon helps blood sugar stability overnight, reducing the cortisol spike that can happen with low blood sugar during sleep."]},{title:"Dark Chocolate & Almond Butter Rice Cake",category:"Snack",cal:140,protein:4,time:"3 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 Lundberg rice cake","1 tsp almond or peanut butter","2 squares dark chocolate (70%+), melted","Tiny pinch of fleur de sel"],metric:["1 Lundberg rice cake","5ml almond or peanut butter","2 squares dark chocolate (70%+), melted","Tiny pinch of fleur de sel"],steps:["Spread nut butter on rice cake.","Melt chocolate in microwave 20 seconds. Drizzle over the top.","Sprinkle a tiny pinch of fleur de sel — it makes the chocolate taste more intense.","Eat slowly. This is your evening chocolat. Savour it.","🌙 At 140 kcal this hits the sweet spot perfectly — enough to satisfy the craving without impacting tomorrow's deficit.","🌸 Dark chocolate 70%+ contains magnesium which is often deficient in PCOS and supports sleep quality."]},{title:"Frozen Yogurt Bark",category:"Snack",cal:110,protein:10,time:"5 min + freeze time",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup Fage 0% Greek yogurt","1 tsp honey","¼ tsp vanilla extract","¼ cup mixed berries (frozen or fresh)","1 tsp dark chocolate chips","Optional: pinch of cinnamon"],metric:["120ml Fage 0% Greek yogurt","5ml honey","1.25ml vanilla extract","40g mixed berries","5g dark chocolate chips","Optional: pinch of cinnamon"],steps:["Mix yogurt, honey and vanilla together.","Spread in a thin layer on a parchment-lined small plate or container — about 1cm / ½ inch thick.","Scatter berries and chocolate chips on top. Sprinkle cinnamon if using.","Freeze at least 2 hours — overnight is even better.","Break into pieces and eat straight from the freezer.","Make a batch Sunday — keeps frozen up to 1 week. Your evening treat is always ready.","🌙 Tastes like frozen yogurt ice cream. At 110 kcal and 10g protein it's the most indulgent-feeling snack on the entire app for the calorie count.","🌸 The casein in Greek yogurt feeds muscles overnight. This is genuinely a perfect post-lifting bedtime snack."]},{title:"Warm Banana with Cinnamon & Honey",category:"Snack",cal:105,protein:1,time:"3 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 small banana","¼ tsp cinnamon","1 tsp honey","Optional: tiny dollop of peanut butter"],metric:["1 small banana","1.25ml cinnamon","5ml honey","Optional: tiny dollop of peanut butter"],steps:["Option 1 — Pan: slice banana lengthwise, cook in a dry pan 1–2 min per side until golden and caramelised. Drizzle honey and cinnamon over.","Option 2 — Microwave: place whole unpeeled banana in microwave 1 minute. Peel carefully, drizzle honey and cinnamon over.","Option 3 — Raw: slice banana into rounds, dust with cinnamon, drizzle honey. The simplest version.","🌙 Banana before bed actually helps sleep — it contains tryptophan and magnesium which both support melatonin production. The warmth makes it feel like a real dessert.","🌸 The cinnamon + banana combination is one of the best blood sugar stabilisers before sleep for PCOS."]},{title:"Spearmint Hot Chocolate",category:"Snack",cal:120,protein:8,time:"3 min",airfryer:false,pcos:"great",bloat:"low",imperial:["¾ cup HEB 2% milk","1 tbsp sweet cocoa powder","1 tsp honey","½ scoop chocolate whey protein (optional — makes it thicker and higher protein)","1 spearmint tea bag"],metric:["180ml HEB 2% milk","7g sweet cocoa powder","5ml honey","½ scoop chocolate whey protein (optional)","1 spearmint tea bag"],steps:["Heat milk in a small pan over medium heat or microwave 90 seconds until steaming — don't boil.","Whisk in cocoa powder and honey until smooth.","Optional: whisk in half scoop of protein powder for extra thickness and protein.","Add the spearmint tea bag and steep 2 minutes. Remove bag.","Sip slowly. This is your evening ritual.","🌙 Warm drinks before bed signal your body it's time to wind down. The milk protein (casein) feeds muscles overnight.","🌸 The spearmint is actively working to reduce androgens while you sleep — this is one of the most PCOS-smart evening habits you can build. 2 cups of spearmint tea daily has clinical backing."]},{title:"Air Fryer Roasted Chickpeas (Classic Sea Salt)",category:"Snack",cal:160,protein:8,time:"25 min",airfryer:true,pcos:"great",bloat:"medium",imperial:["1 can chickpeas (~15 oz, drained and rinsed)","1 tsp olive oil","½ tsp sea salt","½ tsp garlic powder","Optional: pinch of smoked paprika"],metric:["1 can chickpeas (~400g, drained and rinsed)","5ml olive oil","2.5ml sea salt","2.5ml garlic powder","Optional: pinch of smoked paprika"],steps:["Drain and rinse chickpeas thoroughly. This is the most important step — spread them on a clean kitchen towel and pat completely dry. Any moisture = soft chickpeas instead of crunchy ones. Let them dry 10–15 minutes if you have time.","Remove any loose skins that come off during drying — they burn before the chickpeas crisp up.","Toss dry chickpeas with olive oil, salt and garlic powder in a bowl until evenly coated.","Air fry at 390°F / 200°C for 15–18 minutes, shaking the basket every 5 minutes. They should be deeply golden and feel hard when you press one.","Let cool 5–10 minutes before eating — they crisp up even more as they cool. Don't skip this step.","Store in an open container or paper bag at room temperature — airtight containers trap moisture and make them go soft. Best within 2 days.","🌸 Chickpeas are a great PCOS snack — high fibre, plant protein, low GI. Just keep portions to ½ cup / 80g to manage bloating.","💡 Sterling tip: make a double batch — two cans — and use them alongside meals all week instead of chips. Same crunch, way more nutrition."]},{title:"Air Fryer Roasted Chickpeas (Spicy)",category:"Snack",cal:165,protein:8,time:"25 min",airfryer:true,pcos:"great",bloat:"medium",imperial:["1 can chickpeas (~15 oz, drained and rinsed)","1 tsp olive oil","½ tsp cayenne pepper (or less if sensitive)","½ tsp smoked paprika","½ tsp cumin","½ tsp garlic powder","¼ tsp sea salt"],metric:["1 can chickpeas (~400g, drained and rinsed)","5ml olive oil","2.5ml cayenne pepper","2.5ml smoked paprika","2.5ml cumin","2.5ml garlic powder","1.25ml sea salt"],steps:["Drain, rinse and dry chickpeas completely — spread on a towel and pat dry, let sit 10–15 minutes. Dry = crunchy.","Remove any loose skins.","Toss with olive oil and all spices until well coated.","Air fry at 390°F / 200°C for 15–18 minutes, shaking every 5 minutes until deeply golden and hard.","Cool 5–10 minutes — they finish crisping as they cool.","Store in an open container at room temperature, eat within 2 days.","Adjust cayenne to taste — start with ¼ tsp if you're not sure about the heat level. This is the boyfriend version — he'll love these alongside dinner instead of chips."]},{title:"Air Fryer Roasted Chickpeas (Honey Cinnamon)",category:"Snack",cal:180,protein:8,time:"25 min",airfryer:true,pcos:"great",bloat:"medium",imperial:["1 can chickpeas (~15 oz, drained and rinsed)","1 tsp olive oil","1 tsp honey","½ tsp cinnamon","Pinch of salt","Optional: pinch of cayenne for sweet-heat"],metric:["1 can chickpeas (~400g, drained and rinsed)","5ml olive oil","5ml honey","2.5ml cinnamon","Pinch of salt","Optional: pinch of cayenne for sweet-heat"],steps:["Drain, rinse and dry chickpeas completely — this step is non-negotiable for crunch.","Remove any loose skins.","Toss with olive oil, honey, cinnamon and salt. The honey makes them slightly sticky — that's fine.","Air fry at 375°F / 190°C for 15–18 minutes, shaking every 5 minutes. Watch more carefully than the savoury versions as honey can burn — lower temperature helps.","Cool completely — the honey caramelises and crisps further as they cool.","🌸 Cinnamon is PCOS-friendly and helps with insulin sensitivity — this is your sweet goûter alternative to biscuits or chocolate.","Store in an open container. Eat within 2 days — honey versions go soft faster than savoury ones."]},{title:"Tuna Rice Salad",category:"Lunch",cal:380,protein:32,time:"15 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 can albacore tuna (~5 oz, drained)","½ cup cooked white or black rice (day-old is best)","½ cup corn (canned or frozen, drained)","4–5 asparagus spears, blanched and chopped","¼ cup cherry tomatoes, halved","2 tbsp olive oil","1 tbsp apple cider vinegar","1 tsp Dijon mustard","Salt, pepper, fresh parsley","Optional: ¼ avocado diced"],metric:["1 can albacore tuna (~140g, drained)","90g cooked white or black rice (day-old)","80g corn (canned or frozen, drained)","4–5 asparagus spears, blanched and chopped","40g cherry tomatoes, halved","30ml olive oil","15ml apple cider vinegar","5ml Dijon mustard","Salt, pepper, fresh parsley","Optional: ¼ avocado diced"],steps:["Make the vinaigrette: whisk olive oil, apple cider vinegar, Dijon, salt and pepper. Taste — it should be tangy and bright.","Blanch asparagus: boiling salted water 2 minutes, then immediately into ice water to stop cooking. Chop into bite-sized pieces.","Drain tuna well and flake into a large bowl.","Add rice, corn, asparagus and cherry tomatoes. Toss together.","Pour vinaigrette over and mix well — every grain of rice should be coated.","Top with fresh parsley and optional avocado. Eat immediately or refrigerate — tastes even better after 30 minutes as the rice absorbs the vinaigrette.","🌸 Use black rice for extra antioxidants and a stunning deep purple bowl. Highly recommend."]},{title:"Tuna Pasta Salad",category:"Lunch",cal:400,protein:30,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 can albacore tuna (~5 oz, drained)","1½ cups cooked short pasta (penne, fusilli or farfalle — cooled)","½ cup corn (canned or frozen, drained)","4–5 asparagus spears, blanched and chopped","¼ cup cherry tomatoes, halved","2 tbsp olive oil","1 tbsp apple cider vinegar","1 tsp Dijon mustard","Salt, pepper, fresh parsley or basil","Optional: ¼ cup black olives, 1 tbsp capers"],metric:["1 can albacore tuna (~140g, drained)","150g cooked short pasta, cooled","80g corn (canned or frozen, drained)","4–5 asparagus spears, blanched and chopped","40g cherry tomatoes, halved","30ml olive oil","15ml apple cider vinegar","5ml Dijon mustard","Salt, pepper, fresh parsley or basil","Optional: 40g black olives, 15g capers"],steps:["Cook pasta al dente — firm, not soft. Drain and rinse immediately under cold water to stop cooking. Spread on a plate to cool completely.","Make the vinaigrette: whisk olive oil, apple cider vinegar, Dijon, salt and pepper together.","Blanch asparagus in boiling salted water 2 minutes then into ice water. Chop into pieces.","Drain tuna and flake into a large bowl.","Add cooled pasta, corn, asparagus, tomatoes and optional olives or capers.","Pour vinaigrette over and toss thoroughly. Season well — pasta absorbs salt.","Refrigerate 15–30 minutes before eating if possible — the flavours come together beautifully as it rests.","⚠️ At 400 kcal this is your biggest lunch — pair with a lighter dinner like grilled fish or a big green salad."]},// ── DESSERTS ───────────────────────────────────────────────
{title:"Chocolate Chia Mousse",category:"Dessert",cal:180,protein:8,time:"5 min + chill",airfryer:false,pcos:"great",bloat:"low",imperial:["3 tbsp chia seeds","1 cup milk of choice","2 tbsp unsweetened cocoa powder","1 tsp honey or maple syrup","½ tsp vanilla extract","Pinch of salt","Optional toppings: fresh berries, coconut flakes, dark chocolate shavings"],metric:["30g chia seeds","240ml milk of choice","15g unsweetened cocoa powder","5ml honey or maple syrup","2.5ml vanilla extract","Pinch of salt","Optional toppings: fresh berries, coconut flakes, dark chocolate shavings"],steps:["Blend chia seeds, milk, cocoa, honey, vanilla and salt in a blender for 60 seconds until completely smooth — this is what makes it mousse-like rather than pudding-textured.","Pour into two small glasses or ramekins.","Refrigerate at least 2 hours, ideally overnight. It thickens into a rich, creamy chocolate mousse.","Top with berries or a few dark chocolate shavings before serving.","🌸 The chia seeds slow sugar absorption dramatically — this is one of the most blood-sugar-stable desserts you can eat after dinner.","💡 Make a batch of 4 on Sunday — dessert is ready every night with zero effort."]},{title:"Baked Cinnamon Pears",category:"Dessert",cal:120,protein:1,time:"15 min",airfryer:true,pcos:"great",bloat:"low",imperial:["2 ripe pears, halved and cored","1 tsp cinnamon","1 tsp honey","Pinch of nutmeg","Optional: 2 tbsp Greek yogurt to serve","Optional: crushed walnuts"],metric:["2 ripe pears, halved and cored","5ml cinnamon","5ml honey","Pinch of nutmeg","Optional: 30ml Greek yogurt to serve","Optional: crushed walnuts"],steps:["Halve pears and scoop out the core with a spoon to make a small hollow.","Drizzle honey into each hollow. Dust generously with cinnamon and a pinch of nutmeg.","Air fryer: 375°F / 190°C for 10–12 minutes until soft and slightly caramelised.","Oven: 400°F / 200°C for 20 minutes on a lined baking sheet.","Serve warm with a spoonful of Greek yogurt in the hollow if using.","🌸 Pears are high in fibre which feeds the gut bacteria that regulate oestrogen — a direct PCOS benefit. Cinnamon + pear after dinner is one of the best blood sugar combinations possible.","💡 Sterling can have both halves (240 kcal) — this scales perfectly."]},{title:"Protein Mug Brownie",category:"Dessert",cal:200,protein:16,time:"3 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop chocolate protein powder","1 tbsp unsweetened cocoa powder","1 tbsp almond flour or oat flour","¼ tsp baking powder","1 egg","3 tbsp milk of choice","1 tsp honey","Pinch of salt","Optional: 3–4 dark chocolate chips on top"],metric:["1 scoop chocolate protein powder","7g unsweetened cocoa powder","8g almond or oat flour","1.25ml baking powder","1 egg","45ml milk of choice","5ml honey","Pinch of salt","Optional: 3–4 dark chocolate chips on top"],steps:["Mix all dry ingredients in a microwave-safe mug.","Add egg, milk and honey. Mix until completely smooth — no lumps.","Press dark chocolate chips on top if using.","Microwave on HIGH for 60–90 seconds. Check at 60 seconds — it should be just set in the middle. Slightly underdone = fudgy. Overdone = dry and rubbery.","Let cool 1 minute before eating — it continues cooking briefly.","🌸 At 16g protein for a brownie, this is nutritionally remarkable. The protein blunts the blood sugar response significantly.","⚠️ Don't overcook. 60 seconds is usually enough — every microwave is different."]},{title:"Frozen Banana Nice Cream",category:"Dessert",cal:140,protein:2,time:"5 min + freeze",airfryer:false,pcos:"good",bloat:"low",imperial:["2 ripe bananas, sliced and frozen","Optional flavour add-ins: 1 tbsp peanut butter / 1 tbsp cocoa powder / handful of frozen berries / ½ tsp vanilla","Optional toppings: dark chocolate shavings, chopped nuts, fresh berries"],metric:["2 ripe bananas (~240g), sliced and frozen","Optional: 15ml peanut butter / 7g cocoa powder / handful frozen berries / 2.5ml vanilla","Optional toppings: dark chocolate shavings, nuts, fresh berries"],steps:["Freeze banana slices in a bag overnight — the riper the banana, the sweeter and creamier the result.","Blend frozen banana alone until smooth — it will look crumbly at first then suddenly turn creamy. This takes 2–3 minutes, scraping the sides.","Add your flavour of choice and blend another 30 seconds.","Eat immediately for soft-serve texture, or freeze 30 more minutes for firmer scoop-able ice cream.","🍫 Chocolate version: add 1 tbsp cocoa + 1 tsp honey before blending.","🥜 Peanut butter version: add 1 tbsp peanut butter — tastes like a frozen Reese's.","💡 Sterling's portion: blend 3 bananas for his serving. Still just fruit."]},{title:"Dark Chocolate Dipped Strawberries",category:"Dessert",cal:130,protein:2,time:"10 min + set",airfryer:false,pcos:"great",bloat:"low",imperial:["8 large fresh strawberries","2 oz dark chocolate (70%+), broken into pieces","Optional: pinch of fleur de sel, crushed pistachios, or freeze-dried raspberry powder"],metric:["8 large fresh strawberries","60g dark chocolate (70%+), broken into pieces","Optional: pinch of fleur de sel, crushed pistachios, freeze-dried raspberry powder"],steps:["Wash strawberries and dry completely — any moisture stops chocolate from sticking.","Melt chocolate in a microwave-safe bowl: 30 seconds, stir, 20 seconds, stir until just melted. Don't overheat.","Hold each strawberry by the leaves and dip into chocolate, covering ¾ of the berry.","Place on parchment paper. Sprinkle with fleur de sel or garnish of choice immediately.","Refrigerate 20–30 minutes until set.","🌸 Dark chocolate 70%+ is genuinely PCOS-friendly — it contains magnesium, reduces cortisol, and the flavanols improve insulin sensitivity. This is dessert that's actively good for you.","💡 Make 16 for both of you — doubles perfectly and keeps in the fridge 2 days."]},{title:"Coconut Chia Pudding Pot",category:"Dessert",cal:210,protein:5,time:"5 min + chill",airfryer:false,pcos:"great",bloat:"low",imperial:["3 tbsp chia seeds","¾ cup coconut milk (canned, full fat for creaminess)","¼ cup water","1 tsp honey or maple syrup","½ tsp vanilla extract","Toppings: toasted coconut flakes, mango chunks, lime zest"],metric:["30g chia seeds","180ml coconut milk (canned)","60ml water","5ml honey or maple syrup","2.5ml vanilla extract","Toppings: toasted coconut flakes, mango chunks, lime zest"],steps:["Mix chia seeds, coconut milk, water, honey and vanilla together in a jar.","Stir well, wait 5 minutes, stir again — prevents clumping.","Refrigerate 4 hours or overnight.","Top with toasted coconut flakes, fresh or frozen mango and a squeeze of lime.","🌸 Coconut milk contains medium-chain triglycerides (MCTs) which are processed differently to other fats — they don't spike insulin and can actually support fat metabolism.","💡 This is richer than the vanilla chia pudding due to coconut milk — keep it as a treat rather than daily."]},{title:"Warm Spiced Milk (Moon Milk)",category:"Dessert",cal:130,protein:7,time:"5 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 cup milk of choice (dairy, oat or almond)","½ tsp cinnamon","¼ tsp cardamom","Pinch of turmeric","1 tsp honey","½ tsp vanilla extract","Optional: pinch of black pepper (activates turmeric absorption)","Optional: ½ scoop vanilla protein powder for extra protein"],metric:["240ml milk of choice","2.5ml cinnamon","1.25ml cardamom","Pinch of turmeric","5ml honey","2.5ml vanilla extract","Optional: pinch of black pepper","Optional: ½ scoop vanilla protein powder"],steps:["Heat milk in a small saucepan over medium heat or microwave 90 seconds until steaming — don't boil.","Whisk in cinnamon, cardamom, turmeric, honey and vanilla until smooth.","Add black pepper if using — it increases turmeric absorption by 2000%.","Optional: whisk in half a scoop of protein powder for a thicker, higher protein drink.","Pour into a favourite mug. Sip slowly after dinner.","🌸 This is your evening ritual. Cinnamon stabilises blood sugar after dinner, cardamom supports digestion, turmeric reduces inflammation. All three directly benefit PCOS. The warmth signals your body it's time to wind down.","💡 Different from the Spearmint Hot Chocolate — this is your non-chocolate option. Rotate between the two."]},{title:"Berry Compote with Cottage Cheese",category:"Dessert",cal:145,protein:14,time:"8 min",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup low-fat cottage cheese","½ cup mixed frozen berries (blueberries, raspberries, blackberries)","1 tsp honey","½ tsp vanilla extract","Pinch of cinnamon"],metric:["120g low-fat cottage cheese","80g mixed frozen berries","5ml honey","2.5ml vanilla extract","Pinch of cinnamon"],steps:["Place frozen berries, honey and vanilla in a small saucepan over medium heat.","Cook 5–6 minutes, stirring occasionally, until berries burst and sauce thickens slightly.","Meanwhile spoon cold cottage cheese into a bowl.","Pour warm berry compote directly over cold cottage cheese.","Dust with cinnamon. Eat immediately — the hot/cold contrast is genuinely excellent.","🌸 Cottage cheese is high in casein protein which digests slowly overnight, supporting muscle repair while you sleep. The berries are loaded with anthocyanins which directly reduce PCOS-related inflammation.","💡 Sterling can double the portion — 290 kcal, 28g protein. Brilliant post-dinner protein hit for someone running daily."]},{title:"Ricotta & Honey Toast",category:"Dessert",cal:185,protein:9,time:"5 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 slice whole grain or sourdough bread","3 tbsp part-skim ricotta","1 tsp honey","Zest of ½ lemon","Optional: sliced fresh figs, strawberries, or peach","Optional: pinch of cinnamon or crushed pistachios"],metric:["1 slice whole grain or sourdough bread","45g part-skim ricotta","5ml honey","Zest of ½ lemon","Optional: sliced figs, strawberries, or peach","Optional: pinch of cinnamon or crushed pistachios"],steps:["Toast bread until golden and crispy — the crunch against creamy ricotta is the whole point.","Whip ricotta briefly with a fork to make it extra light and spreadable.","Spread ricotta generously over toast.","Drizzle honey over in a thin zigzag.","Add lemon zest — this brightens everything and makes it taste more sophisticated.","Add your choice of fruit on top if using.","💡 This is your French-style dessert. Light, elegant, genuinely satisfying. The lemon zest is not optional — it makes the difference between good and excellent.","🌸 Ricotta is lower in fat than cream cheese but richer than cottage cheese — good middle ground for a treat."]},{title:"Mango Coconut Yogurt Cup",category:"Dessert",cal:155,protein:12,time:"3 min",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup Greek yogurt (plain, 0%)","½ cup frozen mango chunks, thawed","1 tbsp coconut flakes (toasted if possible)","Juice and zest of ½ lime","1 tsp honey","Optional: pinch of chili powder for a Mexican-inspired kick"],metric:["120ml Greek yogurt (plain, 0%)","80g frozen mango chunks, thawed","10g coconut flakes (toasted if possible)","Juice and zest of ½ lime","5ml honey","Optional: pinch of chili powder"],steps:["Spoon Greek yogurt into a bowl or glass.","Top with mango chunks — frozen mango thaws in about 15 minutes at room temperature, or microwave 30 seconds.","Sprinkle toasted coconut flakes over the top.","Squeeze lime juice over everything, add lime zest.","Drizzle honey and add chili powder if you're feeling adventurous — mango + chili is a classic Mexican combination that's surprisingly addictive.","🌸 Mango is higher in natural sugar than berries — keep portions to ½ cup / 80g. The Greek yogurt protein balances the sugar impact significantly.","💡 Toast coconut flakes in a dry pan 2–3 minutes for dramatically better flavour. Worth the extra step."]},{title:"Poached Cinnamon Apple",category:"Dessert",cal:85,protein:0,time:"15 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 apple (any variety — Honeycrisp or Fuji work best), peeled, cored, halved","½ cup water","1 cinnamon stick or 1 tsp ground cinnamon","½ tsp vanilla extract","1 tsp honey","Optional: star anise, cardamom pod","Optional: 2 tbsp Greek yogurt to serve"],metric:["1 apple, peeled, cored, halved","120ml water","1 cinnamon stick or 5ml ground cinnamon","2.5ml vanilla extract","5ml honey","Optional: star anise, cardamom pod","Optional: 30ml Greek yogurt to serve"],steps:["Place water, cinnamon, vanilla, honey and optional spices in a small saucepan over medium heat. Stir to combine.","Add apple halves cut-side down.","Bring to a gentle simmer, cover and cook 10–12 minutes until apple is completely tender when pierced with a knife.","Remove apple to a bowl. Increase heat and reduce the poaching liquid 2 minutes until slightly syrupy.","Pour syrup over apple. Serve warm with a spoonful of Greek yogurt if using.","🌸 This is the most PCOS-friendly dessert on the entire list. Apple pectin feeds beneficial gut bacteria that regulate oestrogen. Cinnamon directly improves insulin sensitivity. At 85 kcal it fits even the tightest calorie day. The warm spiced syrup makes it taste like the filling of a proper apple pie.","💡 The lowest calorie dessert here — perfect for the evenings when you want something sweet but have already hit your calorie target."]},// ── READER RECIPES ─────────────────────────────────────────
{title:"Apple Cinnamon Overnight Protein Oats",category:"Breakfast",cal:280,protein:22,time:"5 min prep + overnight",airfryer:false,pcos:"great",bloat:"low",imperial:["30g / 1 oz instant oats","1 packet BetterOats Cinnamon Roll instant oatmeal","½ scoop vanilla, snickerdoodle or cinnamon roll protein powder","75g / 2.6 oz Honeycrisp apple, diced","Cinnamon to taste","Water as needed"],metric:["30g instant oats","1 packet BetterOats Cinnamon Roll instant oatmeal","½ scoop vanilla, snickerdoodle or cinnamon roll protein powder","75g Honeycrisp apple, diced","Cinnamon to taste","Water as needed"],steps:["Combine instant oats and the BetterOats packet in a microwave-safe bowl or jar.","Add enough water to just cover the oats — start with ½ cup / 120ml.","Microwave for 1 minute. Stir well.","Stir in protein powder while warm so it dissolves smoothly. Add a splash more water if needed — the oats will thicken overnight so keep it slightly looser than you think.","Stir in diced apple and a generous sprinkle of cinnamon.","Cover and refrigerate overnight. Eat cold straight from the jar.","🌸 Apple pectin + cinnamon is one of the best blood sugar stabilising combinations for PCOS. The protein powder turns a simple bowl of oats into a proper high-protein breakfast.","💡 The BetterOats Cinnamon Roll packet adds flavour complexity without much sugar — look for it in the oatmeal aisle at HEB or Walmart."]},{title:"Strawberry Cheesecake Overnight Oats",category:"Breakfast",cal:260,protein:24,time:"5 min prep + overnight",airfryer:false,pcos:"great",bloat:"low",imperial:["40g / 1.4 oz rolled oats","50g / 1.7 oz fat-free Greek yogurt","½ scoop strawberry cheesecake or strawberry protein powder","5g / 1 tsp sugar-free cheesecake pudding mix","65g / 2.3 oz fresh strawberries, chopped","5g / 0.2 oz freeze-dried strawberries to top (optional)","Stevia or sweetener to taste","Water to texture — start with ½ cup / 120ml"],metric:["40g rolled oats","50g fat-free Greek yogurt","½ scoop strawberry cheesecake or strawberry protein powder","5g sugar-free cheesecake pudding mix","65g fresh strawberries, chopped","5g freeze-dried strawberries to top (optional)","Stevia to taste","120ml water to start, more as needed"],steps:["Combine oats, Greek yogurt, protein powder and pudding mix in a jar or bowl.","Add ½ cup / 120ml water and mix thoroughly until smooth. The pudding mix makes it slightly thicker — add more water until you reach your preferred consistency.","Stir in chopped fresh strawberries.","Cover and refrigerate overnight — minimum 4 hours.","Top with freeze-dried strawberries before eating for crunch and intense strawberry flavour.","This genuinely tastes like strawberry cheesecake for breakfast. The pudding mix is the secret — it adds that creamy, tangy depth without any actual cream cheese.","🌸 Greek yogurt adds casein protein that digests slowly — keeps you full until lunch, stabilises blood sugar all morning.","💡 Freeze-dried strawberries are optional but worth it — find them at Whole Foods or Trader Joe's. They add crunch that fresh strawberries can't."]},{title:"Protein French Toast Bites",category:"Breakfast",cal:240,protein:22,time:"15 min",airfryer:true,pcos:"good",bloat:"low",imperial:["2–3 slices low-calorie bread (HEB Carb Sense or Dave's Killer Thin-Sliced), cut into bite-sized cubes","100g / 3.5 oz egg whites (about 3 egg whites)","Optional: 1 whole egg + 75g egg whites instead","½ scoop vanilla, snickerdoodle or cinnamon roll protein powder","Cinnamon to taste","Avocado oil spray","Toppings: fresh berries, peanut butter, a few dark chocolate chips"],metric:["2–3 slices low-calorie bread, cut into bite-sized cubes","100g egg whites","Optional: 1 whole egg + 75g egg whites","½ scoop vanilla or cinnamon protein powder","Cinnamon to taste","Avocado oil spray","Toppings: fresh berries, peanut butter, dark chocolate chips"],steps:["Cut bread into small bite-sized squares — about 2cm / ¾ inch. Smaller pieces = more surface area = crispier result.","Whisk together egg whites (or egg + whites), protein powder and a generous amount of cinnamon in a bowl until smooth.","Add all bread cubes to the bowl and toss gently until every piece is fully coated. Let sit 2 minutes to absorb.","Air fryer method (best): Spray basket with avocado oil. Spread bites in a single layer. Air fry at 370°F / 190°C for 8–10 minutes, shaking halfway, until golden and slightly crispy on the outside.","Pan method: Heat a non-stick pan over medium-low heat, spray well. Cook bites 8–10 minutes total, turning occasionally until browned all over.","Plate and top with fresh berries, a drizzle of peanut butter, or a few dark chocolate chips.","🌸 Using egg whites instead of whole eggs drops the fat significantly — same protein, fewer calories, PCOS-friendly.","💡 Meal prep these: make a big batch, store in the fridge up to 3 days. Reheat in the air fryer 2–3 minutes for crispy bites all week."]},{title:"Buffalo Chicken Salad",category:"Lunch",cal:320,protein:34,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["1 serving Real Good Foods Breaded Chicken Tenders (or 4 oz / 115g grilled chicken breast seasoned with paprika + garlic)","2 cups romaine lettuce, chopped","½ hard boiled egg, sliced","1 slice turkey bacon, cooked and crumbled","50g / 1.75 oz cherry tomatoes, halved","10g / 0.35 oz shredded cheddar cheese","15g / 0.5 oz shredded carrots","15g / 0.5 oz red onion, diced","Dash of ranch seasoning","Salt, pepper and garlic powder to taste","Dressing: 1 tbsp low-fat ranch + 1–2 tsp Frank's Buffalo hot sauce — mixed together"],metric:["1 serving Real Good Foods Breaded Chicken Tenders (or 115g grilled chicken breast)","60g romaine lettuce, chopped","½ hard boiled egg, sliced","1 slice turkey bacon, cooked and crumbled","50g cherry tomatoes, halved","10g shredded cheddar cheese","15g shredded carrots","15g red onion, diced","Dash of ranch seasoning","Salt, pepper and garlic powder to taste","Dressing: 15ml low-fat ranch + 5–10ml Frank's Buffalo hot sauce — mixed"],steps:["If using Real Good Foods chicken: air fry at 400°F / 200°C for 15–18 minutes until fully cooked and crispy. If using plain chicken breast: season with paprika, garlic, salt and pepper, then air fry at 375°F / 190°C for 18–20 minutes.","While chicken cooks, hard boil your egg if not already done (10 min in boiling water, then ice bath).","Cook turkey bacon in a pan or microwave until crispy. Crumble into pieces.","Chop romaine, halve tomatoes, dice red onion.","Mix ranch and Frank's hot sauce together in a small bowl — adjust heat level to your preference.","Build the salad: romaine base, then tomatoes, carrots, red onion, egg, crumbled bacon, cheese.","Let chicken cool slightly, cut into bite-sized pieces, place on top.","Drizzle buffalo ranch dressing over everything. Season with ranch seasoning, salt, pepper and garlic.","🌸 Keep the cheddar to exactly 10g — it adds flavour without wrecking the macros. The turkey bacon saves ~40 kcal vs regular bacon with almost identical taste.","💡 Real Good Foods chicken tenders are at HEB — breaded but made with chicken breast and lower carb than standard frozen chicken. Great shortcut for busy mornings."]},{title:"Chicken Caesar Tacos",category:"Dinner",cal:350,protein:36,time:"15 min",airfryer:false,pcos:"good",bloat:"low",imperial:["4 oz / 115g ground chicken","Salt, pepper, garlic to taste","2 tbsp Caesar dressing (Primal Kitchen recommended)","10g / 0.35 oz parmesan cheese, grated","3 small tortillas (flour, low-carb, almond flour or corn)","Chopped romaine lettuce","Optional: sourdough croutons, crushed"],metric:["115g ground chicken","Salt, pepper, garlic to taste","30ml Caesar dressing (Primal Kitchen)","10g parmesan cheese, grated","3 small tortillas","Chopped romaine lettuce","Optional: crushed sourdough croutons"],steps:["Mix ground chicken with salt, pepper and garlic in a bowl until well seasoned.","Divide into 3 equal portions — one per taco.","Press each portion thinly onto one side of each tortilla, spreading it edge to edge. This is the smash taco technique.","Heat a dry pan or flat griddle over medium-high heat — no oil needed.","Place each tortilla chicken-side down. Cook 4–5 minutes until chicken is fully cooked and slightly crispy on the bottom.","Meanwhile toss chopped romaine with Caesar dressing and parmesan in a bowl.","Flip tacos, cook 1 minute on the tortilla side. Remove from pan.","Top each taco with the Caesar salad mixture. Add crushed croutons if using.","🌸 Ground chicken is leaner than ground beef and higher in protein per calorie. The smash taco technique means zero added fat — the chicken cooks in its own juices directly on the tortilla.","💡 Primal Kitchen Caesar dressing is avocado oil based — cleaner ingredients and lower sugar than most brands. Find it at HEB or Whole Foods."]},{title:"Pineapple Chicken Teriyaki Bowl",category:"Dinner",cal:410,protein:38,time:"25 min",airfryer:true,pcos:"good",bloat:"low",imperial:["4.5 oz / 130g chicken breast, cut into bite-sized pieces","75g / 2.6 oz broccoli florets","75g / 2.6 oz bell peppers, diced","½ cup / 50g pineapple chunks (fresh or canned in juice, drained)","2–3 tbsp sugar-free teriyaki sauce (G-Hughes recommended)","1 cup cooked white or brown rice — or cauliflower rice for lower carb","Optional: garlic, ginger, sesame seeds, green onions"],metric:["130g chicken breast, bite-sized pieces","75g broccoli florets","75g bell peppers, diced","50g pineapple chunks (fresh or canned in juice, drained)","30–45ml sugar-free teriyaki sauce (G-Hughes)","180g cooked rice or cauliflower rice","Optional: garlic, ginger, sesame seeds, green onions"],steps:["Cook rice according to package instructions. Set aside. Or microwave cauliflower rice 3 minutes for the lower-carb version.","Season chicken pieces with salt, pepper and garlic. Air fry at 400°F / 200°C for 12–15 minutes until cooked through and slightly golden.","Sauté broccoli and bell peppers in a sprayed pan over medium-high heat 3–4 minutes until tender-crisp.","Add cooked chicken to the pan with the vegetables.","Add pineapple chunks and teriyaki sauce. Stir everything together and cook 2–3 minutes until heated through and sauce coats everything.","Build the bowl: rice base, then the chicken, vegetable and pineapple mixture on top.","Sprinkle with sesame seeds and chopped green onions if using.","🌸 G-Hughes Sugar Free Teriyaki has almost zero sugar — regular teriyaki sauce contains 8–12g sugar per serving which spikes insulin significantly. This swap matters for PCOS.","⚠️ Pineapple is higher in natural sugar than berries — the 50g portion here is well-controlled. Don't increase it. Use cauliflower rice to lower the overall GI further."]},{title:"Ground Beef Mac",category:"Dinner",cal:450,protein:38,time:"20 min",airfryer:false,pcos:"caution",bloat:"medium",imperial:["4 oz / 115g 96/4 lean ground beef","½ cup / 120ml stewed tomatoes with celery & onion (Hunt's recommended)","1 cup cooked mini elbow pasta (~⅓ cup / 55g uncooked — use Carb Diem for lower carb)","10g / 0.35 oz sharp cheddar cheese, shredded","Salt, pepper, garlic and Italian seasoning to taste"],metric:["115g 96/4 lean ground beef","120ml stewed tomatoes with celery & onion","90g cooked mini elbow pasta (~55g uncooked)","10g sharp cheddar cheese, shredded","Salt, pepper, garlic and Italian seasoning to taste"],steps:["Heat a pan over medium-high heat. Add ground beef and season generously with salt, pepper, garlic and Italian seasoning.","Cook 6–8 minutes, breaking apart, until browned and fully cooked. Drain any excess fat.","Meanwhile boil pasta until al dente. Drain and set aside.","Add cooked pasta and stewed tomatoes into the pan with the beef. Stir to combine evenly. Cook 2 minutes until heated through.","Sprinkle shredded cheddar cheese over the top. Either broil in the oven on HIGH for under 10 minutes until cheese is crispy, or cover the pan with a lid 2 minutes to melt.","⚠️ PCOS note: red meat + pasta is a higher GI combination — keep this to once a week. Use Carb Diem pasta to drop the net carbs by half and improve insulin response.","💡 Sterling's portion: scale to 5.5 oz / 155g beef and 1.25 cups pasta. At 450 kcal for your portion, this fits both your targets well.","The 96/4 ground beef (96% lean) is essential — 80/20 adds significant extra fat and calories. HEB carries it in the lean beef section."]},{title:"Steak & Corn Summer Salad",category:"Lunch",cal:370,protein:36,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4.5 oz / 130g steak (ribeye, sirloin or filet)","2 cups mixed spring mix + romaine lettuce","50g / 1.75 oz corn, sautéed or charred in a dry pan","20g / 0.7 oz red onion, thinly sliced","20g / 0.7 oz avocado, sliced","0.5 oz / 15g cotija cheese, crumbled","Mini tortilla strips as croutons (optional)","Dressing: 40g / 1.4 oz nonfat Greek yogurt + fresh lime juice + Chili Lime seasoning (Trader Joe's or Tajín)"],metric:["130g steak (ribeye, sirloin or filet)","60g mixed spring mix + romaine","50g corn, sautéed or charred","20g red onion, thinly sliced","20g avocado, sliced","15g cotija cheese, crumbled","Mini tortilla strips optional","Dressing: 40g nonfat Greek yogurt + fresh lime juice + Chili Lime seasoning"],steps:["Season steak with salt, pepper and garlic. Grill or pan-sear over medium-high heat 3–5 minutes per side depending on thickness and preferred doneness.","Let steak rest 5 minutes — non-negotiable, this keeps the juices in. Then slice thinly against the grain.","While steak rests, sauté corn in a dry hot pan 3–4 minutes until slightly charred — the char adds enormous depth of flavour.","Make the dressing: mix Greek yogurt with enough fresh lime juice to make it pourable. Add Chili Lime seasoning to taste. It should be tangy, slightly spicy and fresh.","Build the salad: greens as base, then charred corn, red onion, avocado, cotija cheese and optional tortilla strips.","Add sliced steak on top. Drizzle dressing over everything and toss lightly.","🌸 Greek yogurt dressing cuts calories in half vs traditional ranch or Caesar while adding protein. Cotija is saltier and more flavourful than cheddar — a little goes a long way.","💡 The chili lime + cotija + charred corn combination is a street corn (elote) flavour profile. This is one of the best lunch salads in the entire app."]},{title:"Burger Bowl",category:"Dinner",cal:430,protein:40,time:"20 min",airfryer:true,pcos:"good",bloat:"medium",imperial:["4 oz / 115g 96/4 lean ground beef","1–2 cups romaine or iceberg lettuce","50g / 1.75 oz tomatoes, diced","30g / 1 oz onion (cooked white or raw red)","Dill pickles, sliced","15g / 0.5 oz American cheese","French fries of choice: homemade, sweet potato or frozen (Love Roots recommended)","Burger Sauce: 50g / 1.75 oz nonfat Greek yogurt + 1.5 tsp mustard + 2 tbsp no-added-sugar ketchup + 1–2 tbsp sweet relish + salt, pepper and garlic to taste"],metric:["115g 96/4 lean ground beef","30–60g romaine or iceberg lettuce","50g tomatoes, diced","30g onion (cooked or raw)","Dill pickles, sliced","15g American cheese","French fries: homemade, sweet potato or frozen","Burger Sauce: 50g nonfat Greek yogurt + 7ml mustard + 30ml no-sugar ketchup + 15–30ml sweet relish + seasoning"],steps:["Heat a pan over medium-high heat. Season ground beef with salt, pepper and garlic. Cook 6–8 minutes until browned and fully cooked. Optional: melt American cheese on top in the last minute.","Cook fries in the air fryer — sweet potato fries at 400°F / 200°C for 15 minutes shaking halfway. Frozen fries follow package instructions.","Make the burger sauce: mix Greek yogurt, mustard, ketchup and sweet relish in a bowl until smooth. Season to taste. This tastes remarkably like real burger special sauce.","Build the bowl: lettuce as base alongside the fries. Add cooked beef, tomatoes, onions and pickles.","Add cheese if not already melted on the beef. Drizzle burger sauce generously over everything.","🌸 The Greek yogurt burger sauce is the star — same creamy, tangy, slightly sweet flavour as special sauce but adds 5g protein and dramatically less fat.","⚠️ Medium bloat rating because of raw onion and pickles — use cooked onion and reduce pickles if you're in the luteal phase or having a sensitive week.","💡 Love Roots frozen fries are at HEB — clean ingredients, lower oil than most frozen options. Sweet potato fries add fibre and a lower GI vs regular fries."]},// ── BATCH 3 RECIPES ────────────────────────────────────────
{title:"Enchilada Skillet",category:"Dinner",cal:390,protein:38,time:"20 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["4 oz / 115g 96/4 lean ground beef or ground turkey","½ cup / 120ml enchilada sauce (canned)","½ cup / 80g cauliflower rice","1 cup / 30g fresh spinach","30g / 1 oz low-fat cottage cheese","2 small corn or low-carb tortillas, torn into pieces","30g / 1 oz shredded cheese of choice","Salt, pepper, garlic, cumin to taste","Toppings: avocado, Greek yogurt, cilantro, jalapeño"],metric:["115g 96/4 lean ground beef or ground turkey","120ml enchilada sauce","80g cauliflower rice","30g fresh spinach","30g low-fat cottage cheese","2 small tortillas, torn","30g shredded cheese","Salt, pepper, garlic, cumin","Toppings: avocado, Greek yogurt, cilantro, jalapeño"],steps:["Heat a skillet over medium heat. Add ground beef or turkey with all seasonings. Cook until fully browned, 6–8 minutes.","Stir in cauliflower rice and spinach. Cook until cauliflower is warmed through and spinach has wilted, about 2–3 minutes.","Add cottage cheese and enchilada sauce. Stir and let everything simmer together 2–3 minutes until slightly thickened.","Tear tortillas into pieces and stir them in — they soak up the sauce beautifully.","Top with shredded cheese, cover with a lid and let sit 5 minutes until cheese is fully melted.","Add your favourite toppings: avocado slices, a dollop of Greek yogurt instead of sour cream, cilantro, jalapeño.","🌸 Use ground turkey over beef for a PCOS-friendlier version — same flavour, less saturated fat. Add extra spinach freely.","💡 This is a brilliant one-pan weeknight dinner. Sterling can add an extra tortilla and double the cheese for his portion."]},{title:"Blueberry Protein Overnight Oats",category:"Breakfast",cal:270,protein:24,time:"5 min prep + overnight",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup / 45g instant oats","1 scoop cake batter or vanilla protein powder","1 tbsp chia seeds","Water to desired texture","Stevia to taste","60g / 2 oz frozen blueberries — for the jam","1 packet stevia — for the jam"],metric:["45g instant oats","1 scoop cake batter or vanilla protein powder","8g chia seeds","Water to texture","Stevia to taste","60g frozen blueberries","1 packet stevia"],steps:["Make the blueberry jam: add frozen blueberries and a packet of stevia to a small saucepan over low heat. Let them bubble and cook down 4–5 minutes until it becomes a thick, sweet jam. Set aside.","In a bowl, combine oats, chia seeds, water and protein powder. Microwave 1 minute to give the oats more volume and texture.","Stir everything well — add a little more water after adding the protein powder so it's not too thick.","Top with the warm blueberry jam and let sit overnight, or eat right away if you can't wait.","🌸 Frozen blueberries cooked down into jam is one of the best PCOS food hacks — you get natural sweetness and massive antioxidant concentration without any added sugar.","💡 Make a double batch of the blueberry jam and keep it in a jar in the fridge — lasts 5 days and works on yogurt, cottage cheese and overnight oats all week."]},{title:"Cookie Dough Overnight Oats",category:"Breakfast",cal:280,protein:26,time:"5 min prep + overnight",airfryer:false,pcos:"good",bloat:"low",imperial:["½ cup / 45g instant oats","50g / 1.75 oz egg whites (~2 egg whites)","Splash of water, divided","1 scoop cookie dough protein powder","Stevia to taste — optional","Optional: PB2 powder","10–15 Lily's mini semi-sweet chocolate chips"],metric:["45g instant oats","50g egg whites","Splash of water","1 scoop cookie dough protein powder","Stevia optional","Optional: PB2 powder","10–15 Lily's mini dark chocolate chips"],steps:["In a bowl, combine oats, egg whites and a small splash of water.","Microwave 1 minute until fluffy — the egg whites cook into the oats making them thick and high protein.","Add another small splash of water and stir to loosen the texture slightly.","Stir in protein powder and optional stevia or PB2 until smooth. Don't add too much water — it should be thick.","Let cool slightly, then mix in chocolate chips.","Cover and refrigerate overnight. Eat cold in the morning — the texture is creamy and cookie-dough-like.","💡 The egg white microwave trick is the secret to these — it doubles the protein without any eggy taste and creates a much thicker, more satisfying texture than regular overnight oats.","🌸 Lily's chocolate chips are sweetened with stevia — no blood sugar spike. Find them at HEB or Whole Foods."]},{title:"Brownie Batter Overnight Oats",category:"Breakfast",cal:290,protein:28,time:"5 min prep + overnight",airfryer:false,pcos:"good",bloat:"low",imperial:["½ cup / 45g instant oats","50g / 1.75 oz egg whites","Splash of water","1 packet stevia","1 tbsp unsweetened cocoa powder","1 scoop brownie batter protein powder (Clean Simple Eats or similar)","10–15 Lily's semi-sweet dark chocolate chips"],metric:["45g instant oats","50g egg whites","Splash of water","1 packet stevia","7g unsweetened cocoa powder","1 scoop brownie batter protein powder","10–15 Lily's dark chocolate chips"],steps:["Mix oats, egg whites and a splash of water in a microwave-safe bowl.","Microwave 1 minute until fluffy and cooked through.","Stir in stevia, cocoa powder and protein powder until completely smooth and fudgy.","Top with chocolate chips and let sit, or refrigerate overnight.","The cocoa powder is what makes this taste genuinely like brownie batter — don't skip it even if you're using chocolate protein powder.","🌸 Dark cocoa contains flavanols that reduce inflammation and improve insulin sensitivity — two direct PCOS benefits.","💡 Same egg white microwave technique as Cookie Dough Oats — master this method and you have a high-protein base for endless overnight oat flavours."]},{title:"Turkey & Hummus Protein Roll-Ups",category:"Snack",cal:180,protein:22,time:"3 min",airfryer:false,pcos:"great",bloat:"low",imperial:["2 Egglife Everything Egg White Wraps (or low-carb wraps of choice)","2 tbsp / 30ml Cedar's or Sabra hummus","3 oz / 85g uncured turkey slices"],metric:["2 Egglife Everything Egg White Wraps","30ml hummus","85g uncured turkey slices"],steps:["Lay egg white wrap flat on a surface.","Spread hummus evenly over the wrap — this is the binder and flavour base.","Layer turkey slices over the hummus.","Roll up tightly. Secure with a toothpick if needed.","Slice in half diagonally or eat as-is.","🌸 Egglife wraps are made from egg whites — ~5g protein per wrap with almost zero carbs. A major upgrade over flour tortillas for a quick snack.","💡 Pair with cucumber salad (recipe below) for a complete snack plate. Makes the perfect 3pm snack or quick pre-workout fuel."]},{title:"Cucumber Salad",category:"Snack",cal:30,protein:1,time:"5 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 cucumber, thinly sliced","Salt to taste","Pepper to taste","Garlic powder to taste","1 tsp / 5ml rice vinegar","Chili pepper flakes to taste"],metric:["1 cucumber, thinly sliced","Salt, pepper, garlic powder to taste","5ml rice vinegar","Chili pepper flakes to taste"],steps:["Slice cucumber into thin rounds.","Season with salt, pepper, garlic powder and chili pepper flakes.","Add a splash of rice vinegar and toss to coat.","Let sit 5–10 minutes so the flavours soak in — the cucumbers become extra flavourful.","Eat immediately or refrigerate up to 2 days — they soften slightly but the flavour intensifies.","🌸 Cucumber is almost zero calories, very hydrating, and extremely gentle on digestion — one of the best PCOS-friendly snack bases. The vinegar adds brightness without any fat or sugar.","💡 Pair with Turkey & Hummus Roll-Ups for a complete snack plate. Also great alongside any egg bites or a protein bowl for lunch."]},{title:"Protein Egg Bake",category:"Breakfast",cal:310,protein:38,time:"35 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 whole egg","100g / 3.5 oz egg whites (~3–4 egg whites)","40g / 1.4 oz low-fat cottage cheese","60g / 2 oz red bell peppers, diced","2 Bilinski chicken sausages, chopped","1 oz / 28g turkey breast, shredded or diced","Salt, pepper, garlic to taste","Optional: taco seasoning"],metric:["1 whole egg","100g egg whites","40g low-fat cottage cheese","60g red bell peppers, diced","2 Bilinski chicken sausages, chopped","28g turkey breast, diced","Salt, pepper, garlic","Optional: taco seasoning"],steps:["Preheat oven to 350°F / 175°C.","In a bowl, mix together the whole egg, egg whites and cottage cheese until well combined.","Fold in diced bell peppers, chopped chicken sausage, turkey and all seasonings.","Pour into a greased baking dish — an 8x8 inch / 20x20cm dish works well.","Bake for 30 minutes or until fully set and the top is lightly golden.","Let cool 5 minutes before slicing into portions. Slice into 4 squares — eat 1 serving now, refrigerate the rest up to 4 days.","🌸 Cottage cheese in egg bakes makes them creamy and adds casein protein — much better texture than egg bakes without it.","💡 Make this Sunday and have breakfast handled for 4 days. Reheat in the microwave 60–90 seconds. Bilinski chicken sausages are at Whole Foods — cleanest ingredient list of any chicken sausage."]},{title:"Spinach Egg White Turkey Cups",category:"Breakfast",cal:220,protein:34,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["150g / 5.3 oz egg whites (~5 egg whites)","30g / 1 oz low-fat cottage cheese","1 cup / 30g spinach, roughly chopped","3 oz / 85g uncured turkey breast, thinly sliced (about 4 slices)","Salt, pepper, garlic powder to taste"],metric:["150g egg whites","30g low-fat cottage cheese","30g spinach, roughly chopped","85g uncured turkey breast, thinly sliced","Salt, pepper, garlic powder"],steps:["Preheat oven to 400°F / 200°C.","In a bowl, mix together egg whites, cottage cheese, chopped spinach, salt, pepper and garlic powder until combined.","Spray a muffin tin generously with cooking spray.","Line each muffin cup with a slice of turkey breast — press it in to create a turkey cup/base. 3 oz / 85g is usually about 4 slices, making 4–5 cups.","Pour the egg white mixture evenly into each turkey-lined cup. Don't fill to the top as they will rise.","Bake for about 15 minutes until eggs are fully set and slightly golden on top.","🌸 The turkey cups act as the 'pastry' shell — zero carbs, extra protein, and they hold the egg filling perfectly.","💡 Make a batch of 8–10 on Sunday. Refrigerate up to 5 days. Reheat 30–45 seconds in the microwave each morning. Fastest high-protein breakfast possible."]},{title:"Turkey Egg White Feta & Bacon Cups",category:"Breakfast",cal:280,protein:48,time:"25 min",airfryer:false,pcos:"great",bloat:"low",imperial:["175g / 6 oz egg whites (~6 egg whites)","25g / 0.9 oz low-fat cottage cheese","0.75 oz / 21g fat-free feta cheese","2 slices turkey bacon, chopped","3 oz / 85g turkey breast, sliced (for the cups)","30g / 1 oz peppers, diced","30g / 1 oz tomatoes, diced","Salt, pepper, garlic to taste"],metric:["175g egg whites","25g low-fat cottage cheese","21g fat-free feta cheese","2 slices turkey bacon, chopped","85g turkey breast, sliced thin","30g peppers, diced","30g tomatoes, diced","Salt, pepper, garlic"],steps:["Preheat oven to 400°F / 200°C. Lightly grease a muffin tin.","Line each cup with slices of turkey breast to create the base.","In a bowl, mix egg whites, cottage cheese, feta, diced peppers, tomatoes and seasonings until combined.","Pour evenly into each turkey-lined cup. Don't fill to the top — they will rise.","Top each cup with chopped turkey bacon pieces.","Bake 15–20 minutes until eggs are fully set.","Note: they will rise and may spill over a bit while baking — leave room in each cup.","🌸 At 48g protein for a single serving of 4 cups this is extraordinary. The combination of egg whites, cottage cheese, feta and turkey bacon covers all protein types — fast whey-like from whites, slow casein from cottage cheese.","💡 This is your highest-protein breakfast in the entire app. Make these on Sunday for a week of effortless 48g protein mornings."]},{title:"Turkey Egg Cups with Potato Tots",category:"Breakfast",cal:330,protein:42,time:"25 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 chicken sausage (Bilinski or Al Fresco), sliced","3 oz / 85g turkey breast, sliced thin","100g / 3.5 oz egg whites","1 whole egg","60g / 2 oz frozen potato tots (Roots frozen or similar)","10g / 0.35 oz cheddar cheese","Salt, pepper, garlic to taste"],metric:["1 chicken sausage, sliced","85g turkey breast, sliced thin","100g egg whites","1 whole egg","60g frozen potato tots","10g cheddar cheese","Salt, pepper, garlic"],steps:["Preheat oven to 400°F / 200°C. Lightly grease a muffin tin.","Line each muffin cup with slices of turkey breast to create a base.","Place 2–3 potato tots at the bottom of each cup on top of the turkey.","In a bowl, mix egg whites, whole egg, sliced sausage and seasonings together.","Pour the egg mixture evenly into each cup. Don't fill to the top — they will rise.","Top with cheddar cheese.","Bake 15–20 minutes until eggs are set. Note: they may spill over a bit — leave room in each cup.","🌸 The potato tots add carbs which helps with morning energy before lifting — this is a better pre-workout breakfast than the plain egg cups. Use sweet potato tots for a lower GI version.","💡 The tots at the bottom crisp up slightly from the bottom of the muffin tin — a fun texture contrast to the fluffy egg top."]},{title:"Mediterranean Turkey Feta Meatball Bowl",category:"Dinner",cal:370,protein:36,time:"25 min",airfryer:true,pcos:"great",bloat:"low",imperial:["4 oz / 115g lean ground turkey","0.25 oz / 7g feta cheese, crumbled","½ tsp dill seasoning","½ tsp dried oregano","5g / 1 tsp breadcrumbs","Salt, pepper, garlic to taste","For the salad: 75g / 2.6 oz cucumber, diced + 75g / 2.6 oz tomatoes, diced + 20g / 0.7 oz red onion + red wine vinegar + lemon juice + dill + oregano + salt and pepper","To serve: romaine lettuce base + 2 tbsp tzatziki + 1 tbsp babaganoush + extra feta"],metric:["115g lean ground turkey","7g feta cheese, crumbled","Dill, oregano, breadcrumbs, salt, pepper, garlic","75g cucumber, diced + 75g tomatoes + 20g red onion + red wine vinegar + lemon + dill + salt","Romaine base + 2 tbsp tzatziki + 1 tbsp babaganoush"],steps:["Mix ground turkey, crumbled feta, dill, oregano, breadcrumbs and seasonings together in a bowl until combined.","Roll into meatballs — about 4–6 depending on size.","Air fry at 400°F / 200°C for 12–15 minutes until golden brown and cooked through.","Make the cucumber tomato salad: dice cucumber, tomatoes and red onion. Season with salt, pepper, garlic, dill and oregano. Add red wine vinegar and lemon juice. Let sit while everything else cooks so flavours develop.","Build the bowl: romaine lettuce base, then cucumber tomato salad, then turkey feta meatballs.","Top with tzatziki, babaganoush and a sprinkle of extra feta.","🌸 One of the most complete PCOS meals in the app — turkey (lean protein), feta (calcium), cucumber (hydration + digestion), tomatoes (lycopene anti-inflammatory), tzatziki (probiotic yogurt). Every element serves a purpose.","💡 Make a double batch of meatballs Sunday — they reheat perfectly and turn into a fast lunch all week."]},{title:"Bruschetta Chicken Salad",category:"Lunch",cal:340,protein:36,time:"25 min",airfryer:true,pcos:"great",bloat:"low",imperial:["5 oz / 140g Real Good Foods chicken tenders (or plain chicken breast, seasoned)","2 cups / 60g spring mix","5g / 1 tsp Italian breadcrumbs (for topping)","10g / 0.35 oz Parmesan cheese, grated","Drizzle of balsamic glaze","Bruschetta topping: 75g / 2.6 oz tomatoes, diced + 25g / 0.9 oz red onion, diced + 1 tbsp balsamic vinegar + Italian seasoning + basil + salt and pepper"],metric:["140g chicken tenders or breast","60g spring mix","5g breadcrumbs","10g Parmesan","Drizzle balsamic glaze","75g tomatoes + 25g red onion + 15ml balsamic vinegar + Italian seasoning + basil + salt"],steps:["Air fry chicken at 400°F / 200°C for 18–20 minutes until fully cooked and crispy.","While chicken cooks, make the bruschetta: dice tomatoes and red onion, toss with balsamic vinegar and Italian seasoning. Let sit so flavours come together.","Build the salad: spring mix as base, then spoon bruschetta mixture over the top.","Add chicken (let it cool slightly first, then cut into pieces).","Sprinkle with Parmesan and breadcrumbs for crunch. Drizzle balsamic glaze over everything.","🌸 Tomatoes are high in lycopene — a powerful anti-inflammatory antioxidant that directly benefits PCOS. Balsamic vinegar has a low GI and adds sweetness without sugar.","💡 The Real Good Foods chicken tenders are perfect here — already crispy from the air fryer, no extra breading needed."]},{title:"Mexican Street Corn Chicken Bowl",category:"Dinner",cal:420,protein:40,time:"25 min",airfryer:true,pcos:"good",bloat:"low",imperial:["5 oz / 140g Real Good Foods chicken tenders (air fried)","50g / 1.75 oz corn","15g / 0.5 oz red onion, diced","40g / 1.4 oz nonfat Greek yogurt","75g / 2.6 oz bell peppers","75g / 2.6 oz cauliflower rice","20g / 0.7 oz avocado","10g / 0.35 oz cotija cheese","Lime juice","Trader Joe's chili lime seasoning or Tajín","Cilantro to garnish"],metric:["140g Real Good Foods chicken tenders","50g corn","15g red onion diced","40g nonfat Greek yogurt","75g bell peppers","75g cauliflower rice","20g avocado","10g cotija cheese","Lime juice + chili lime seasoning + cilantro"],steps:["Air fry chicken at 400°F / 200°C for 18–20 minutes until fully cooked and crispy.","While chicken cooks, sauté corn and red onion in a dry pan until lightly browned and slightly charred, 3–4 minutes.","Mix corn and red onion with Greek yogurt, a squeeze of lime juice and chili lime seasoning to make your street corn mixture.","Sauté bell peppers in the same pan, 2–3 minutes. Heat cauliflower rice in the microwave 3 minutes.","Build the bowl: cauliflower rice base, then bell peppers, then chicken. Top with street corn mixture, avocado, cotija cheese and extra lime juice.","Garnish with fresh cilantro.","🌸 Greek yogurt as the street corn dressing is a genius swap — same creamy, tangy result with a fraction of the fat and extra protein.","💡 Very similar to the Steak & Corn Summer Salad but with chicken and cauliflower rice base — different enough to rotate both without repetition."]},{title:"Asian Sesame Chicken Salad",category:"Lunch",cal:350,protein:38,time:"15 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4.5 oz / 130g cooked chicken (Real Good Foods or plain grilled)","2 cups / 60g romaine lettuce, chopped","10g / 0.35 oz shredded carrots","10g / 0.35 oz red onion, diced","50g / 1.75 oz cucumber, sliced","6g / 0.2 oz shaved almonds","Sesame seeds to taste","Green onions for topping","PB2 Dressing (serves 2): 10g PB2 powder + 10ml soy sauce + 10ml rice vinegar + 10ml honey + 5ml sesame oil — whisk until smooth"],metric:["130g cooked chicken","60g romaine lettuce","10g shredded carrots","10g red onion","50g cucumber","6g shaved almonds","Sesame seeds + green onions","Dressing (2 servings): 10g PB2 + 10ml soy sauce + 10ml rice vinegar + 10ml honey + 5ml sesame oil"],steps:["In a large bowl, add romaine, carrots, red onion, cucumber and chicken.","Top with shaved almonds, sesame seeds and green onions.","In a small bowl, whisk together PB2 powder, soy sauce, rice vinegar, honey and sesame oil until completely smooth — no lumps.","Pour dressing over salad and toss until evenly coated.","🌸 PB2 dressing is a lighter, lower-calorie option than full peanut butter — same peanut flavour, dramatically less fat. Great for PCOS because it satisfies without spiking blood sugar.","⚠️ Dressing recipe makes 2 servings — use half or scale down. Adjust sweetness with honey and saltiness with soy sauce to taste.","💡 This is one of the best meal prep salads — make a double batch of chicken and dressing Sunday and pack it for Mon + Tue lunches."]},{title:"Southwest Chicken Salad",category:"Lunch",cal:330,protein:36,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["8 oz / 225g chicken breast, baked or air fried until fully cooked, then shredded","60g / 2 oz corn","60g / 2 oz bell pepper, diced","30g / 1 oz red onion, diced","100g / 3.5 oz nonfat Greek yogurt","Fresh lime juice to taste","Chili lime seasoning to taste","Cilantro to taste"],metric:["225g chicken breast, cooked and shredded","60g corn","60g bell pepper diced","30g red onion diced","100g nonfat Greek yogurt","Lime juice + chili lime seasoning + cilantro"],steps:["Cook chicken breast by baking at 400°F / 200°C for 22–25 minutes or air frying at 375°F / 190°C for 18–20 minutes until fully cooked through.","Shred chicken while still warm using two forks — it shreds much more easily when hot.","In a bowl, combine shredded chicken, corn, bell pepper and red onion.","Add Greek yogurt, a squeeze of lime juice and chili lime seasoning. Mix until everything is fully combined and creamy.","Taste and adjust seasoning. Top with fresh cilantro.","Serve on its own, with extra veggies, stuffed in a low-carb wrap, or with tortilla chips on the side.","🌸 Greek yogurt replaces mayonnaise completely — adds protein and probiotics instead of fat. This is what meal prep chicken salad should taste like.","💡 Makes 2 servings — eat one now, refrigerate one for tomorrow. Prep double on Sunday for Mon + Tue lunch in 25 minutes total."]},{title:"Egg Roll Bowl",category:"Dinner",cal:350,protein:34,time:"15 min",airfryer:false,pcos:"caution",bloat:"medium",imperial:["4 oz / 115g 96/4 lean ground beef","120g / 4.2 oz coleslaw mix (shredded cabbage + carrots)","100g / 3.5 oz cauliflower rice","½ scrambled egg","3 tbsp / 45ml low-sodium soy sauce","2 tbsp / 30ml gyoza sauce (Trader Joe's)","Sesame seeds for topping","Green onions for garnish","Salt, pepper, garlic, ginger to taste"],metric:["115g 96/4 lean ground beef","120g coleslaw mix","100g cauliflower rice","½ scrambled egg","45ml low-sodium soy sauce","30ml gyoza sauce","Sesame seeds + green onions","Salt, pepper, garlic, ginger"],boyfriend:{imperial:["6 oz / 170g 96/4 lean ground beef","150g / 5.3 oz coleslaw mix (shredded cabbage + carrots)","100g / 3.5 oz cauliflower rice","1 whole egg, scrambled","3 tbsp / 45ml low-sodium soy sauce","3 tbsp / 45ml gyoza sauce (Trader Joe's)","Sesame seeds for topping","Green onions for garnish","Salt, pepper, garlic, ginger to taste"],metric:["170g 96/4 lean ground beef","150g coleslaw mix","100g cauliflower rice","1 whole egg, scrambled","45ml low-sodium soy sauce","45ml gyoza sauce","Sesame seeds + green onions","Salt, pepper, garlic, ginger"],cal:470,protein:46},steps:["Brown ground beef in a pan over medium-high heat. Season with salt, pepper, garlic and ginger.","Add coleslaw mix and cauliflower rice directly to the pan. Stir everything together.","In a small separate pan or corner of the same pan, scramble the egg and incorporate it into the mixture.","Stir in soy sauce and gyoza sauce. Cook until the slaw softens and everything is heated through, about 3–4 minutes.","Remove from heat. Serve topped with sesame seeds and green onions.","⚠️ PCOS note: red meat + soy sauce is a moderate PCOS combination. Use the gyoza sauce sparingly — it contains some sugar. Make this once a week maximum.","💡 Gyoza sauce from Trader Joe's is the secret ingredient — it has a specific umami depth that regular soy sauce doesn't have alone. Don't substitute.","🔄 Sterling loves this — the coleslaw volume makes it feel like a huge portion. His full ingredient list and macros are shown above under the 🏃 Sterling tab — doubled beef, a whole egg instead of half, and slightly more coleslaw and gyoza sauce."]},{title:"Unstuffed Pepper Bowl",category:"Dinner",cal:390,protein:40,time:"20 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["4 oz / 115g 96/4 lean ground beef","½ cup / 120ml canned diced tomatoes","150g / 5.3 oz bell peppers, chopped (any colour)","75g / 2.6 oz zucchini, chopped","75g / 2.6 oz cauliflower rice","30g / 1 oz low-fat cottage cheese","25g / 0.9 oz shredded cheese of choice","Salt, pepper, garlic and Italian seasoning to taste"],metric:["115g 96/4 lean ground beef","120ml canned diced tomatoes","150g bell peppers chopped","75g zucchini chopped","75g cauliflower rice","30g low-fat cottage cheese","25g shredded cheese","Salt, pepper, garlic, Italian seasoning"],steps:["In a pan over medium heat, brown the ground beef until fully cooked. Add bell peppers, zucchini and cauliflower rice. Cook until vegetables are slightly softened, about 5 minutes.","Stir in canned tomatoes and cottage cheese. Mix well until everything is combined and heated through.","Season generously with salt, pepper, garlic and Italian seasoning.","Top with shredded cheese and let it melt before serving.","⚠️ PCOS caution: red meat once a week is the limit. The cottage cheese and vegetables do offset the inflammatory load significantly. Use Italian turkey sausage instead of beef for a PCOS-friendly version.","💡 This is one of Sterling's best meals — 40g protein, 21g carbs, incredibly filling. He can scale to 6 oz / 170g beef and double the vegetables easily."]},{title:"Chicken Bacon Ranch Bowl",category:"Lunch",cal:360,protein:38,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["5 oz / 140g Real Good Foods chicken tenders (air fried)","2 tbsp / 30ml ranch dressing (light)","2 slices turkey bacon, cooked and crumbled","50g / 1.75 oz cauliflower rice","50g / 1.75 oz regular rice","75g / 2.6 oz baby broccoli, steamed"],metric:["140g Real Good Foods chicken tenders","30ml light ranch dressing","2 slices turkey bacon, crumbled","50g cauliflower rice","50g regular rice","75g baby broccoli, steamed"],steps:["Air fry chicken tenders at 400°F / 200°C for 18–20 minutes until fully cooked and crispy.","Cook turkey bacon in a pan or microwave until crispy. Crumble into pieces.","Steam baby broccoli in the microwave 2–3 minutes or sauté in a pan with spray.","Mix cauliflower rice and regular rice together — this is the half-and-half rice method for a lower carb base that still tastes like real rice.","Build the bowl: rice base, then broccoli, then chicken. Top with crumbled bacon and drizzle ranch over everything.","🌸 The half cauliflower rice / half regular rice base is a smart PCOS carb strategy — you get the satisfaction of real rice with half the glycemic impact.","💡 This recipe works perfectly for 3x meal prep — make 3 portions on Sunday in under 30 minutes. That's Mon, Tue, Wed lunch done."]},{title:"Triple Berry Baked Oats",category:"Breakfast",cal:310,protein:28,time:"25 min",airfryer:false,pcos:"great",bloat:"low",imperial:["25g / 0.9 oz cake batter protein powder","25g / 0.9 oz instant oats","80g / 2.8 oz egg whites (~3 egg whites)","60g / 2 oz banana, mashed","1 tsp / 5g baking powder","40g / 1.4 oz frozen blueberries","25g / 0.9 oz fresh strawberries, sliced","3g / 0.1 oz dried raspberries","10g / 0.35 oz cake batter drizzle (optional — protein frosting or nut butter)"],metric:["25g cake batter protein powder","25g instant oats","80g egg whites","60g banana, mashed","5g baking powder","40g frozen blueberries + 25g strawberries + 3g dried raspberries","10g cake batter drizzle optional"],steps:["Preheat oven to 350°F / 175°C (or microwave for a faster version).","Mash banana thoroughly in a bowl. Add egg whites, oats, protein powder and baking powder. Mix until combined — it should be batter-like consistency.","Fold in blueberries and sliced strawberries gently.","Pour into a greased oven-safe ramekin or small baking dish.","Top with dried raspberries and optional drizzle.","Bake 18–22 minutes until set and golden on top. Alternatively microwave 2–3 minutes for a faster version — texture will be slightly different but still delicious.","🌸 Three different berries means three different antioxidant profiles — blueberry anthocyanins, strawberry ellagic acid, raspberry ellagitannins. This breakfast is actively anti-inflammatory for PCOS.","💡 The cake batter drizzle on top is a protein frosting (mix protein powder with a tiny splash of water until thick) — makes this feel genuinely indulgent for a Saturday morning."]},{title:"Chocolate Raspberry Protein Waffles",category:"Breakfast",cal:320,protein:30,time:"15 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 instant oatmeal packet (plain or cinnamon)","60g / 2 oz banana, mashed","1 scoop brownie batter protein powder","1 tbsp / 7g unsweetened cocoa powder","1 tsp / 5g baking powder","75g / 2.6 oz egg whites (~3 egg whites)","50g / 1.75 oz fresh raspberries"],metric:["1 instant oatmeal packet","60g banana, mashed","1 scoop brownie batter protein powder","7g unsweetened cocoa powder","5g baking powder","75g egg whites","50g fresh raspberries"],steps:["Mash banana in a bowl until smooth.","Add oatmeal packet, protein powder, cocoa powder, baking powder and egg whites. Mix until a smooth thick batter forms.","Preheat your waffle maker and spray with cooking spray.","Pour batter in and cook according to your waffle maker's instructions — usually 3–5 minutes until crispy on the outside.","Serve topped with fresh raspberries.","🌸 The banana + oat + egg white combination makes these surprisingly light despite the brownie batter flavour — no flour, no butter, no refined sugar.","⚠️ These require a waffle maker — if you don't have one, pour the batter into a pan and make pancakes instead. Same batter, just different shape.","💡 Make a double batch on Saturday — waffles reheat beautifully in the toaster. Pop them in for 2 minutes and they're crispy again. Make Tuesday's breakfast on Saturday."]},// ── REAL GOOD FOODS CHICKEN RECIPES ────────────────────────
{title:"Buffalo Chicken Wrap",category:"Lunch",cal:360,protein:36,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","2 tbsp Frank's RedHot Buffalo Sauce","1 large low-carb tortilla (HEB Carb Sense or Egglife wrap)","1 tbsp light ranch dressing","1 cup romaine lettuce, shredded","2 tbsp diced celery","Optional: sliced jalapeño, red onion"],metric:["140g Real Good Foods Breaded Chicken Strips","30ml Frank's RedHot Buffalo Sauce","1 large low-carb tortilla","15ml light ranch dressing","30g romaine lettuce, shredded","30g diced celery","Optional: jalapeño, red onion"],steps:["Air fry chicken strips at 400°F / 200°C for 15–18 minutes until fully cooked and crispy.","Let cool 1–2 minutes then slice into bite-sized pieces.","Toss sliced chicken with Frank's buffalo sauce until evenly coated.","Warm tortilla briefly in a dry pan or microwave 20 seconds.","Spread ranch down the centre of the tortilla. Layer lettuce, celery then buffalo chicken on top.","Fold sides in and roll tightly. Slice in half diagonally.","🌸 Frank's RedHot has almost zero calories and is one of the most flavourful sauces available — the heat itself is anti-inflammatory. Use liberally.","💡 The celery is not optional — it adds the crunch that makes this taste like a proper buffalo chicken experience. Don't skip it.","💡 Sterling's version: double the chicken, use a regular large flour tortilla, add extra ranch and blue cheese crumbles."]},{title:"Chicken Parmesan Bowl",category:"Dinner",cal:390,protein:40,time:"25 min",airfryer:true,pcos:"great",bloat:"low",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","½ cup / 120ml marinara sauce (no added sugar — Rao's recommended)","1.5 cups / 200g zucchini noodles (spiralised) or cauliflower rice","30g / 1 oz shredded part-skim mozzarella","1 tbsp grated Parmesan","Fresh basil to top","Salt, pepper, garlic to taste"],metric:["140g Real Good Foods Breaded Chicken Strips","120ml marinara sauce (Rao's or similar)","200g zucchini noodles or cauliflower rice","30g part-skim mozzarella, shredded","10g Parmesan grated","Fresh basil","Salt, pepper, garlic"],steps:["Air fry chicken strips at 400°F / 200°C for 15–18 minutes until crispy.","While chicken cooks, sauté zucchini noodles in a sprayed pan over medium-high heat 2–3 minutes until just tender. Season with salt, pepper and garlic. (Or microwave cauliflower rice 3 minutes.)","Warm marinara sauce in a small saucepan or microwave 90 seconds.","Place zucchini noodles or cauliflower rice in a bowl. Top with chicken strips.","Spoon marinara sauce over the chicken. Top with shredded mozzarella and Parmesan.","Broil in the oven 2–3 minutes until cheese is melted and bubbling — or microwave 45 seconds if you're in a hurry.","Top with fresh basil and eat immediately.","🌸 Zucchini noodles instead of pasta drops the carbs dramatically while Rao's marinara uses no added sugar — this is Chicken Parmigiana adapted for PCOS. The lycopene in marinara is actively anti-inflammatory.","💡 Rao's Homemade Marinara is at HEB or Whole Foods — cleaner ingredient list than any other major brand. Worth the extra $2."]},{title:"Honey Garlic Chicken Rice Bowl",category:"Dinner",cal:420,protein:38,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","Quick glaze: 1 tbsp honey + 1 tbsp low-sodium soy sauce + 1 garlic clove minced + ½ tsp sesame oil + pinch of chili flakes","½ cup / 90g cooked white or brown rice","½ cup / 75g cauliflower rice (mix with regular rice for half-and-half)","75g / 2.6 oz steamed broccoli or bok choy","Sesame seeds + green onions to garnish"],metric:["140g Real Good Foods Breaded Chicken Strips","Glaze: 15ml honey + 15ml low-sodium soy sauce + 1 garlic clove + 2.5ml sesame oil + chili flakes","90g cooked rice (half regular, half cauliflower)","75g steamed broccoli or bok choy","Sesame seeds + green onions"],steps:["Air fry chicken strips at 400°F / 200°C for 15–18 minutes until fully crispy.","While chicken cooks, mix honey, soy sauce, minced garlic, sesame oil and chili flakes in a small bowl.","Steam broccoli in the microwave 2–3 minutes. Cook rice or heat cauliflower rice.","When chicken is done, brush or drizzle glaze over the strips immediately while hot — the heat helps it caramelise slightly.","Build the bowl: half-and-half rice base, broccoli alongside, glazed chicken on top.","Garnish with sesame seeds and sliced green onions.","💡 This is Sterling's favourite version — scale to 7 oz / 200g chicken and full regular rice for his portion.","🌸 The half-and-half rice strategy cuts the glycemic impact significantly while still tasting like real rice. Use this method for all rice bowls.","⚠️ Keep honey to 1 tbsp exactly — it caramelises beautifully at this amount without adding meaningful sugar load."]},{title:"BBQ Chicken Loaded Sweet Potato",category:"Dinner",cal:410,protein:36,time:"25 min",airfryer:true,pcos:"good",bloat:"low",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","1 medium sweet potato (about 200g / 7 oz)","2 tbsp no-added-sugar BBQ sauce (G-Hughes recommended)","2 tbsp nonfat Greek yogurt (instead of sour cream)","2 tbsp diced green onions","Optional: 10g shredded cheddar cheese","Salt and pepper"],metric:["140g Real Good Foods Breaded Chicken Strips","1 medium sweet potato (~200g)","30ml no-added-sugar BBQ sauce (G-Hughes)","30ml nonfat Greek yogurt","30g green onions, diced","Optional: 10g shredded cheddar","Salt and pepper"],steps:["Pierce sweet potato all over with a fork. Microwave on HIGH 5–7 minutes until completely tender throughout. Alternatively bake at 400°F / 200°C for 40–45 minutes.","While potato cooks, air fry chicken strips at 400°F / 200°C for 15–18 minutes until crispy.","Toss cooked chicken strips with BBQ sauce.","Slice sweet potato open lengthwise and gently fluff the inside with a fork. Season with salt and pepper.","Top the potato with BBQ chicken st
