function RecipeCard({ recipe, unit }) {
  const [open, setOpen] = useState(false);
  const [portions, setPortions] = useState(1); // 1 = Eloise only, 2 = both
  const cs = CAT[recipe.category] || { bg:"#eee", fg:"#333" };
  const ingredients = unit === "metric" ? recipe.metric : recipe.imperial;

  // Scale multipliers: Eloise = 1x, Boyfriend = 1.4x (his portions are ~40% larger)
  const SCALES = {
    1: { label:"🌿 Eloise", multiplier:1,   cal: recipe.cal,              protein: recipe.protein },
    2: { label:"🏃 Boyfriend", multiplier:1.4, cal: Math.round(recipe.cal*1.4), protein: Math.round(recipe.protein*1.4) },
    3: { label:"🍽️ Both", multiplier:null, cal: Math.round(recipe.cal + recipe.cal*1.4), protein: Math.round(recipe.protein + recipe.protein*1.4) },
  };
  const S = SCALES[portions];

  // Scale a single ingredient string — finds leading numbers and multiplies them
  const scaleIngredient = (ing, mult) => {
    if (!mult || mult === 1) return ing;
    return ing.replace(/(\d+(\.\d+)?)/g, (match) => {
      const n = parseFloat(match);
      const scaled = n * mult;
      // Round nicely
      if (scaled % 1 === 0) return String(Math.round(scaled));
      if (scaled < 10) return parseFloat(scaled.toFixed(1)).toString();
      return String(Math.round(scaled));
    });
  };

  return (
    <div style={{ background:"white", borderRadius:16, marginBottom:14, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", overflow:"hidden" }}>
      <div onClick={() => setOpen(!open)} style={{ padding:"18px 20px 14px", background:C.warm, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:7, flexWrap:"wrap" }}>
            <span style={{ background:cs.bg, color:cs.fg, fontSize:10, fontWeight:700, padding:"2px 9px", borderRadius:20 }}>{recipe.category}</span>
            {recipe.airfryer && <span style={{ background:C.accentLight, color:C.accent, fontSize:10, fontWeight:700, padding:"2px 9px", borderRadius:20 }}>🌀 Air Fryer</span>}
            {recipe.pcos === "great" && <span style={{ background:"#e8f5e9", color:"#2e7d32", fontSize:10, fontWeight:700, padding:"2px 9px", borderRadius:20 }}>🌸 PCOS Friendly</span>}
            {recipe.pcos === "caution" && <span style={{ background:"#fff3e0", color:"#e65100", fontSize:10, fontWeight:700, padding:"2px 9px", borderRadius:20 }}>⚠️ PCOS Caution</span>}
            {recipe.bloat === "medium" && <span style={{ background:"#fff8e1", color:"#f57f17", fontSize:10, fontWeight:700, padding:"2px 9px", borderRadius:20 }}>💨 Mild Bloating</span>}
            {recipe.bloat === "high" && <span style={{ background:"#fce4ec", color:"#c62828", fontSize:10, fontWeight:700, padding:"2px 9px", borderRadius:20 }}>💨 Bloating Risk</span>}
          </div>
          <div style={{ fontFamily:"Georgia, serif", fontSize:18, marginBottom:8 }}>{recipe.title}</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            <span style={{ background:"#fde8d8", color:"#b05e20", fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:20 }}>~{S.cal} kcal</span>
            <span style={{ background:C.sageLight, color:C.sageDark, fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:20 }}>{S.protein}g protein</span>
            <span style={{ background:"#e8eaf6", color:"#3949ab", fontSize:11, fontWeight:600, padding:"3px 10px", borderRadius:20 }}>⏱ {recipe.time}</span>
          </div>
        </div>
        <span style={{ fontSize:18, color:C.muted, transform:open?"rotate(180deg)":"none", transition:"transform 0.3s", marginLeft:10, flexShrink:0 }}>▾</span>
      </div>
      {open && (
        <div style={{ padding:20 }}>

          {/* Portion scaler */}
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:C.accent, marginBottom:10 }}>Portion For</div>
            <div style={{ display:"flex", background:"#f5f5f5", borderRadius:12, padding:4, gap:3 }}>
              {Object.entries(SCALES).map(([key, s]) => (
                <button key={key} onClick={e => { e.stopPropagation(); setPortions(Number(key)); }} style={{ flex:1, padding:"8px 6px", borderRadius:9, border:"none", cursor:"pointer", background:portions===Number(key)?"white":"transparent", color:portions===Number(key)?C.sageDark:C.muted, fontFamily:"inherit", fontSize:12, fontWeight:700, transition:"all 0.2s", boxShadow:portions===Number(key)?"0 1px 4px rgba(0,0,0,0.1)":"none" }}>{s.label}</button>
              ))}
            </div>
            <div style={{ display:"flex", gap:12, marginTop:10 }}>
              <div style={{ flex:1, background:C.sageLight, borderRadius:10, padding:"10px 14px", textAlign:"center" }}>
                <div style={{ fontSize:18, fontWeight:700, color:C.sageDark }}>{S.cal}</div>
                <div style={{ fontSize:11, color:C.muted }}>kcal</div>
              </div>
              <div style={{ flex:1, background:C.sageLight, borderRadius:10, padding:"10px 14px", textAlign:"center" }}>
                <div style={{ fontSize:18, fontWeight:700, color:C.sageDark }}>{S.protein}g</div>
                <div style={{ fontSize:11, color:C.muted }}>protein</div>
              </div>
              {portions === 3 && (
                <div style={{ flex:1, background:"#fff8e1", borderRadius:10, padding:"10px 14px", textAlign:"center" }}>
                  <div style={{ fontSize:11, fontWeight:600, color:"#7a5c00", lineHeight:1.4 }}>Cook for 2 — portions split above</div>
                </div>
              )}
            </div>
          </div>

          <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:C.accent, marginBottom:10 }}>Ingredients {portions===3?"(for both)":portions===2?"(🏃 Boyfriend)":"(🌿 Eloise)"}</div>
          <ul style={{ listStyle:"none", marginBottom:20 }}>
            {ingredients.map((ing,i) => {
              const scaled = portions === 3
                ? `Eloise: ${ing}  |  Boyfriend: ${scaleIngredient(ing, 1.4)}`
                : scaleIngredient(ing, S.multiplier);
              return (
                <li key={i} style={{ fontSize:13, padding:"6px 0", borderBottom:"1px solid #f5f5f5", color:C.charcoal, lineHeight:1.5 }}>
                  <span style={{ color:C.sage, fontWeight:700 }}>· </span>
                  {portions === 3 ? (
                    <span>
                      <span style={{ color:C.sageDark, fontWeight:600 }}>Eloise:</span> {ing}
                      <span style={{ display:"block", paddingLeft:10, marginTop:2 }}>
                        <span style={{ color:C.accent, fontWeight:600 }}>Boyfriend:</span> {scaleIngredient(ing, 1.4)}
                      </span>
                    </span>
                  ) : scaled}
                </li>
              );
            })}
          </ul>

          <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:C.accent, marginBottom:10 }}>Steps</div>
          <ol style={{ listStyle:"none" }}>
            {recipe.steps.map((step,i) => (
              <li key={i} style={{ display:"flex", gap:12, padding:"8px 0", borderBottom:"1px solid #f5f5f5", alignItems:"flex-start" }}>
                <span style={{ width:22, height:22, background:C.sage, color:"white", borderRadius:"50%", fontSize:11, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:1 }}>{i+1}</span>
                <span style={{ fontSize:13, lineHeight:1.6, color:C.charcoal }}>{step}</span>
              </li>
            ))}
          </ol>
        </div>
      )}
    </div>
  );
}

function MealDay({ day, mealFilter }) {
  const meals = mealFilter === "All" ? day.meals : day.meals.filter(m => m.label === mealFilter);
  if (meals.length === 0) return null;
  const total = day.meals.reduce((s,m) => s+m.cal, 0);
  const totalP = day.meals.reduce((s,m) => s+m.protein, 0);
  return (
    <div style={{ background:"white", borderRadius:14, padding:20, marginBottom:14, boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
      <div style={{ fontFamily:"Georgia, serif", fontSize:18, color:C.sageDark, marginBottom:12, paddingBottom:10, borderBottom:`1px solid ${C.sageLight}`, display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
        <span>{day.day}</span>
        {mealFilter==="All" && <span style={{ fontSize:12, color:C.muted, fontStyle:"italic" }}>{total} kcal · {totalP}g protein</span>}
      </div>
      {meals.map((meal,i) => {
        const cs = CAT[meal.label] || { bg:"#eee", fg:"#333" };
        return (
          <div key={i} style={{ display:"flex", gap:12, padding:"9px 0", borderBottom:i<meals.length-1?"1px solid #f5f5f5":"none", alignItems:"flex-start" }}>
            <span style={{ background:cs.bg, color:cs.fg, fontSize:10, fontWeight:700, padding:"3px 9px", borderRadius:20, whiteSpace:"nowrap", marginTop:2 }}>{meal.label}</span>
            <span style={{ fontSize:13, flex:1, lineHeight:1.5, color:C.charcoal }}>{meal.desc}</span>
            <div style={{ textAlign:"right", flexShrink:0 }}>
              <div style={{ fontSize:12, color:C.accent, fontWeight:600 }}>{meal.cal} kcal</div>
              <div style={{ fontSize:11, color:C.sage }}>{meal.protein}g pro</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Pill({ value, current, setter }) {
  const active = current === value;
  const cs = CAT[value] || null;
  return (
    <button onClick={() => setter(value)} style={{ padding:"7px 15px", borderRadius:20, border:"none", cursor:"pointer", background:active?(cs?cs.bg:C.sageDark):"#efefef", color:active?(cs?cs.fg:"white"):C.muted, fontFamily:"inherit", fontSize:13, fontWeight:600, transition:"all 0.2s", outline:active&&cs?`2px solid ${cs.fg}`:"none" }}>{value}</button>
  );
}
