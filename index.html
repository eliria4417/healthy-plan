e wheat bun or rice instead of lettuce, 6 oz beef, melted cheddar on top."]},{title:"French Onion Beef Bowl",category:"Dinner",cal:370,protein:36,time:"30 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["4 oz / 115g 96/4 lean ground beef","1 large onion / 200g, thinly sliced","1 tsp / 5ml olive oil or butter","½ cup / 120ml low-sodium beef broth","½ tsp dried thyme","1 tsp Worcestershire sauce","Salt and pepper","1 cup cooked cauliflower rice","1 slice / 20g Swiss or Gruyère cheese","Optional: fresh thyme, crusty bread croutons"],metric:["115g 96/4 lean ground beef","200g onion, thinly sliced","5ml olive oil or butter","120ml low-sodium beef broth","Dried thyme, Worcestershire, salt, pepper","100g cauliflower rice","20g Swiss or Gruyère cheese","Optional: fresh thyme, croutons"],boyfriend:{imperial:["6 oz / 170g 96/4 lean ground beef","1 large onion / 200g, thinly sliced","1 tsp / 5ml olive oil or butter","½ cup / 120ml low-sodium beef broth","½ tsp dried thyme","1 tsp Worcestershire sauce","Salt and pepper","1 cup / 180g regular rice (not cauliflower)","2 slices / 40g Swiss or Gruyère cheese (doubled)","1 slice crusty bread, to serve (added)"],metric:["170g 96/4 lean ground beef","200g onion, thinly sliced","5ml olive oil or butter","120ml low-sodium beef broth","Dried thyme, Worcestershire, salt, pepper","180g regular rice","40g Swiss or Gruyère cheese (doubled)","1 slice crusty bread (added)"],cal:570,protein:46},steps:["The caramelised onions are the star — don't rush them. Heat olive oil in a pan over medium-low heat. Add sliced onions and a pinch of salt. Cook 15–18 minutes stirring occasionally until deeply golden, sweet and jammy. Patience here is everything.","Push onions to one side of the pan. Increase heat to medium-high. Add ground beef to the empty side. Season with salt, pepper and thyme. Cook 5–6 minutes until browned.","Mix beef and onions together. Add beef broth and Worcestershire. Stir and simmer 3–4 minutes until sauce reduces and thickens.","Plate over cauliflower rice. Top with a slice of Swiss cheese and briefly broil or microwave 45 seconds until melted.","Garnish with fresh thyme if using.","🇫🇷 This is the most French recipe in the app — slow-cooked caramelised onions with beef is a classic combination that tastes restaurant-quality with everyday ingredients.","⚠️ Bloat rating is medium because of onions — they are worth it here but if you're in the luteal phase, reduce to half a portion of onions.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — full regular rice, doubled beef and cheese, a slice of crusty bread to mop up the sauce."]},// ── FRENCH-INSPIRED RECIPES ────────────────────────────────
{title:"Mackerel & Quinoa Healthy Girl Plate",category:"Lunch",cal:380,protein:32,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["60g / 2 oz dry quinoa","1 tin mackerel in water or olive oil, drained (about 125g / 4.4 oz)","2 tbsp / 30g fromage blanc or 0% Greek yogurt","1 tsp / 5ml lemon juice","Salt, pepper, ½ tsp garlic powder","A few fresh mint leaves, chopped","1–2 cooked beetroot (about 80g / 2.8 oz), sliced","1 small piece feta cheese (20g / 0.7 oz)","¼ cucumber, sliced","4–5 cherry tomatoes, halved","¼ red onion, thinly sliced","1 tsp / 5ml olive oil","Extra lemon juice to finish"],metric:["60g dry quinoa","1 tin mackerel in water or olive oil, drained (~125g)","30g fromage blanc or 0% Greek yogurt","5ml lemon juice","Salt, pepper, garlic powder","Fresh mint leaves, chopped","80g cooked beetroot, sliced","20g feta cheese","¼ cucumber, sliced","4-5 cherry tomatoes, halved","¼ red onion, thinly sliced","5ml olive oil","Extra lemon juice"],steps:["Cook quinoa: rinse 60g dry quinoa, then cook in 120ml water with a pinch of salt for about 12 minutes until tender and water is absorbed. Set aside to cool slightly.","While quinoa cooks, mash the drained mackerel in a bowl with fromage blanc, lemon juice, salt, pepper, garlic powder and chopped mint until combined into a rough pâté.","Slice the vegetables: beetroot, cucumber, cherry tomatoes and red onion.","Once quinoa has cooled slightly, arrange it on a plate as the base.","Add the mackerel mixture, beetroot, cucumber, tomatoes and red onion around the quinoa. Crumble feta over the top.","Finish with a drizzle of olive oil and a final squeeze of lemon juice. Adjust seasoning to taste.","🌸 Mackerel is one of the most concentrated sources of omega-3 available — even higher than salmon per gram, and tinned mackerel is both affordable and incredibly convenient. Combined with beetroot's nitrates for circulation and quinoa's complete protein profile, this is an exceptionally well-rounded PCOS plate.","💡 This works equally well as a make-ahead lunch — keep the mackerel mixture separate from the vegetables and assemble just before eating to keep everything crisp.","🇫🇷 A genuinely elegant French-style composed plate — minimal effort, maximum nutrition."]},{title:"Burrata, Melon & Prosciutto Salad",category:"Lunch",cal:340,protein:18,time:"10 min",airfryer:false,pcos:"good",bloat:"low",imperial:["50g / 1.75 oz burrata (half a standard ball)","¼ small melon (cantaloupe), cubed (about 150g / 5.3 oz)","2 thin slices prosciutto or jambon sec","1 medium tomato, sliced","1 tsp / 5ml balsamic vinegar (not glaze, to control sugar)","Salt and pepper to taste","Fresh basil leaves, torn","Optional: extra protein boost — 50g / 1.75 oz grilled chicken, sliced"],metric:["50g burrata (half a standard ball)","150g cantaloupe melon, cubed","2 thin slices prosciutto or jambon sec","1 medium tomato, sliced","5ml balsamic vinegar (not glaze)","Salt and pepper","Fresh basil leaves, torn","Optional: 50g grilled chicken, sliced"],steps:["Arrange tomato slices and melon cubes on a plate.","Tear the burrata in half and place on top — only use half a ball to keep the saturated fat in check.","Drape the prosciutto slices over and around the salad.","Drizzle with balsamic vinegar — using the vinegar rather than a sweetened glaze keeps this genuinely low sugar.","Season with salt, pepper and scatter fresh basil over the top.","If adding extra protein, slice grilled chicken and add alongside for a more complete meal.","🌸 Modified from the original recipe — the original burrata salad used a full 100g portion which is closer to 500+ kcal of mostly saturated fat. Using half a ball and adding optional grilled chicken keeps this satisfying without overloading on fat, while keeping the genuinely lovely sweet-savoury melon and prosciutto combination intact.","💡 This is a beautiful warm-weather lunch — keep it as an occasional treat (once every week or two) rather than a weekly staple given the cheese and cured meat content.","🇫🇷 A classic French bistro-style starter turned into a light lunch."]},{title:"Crustless Bacon & Potato Quiche",category:"Breakfast",cal:380,protein:24,time:"40 min",airfryer:false,pcos:"good",bloat:"low",imperial:["3 large eggs","40g / 1.4 oz crème fraîche (4% or light)","150g / 5.3 oz cooked potato, diced","35g / 1.2 oz turkey bacon lardons (swapped from regular bacon)","40g / 1.4 oz cherry tomatoes, halved","15g / 0.5 oz grated Gruyère cheese","Salt, pepper, fresh parsley to finish"],metric:["3 large eggs","40g crème fraîche (4% or light)","150g cooked potato, diced","35g turkey bacon lardons","40g cherry tomatoes, halved","15g grated Gruyère cheese","Salt, pepper, fresh parsley"],steps:["Preheat oven to 350°F / 180°C. Grease a small baking dish or individual ramekin.","Whisk eggs and crème fraîche together in a bowl until smooth. Season with salt and pepper.","Cook turkey bacon lardons in a dry pan 3–4 minutes until lightly crisp — turkey bacon needs less cooking than pork bacon.","Layer diced potato, turkey bacon lardons and cherry tomato halves in the baking dish.","Pour the egg mixture over the top. Sprinkle grated Gruyère over everything.","Bake 25–30 minutes until set in the centre and golden on top. A knife inserted should come out clean.","Let cool 5 minutes before slicing. Garnish with fresh parsley.","🌸 Modified from the original — swapping regular bacon lardons for turkey bacon meaningfully reduces the saturated fat load while keeping all the flavour. At only 430 kcal per serving in the original recipe, this is already a well-balanced quiche; the turkey bacon swap makes it even more PCOS-friendly without sacrificing taste.","💡 This is an excellent Sunday batch breakfast — bake one large dish, slice into 4 portions, refrigerate. Reheats beautifully in the microwave for 60–90 seconds across the week.","🇫🇷 A genuinely French quiche technique without the heavy pastry crust — all the flavour, a fraction of the carbs."]},{title:"Kefta Tortilla Skewers",category:"Lunch",cal:370,protein:36,time:"20 min",airfryer:true,pcos:"great",bloat:"low",imperial:["4 corn tortillas","250g / 8.8 oz lean ground beef (96/4)","¼ red onion, finely diced","20g / 0.7 oz grated cheese of choice","Salt and pepper","1 tsp ground cumin (kefta-style spice)","1 tsp smoked paprika","1 tsp garlic powder","Optional: fresh parsley, chopped","Side salad: cherry tomatoes + cucumber + ¼ red onion + 1 tsp olive oil + salt and pepper","Sauce: 2 tbsp skyr or 0% Greek yogurt + 1 tbsp lemon juice + 1 tsp fresh mint, chopped + 1 tsp garlic powder + salt and pepper"],metric:["4 corn tortillas","250g lean ground beef (96/4)","¼ red onion, finely diced","20g grated cheese of choice","Salt, pepper, cumin, smoked paprika, garlic powder","Optional: fresh parsley","Side salad: cherry tomatoes + cucumber + ¼ red onion + olive oil + salt and pepper","Sauce: 30g skyr or 0% Greek yogurt + 15ml lemon juice + chopped mint + garlic powder + salt and pepper"],boyfriend:{imperial:["5 corn tortillas (extra layer)","350g / 12.3 oz lean ground beef (96/4)","¼ red onion, finely diced","40g / 1.4 oz grated cheese of choice (doubled)","Salt and pepper","1 tsp ground cumin","1 tsp smoked paprika","1 tsp garlic powder","Side salad: cherry tomatoes + cucumber + ¼ red onion + olive oil + salt and pepper","Sauce: 2 tbsp skyr or 0% Greek yogurt + 1 tbsp lemon juice + mint + garlic powder + salt and pepper"],metric:["5 corn tortillas (extra layer)","350g lean ground beef (96/4)","¼ red onion, finely diced","40g grated cheese of choice (doubled)","Salt, pepper, cumin, smoked paprika, garlic powder","Side salad: cherry tomatoes + cucumber + ¼ red onion + olive oil + salt and pepper","Sauce: 30g skyr or Greek yogurt + 15ml lemon juice + mint + garlic powder + salt and pepper"],cal:520,protein:50},steps:["Cut the edges off the tortillas to make neat squares — don't discard the trimmed edges, they make excellent crispy chips if air fried separately.","Season the ground beef with diced red onion, cumin, smoked paprika, garlic powder, salt and pepper. Mix thoroughly.","Spread a thin layer of the seasoned beef over each tortilla square. Sprinkle a little grated cheese on top.","Stack the tortillas on top of each other (beef-side facing the same direction) to create layers.","Cut the stack into strips, then carefully turn each strip onto its side and thread a skewer through the layers lengthwise — this creates the signature skewer shape with visible meat-and-tortilla layers.","Air fry at 360°F / 180°C for 10 minutes, turning halfway, until the beef is cooked through and the tortilla edges are crisp. Alternatively bake in a regular oven at the same temperature for slightly longer.","While skewers cook, make the sauce: whisk together skyr, lemon juice, chopped mint, garlic powder, salt and pepper.","Make the side salad: combine cherry tomatoes, cucumber and red onion, dress with olive oil, salt and pepper.","Serve the skewers with the sauce and side salad. Garnish with fresh parsley if using.","🌸 The skyr-mint-lemon sauce is genuinely excellent for digestion — mint is a classic carminative that reduces bloating, and the high-protein skyr base means this sauce adds protein rather than empty calories like a typical creamy sauce would.","💡 This is one of the most fun, visually impressive recipes in the app for very little effort — it looks like a proper kebab shop skewer but is entirely homemade and macro-friendly.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 350g beef instead of 250g, an extra tortilla layer, and double the cheese. Makes an excellent lunchbox item — pack the skewer, sauce and salad in separate containers."]},// ── PEAR TARTE FINE ────────────────────────────────────────
{title:"Pear Tarte Fine (Lightened)",category:"Dessert",cal:220,protein:6,time:"25 min",airfryer:false,pcos:"good",bloat:"low",imperial:["2 sheets phyllo dough, thawed","1 ripe pear, very thinly sliced","1 tsp / 5ml melted butter or coconut oil, for brushing","1 tsp / 5ml honey, warmed slightly","½ tsp / 2.5ml cinnamon","Pinch of nutmeg (optional)","10g / 0.35 oz crushed almonds or pistachios","Optional: Greek yogurt to serve"],metric:["2 sheets phyllo dough, thawed","1 ripe pear, very thinly sliced","5ml melted butter or coconut oil","5ml honey, warmed slightly","2.5ml cinnamon","Pinch of nutmeg (optional)","10g crushed almonds or pistachios","Optional: Greek yogurt to serve"],steps:["Preheat oven to 375°F / 190°C. Line a baking sheet with parchment paper.","Layer the 2 sheets of phyllo dough on top of each other, brushing a thin layer of melted butter between them — this creates the crisp, flaky base without needing a thick layer of pastry.","Lay the phyllo on the baking sheet. Fan the thin pear slices over the top in an overlapping pattern, leaving a small border.","Brush the pears lightly with the remaining melted butter. Drizzle warmed honey over the top and sprinkle with cinnamon and nutmeg.","Fold the small border of phyllo up and over the edge of the pears to create a rustic crust.","Bake 15–18 minutes until the phyllo is deeply golden and crisp and the pears are tender with caramelised edges.","Remove from oven, scatter crushed almonds or pistachios over the top. Slice into pieces.","Serve warm, with a small dollop of Greek yogurt if you like.","🌸 Using phyllo instead of traditional puff pastry or shortcrust dramatically lightens this dessert — phyllo is mostly flour and a touch of oil brushed between layers, while puff pastry is built from many layers of butter. This keeps the elegant bistro presentation with a fraction of the saturated fat.","💡 Work quickly with phyllo as it dries out fast — keep the sheets you're not using covered with a damp tea towel while you prep.","🇫🇷 A proper French bistro dessert, lightened without losing the elegance — looks like it took far more effort than it did."]},// ── POTATO MEALS ───────────────────────────────────────────
{title:"Salmon & Roasted Potato Sheet Pan",category:"Dinner",cal:420,protein:38,time:"30 min",airfryer:false,pcos:"great",bloat:"low",imperial:["5 oz / 140g salmon fillet","200g / 7 oz baby potatoes, halved","1 tsp / 5ml olive oil","1 lemon, half sliced + half juiced","2 garlic cloves, minced","1 tbsp fresh dill, chopped (or 1 tsp dried)","Salt and pepper","Optional: handful of asparagus or green beans added to the pan"],metric:["140g salmon fillet","200g baby potatoes, halved","5ml olive oil","1 lemon, half sliced + half juiced","2 garlic cloves, minced","Fresh dill, chopped (or dried)","Salt and pepper","Optional: asparagus or green beans"],boyfriend:{imperial:["7 oz / 200g salmon fillet","280g / 10 oz baby potatoes, halved (extra)","2 tsp / 10ml olive oil, divided (extra drizzle at the end)","1 lemon, half sliced + half juiced","2 garlic cloves, minced","1 tbsp fresh dill, chopped (or 1 tsp dried)","Salt and pepper","Optional: handful of asparagus or green beans"],metric:["200g salmon fillet","280g baby potatoes, halved (extra)","10ml olive oil, divided (extra drizzle)","1 lemon, half sliced + half juiced","2 garlic cloves, minced","Fresh dill, chopped (or dried)","Salt and pepper","Optional: asparagus or green beans"],cal:560,protein:48},steps:["Preheat oven to 400°F / 200°C. Line a sheet pan with parchment paper.","Toss halved baby potatoes with olive oil, minced garlic, salt and pepper. Spread on the sheet pan.","Roast potatoes alone for 15 minutes to give them a head start, since they take longer than the salmon.","Push potatoes to one side. Add salmon fillet to the empty side, skin-side down if applicable. Top salmon with lemon slices, a squeeze of lemon juice and chopped dill.","If using, add asparagus or green beans to the pan in the last 10 minutes.","Return to the oven and roast 12–15 minutes more until salmon is just cooked through and potatoes are golden and tender.","🌸 Salmon's omega-3 content combined with the anti-inflammatory properties of garlic and the gut-friendly fibre in baby potato skins makes this a genuinely well-rounded PCOS dinner. Keeping the potato skins on adds meaningful fibre that's lost when peeled.","💡 One pan, minimal cleanup — ideal for a weeknight when you want something that feels special without much effort.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 7 oz salmon, extra potatoes, an extra drizzle of olive oil for added calories."]},{title:"Loaded Turkey Chili Baked Potato",category:"Dinner",cal:410,protein:38,time:"45 min (or use microwave potato for speed)",airfryer:false,pcos:"good",bloat:"low",imperial:["1 large potato (about 250g / 8.8 oz)","4 oz / 115g lean ground turkey","¼ cup / 60g canned black beans, rinsed","¼ cup / 60g canned diced tomatoes","½ tsp cumin + ½ tsp smoked paprika + ½ tsp chili powder + salt","2 tbsp / 30ml nonfat Greek yogurt (sour cream swap)","15g / 0.5 oz shredded cheddar","Green onions to garnish","Optional: hot sauce, cilantro"],metric:["1 large potato (~250g)","115g lean ground turkey","60g canned black beans, rinsed","60g canned diced tomatoes","Cumin, smoked paprika, chili powder, salt","30ml nonfat Greek yogurt","15g shredded cheddar","Green onions","Optional: hot sauce, cilantro"],boyfriend:{imperial:["1 extra large potato (about 320g / 11.3 oz)","6 oz / 170g lean ground turkey","⅓ cup / 80g canned black beans, rinsed (extra)","¼ cup / 60g canned diced tomatoes","½ tsp cumin + ½ tsp smoked paprika + ½ tsp chili powder + salt","2 tbsp / 30ml nonfat Greek yogurt","30g / 1 oz shredded cheddar (doubled)","Green onions to garnish","Optional: hot sauce, cilantro"],metric:["1 extra large potato (~320g)","170g lean ground turkey","80g canned black beans, rinsed (extra)","60g canned diced tomatoes","Cumin, smoked paprika, chili powder, salt","30ml nonfat Greek yogurt","30g shredded cheddar (doubled)","Green onions","Optional: hot sauce, cilantro"],cal:560,protein:52},steps:["Bake the potato: pierce all over with a fork, bake at 400°F / 200°C for 45–50 minutes until completely tender, or microwave on high 6–8 minutes for a faster version.","While the potato cooks, brown the ground turkey in a pan over medium-high heat, breaking it apart, 6–7 minutes.","Add black beans, diced tomatoes and all the spices. Simmer 8–10 minutes until thickened into a quick chili.","Slice the baked potato open lengthwise and fluff the inside with a fork. Season with a little salt.","Spoon the turkey chili generously over the potato. Top with shredded cheddar, a dollop of Greek yogurt and green onions.","Add hot sauce and cilantro if using.","🌸 Black beans are one of the best foods for PCOS — extremely high fibre which dramatically slows glucose absorption and improves insulin sensitivity. The potato skin also contributes meaningful fibre. Greek yogurt instead of sour cream adds protein and probiotics.","💡 Make a bigger batch of the turkey chili on Sunday — it keeps 4 days and reheats perfectly, so all you need to do on a weeknight is bake or microwave a fresh potato.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 6 oz turkey, extra beans, a larger potato, and double the cheese."]},{title:"Potato & Leek Soup (Lightened)",category:"Dinner",cal:280,protein:14,time:"35 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["2 medium potatoes (about 300g / 10.5 oz), peeled and diced","1 large leek, white and light green parts, sliced","2 cups / 480ml low-sodium chicken or vegetable broth","2 tbsp / 30g nonfat Greek yogurt or light cream","1 tsp / 5ml olive oil","1 garlic clove, minced","Salt and pepper","Fresh chives, chopped, to garnish","Optional: crumbled turkey bacon on top for added protein"],metric:["2 medium potatoes (~300g), peeled and diced","1 large leek, sliced","480ml low-sodium chicken or vegetable broth","30g nonfat Greek yogurt or light cream","5ml olive oil","1 garlic clove, minced","Salt and pepper","Fresh chives, chopped","Optional: crumbled turkey bacon"],steps:["Heat olive oil in a large pot over medium heat. Add sliced leek and garlic, cook 5 minutes until softened — don't let it brown, you want it soft and sweet.","Add diced potatoes and broth. Bring to a boil, then reduce heat and simmer 20–25 minutes until potatoes are completely tender.","Blend the soup using an immersion blender directly in the pot, or carefully transfer to a regular blender in batches, until smooth and creamy.","Stir in Greek yogurt or light cream off the heat — adding it after blending and away from direct heat prevents it from splitting.","Season with salt and pepper to taste.","Serve garnished with fresh chives and crumbled turkey bacon if using for extra protein.","🌸 Using Greek yogurt instead of the traditional heavy cream cuts a significant amount of saturated fat while adding protein and probiotics — you genuinely don't notice much difference in creaminess if you add it correctly off the heat.","⚠️ Leeks are part of the allium family and can contribute to bloating for some people — if you're sensitive, cook them a few extra minutes to soften further, or reduce the quantity slightly.","💡 This is a classic French soup (vichyssoise is the cold version) lightened for everyday eating. Pair with a small piece of crusty bread for Sterling's portion to make it more substantial."]},{title:"Steak & Potato Bowl with Chimichurri",category:"Dinner",cal:430,protein:38,time:"25 min",airfryer:false,pcos:"good",bloat:"low",imperial:["5 oz / 140g sirloin or flank steak, sliced thin against the grain","150g / 5.3 oz baby potatoes, roasted","Chimichurri: ¼ cup fresh parsley, chopped + 1 tbsp olive oil + 1 tbsp red wine vinegar + 1 garlic clove minced + ½ tsp dried oregano + pinch of chili flakes + salt and pepper","1 cup / 30g arugula","Optional: crumbled feta or shaved parmesan"],metric:["140g sirloin or flank steak, sliced thin","150g baby potatoes, roasted","Chimichurri: fresh parsley + 15ml olive oil + 15ml red wine vinegar + garlic + dried oregano + chili flakes + salt and pepper","30g arugula","Optional: crumbled feta or shaved parmesan"],boyfriend:{imperial:["8 oz / 225g sirloin or flank steak, sliced thin against the grain","220g / 7.8 oz baby potatoes, roasted (extra)","Chimichurri: ⅓ cup fresh parsley, chopped + 1½ tbsp olive oil + 1½ tbsp red wine vinegar + 1 garlic clove minced + ½ tsp dried oregano + pinch of chili flakes + salt and pepper (extra drizzle)","1 cup / 30g arugula","Optional: crumbled feta or shaved parmesan"],metric:["225g sirloin or flank steak, sliced thin","220g baby potatoes, roasted (extra)","Chimichurri: fresh parsley + 22ml olive oil + 22ml red wine vinegar + garlic + dried oregano + chili flakes + salt and pepper (extra)","30g arugula","Optional: crumbled feta or shaved parmesan"],cal:600,protein:50},steps:["Roast the baby potatoes first: halve them, toss with a little olive oil, salt and pepper, roast at 400°F / 200°C for 25 minutes until golden and tender.","Make the chimichurri: combine chopped parsley, olive oil, red wine vinegar, minced garlic, oregano, chili flakes, salt and pepper in a bowl. Let it sit while everything else cooks so the flavours develop.","Season the steak with salt and pepper. Sear in a hot pan 2–3 minutes per side for medium-rare, depending on thickness. Let rest 5 minutes before slicing thinly against the grain — this keeps it tender.","Build the bowl: arugula as the base, roasted potatoes alongside, sliced steak on top.","Spoon chimichurri generously over the steak. Add crumbled feta or shaved parmesan if using.","🌸 Chimichurri is an excellent sauce choice for PCOS — fresh parsley is rich in vitamin C and antioxidants, and using olive oil and vinegar instead of a creamy sauce keeps this lighter while still feeling indulgent.","💡 The potato skins left on add fibre — don't peel them. The contrast of warm steak and potatoes against cold arugula and bright chimichurri makes this feel like a proper restaurant dish.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 8 oz steak, extra potatoes, and an extra drizzle of chimichurri."]},{title:"Spanish-Style Potato Tortilla",category:"Breakfast",cal:320,protein:20,time:"30 min",airfryer:false,pcos:"good",bloat:"low",imperial:["4 large eggs","1 medium potato (about 180g / 6.3 oz), very thinly sliced","½ small onion, thinly sliced","1 tsp / 5ml olive oil","Salt and pepper","Optional: fresh parsley to garnish"],metric:["4 large eggs","1 medium potato (~180g), very thinly sliced","½ small onion, thinly sliced","5ml olive oil","Salt and pepper","Optional: fresh parsley"],boyfriend:{imperial:["6 large eggs (extra)","1 medium-large potato (about 220g / 7.8 oz), very thinly sliced","½ small onion, thinly sliced","1½ tsp / 7.5ml olive oil","Salt and pepper","1 slice crusty bread, to serve (added)","Optional: fresh parsley to garnish"],metric:["6 large eggs (extra)","220g potato, very thinly sliced","½ small onion, thinly sliced","7.5ml olive oil","Salt and pepper","1 slice crusty bread (added)","Optional: fresh parsley"],cal:430,protein:30},steps:["Heat olive oil in a non-stick pan over medium-low heat. Add thinly sliced potato and onion. Season with salt.","Cook slowly, stirring occasionally, 15–18 minutes until the potato is completely tender but not browned — this slow cook is the key to a proper Spanish tortilla texture, not crispy hash browns.","Whisk the eggs in a bowl with a pinch of salt and pepper.","Pour the cooked potato and onion into the egg mixture, stirring gently to combine. Let sit 2–3 minutes so the potato absorbs some egg.","Wipe the pan clean, add a touch more oil if needed, and return to medium heat. Pour the egg-potato mixture back in, spreading evenly.","Cook 4–5 minutes until the edges set and the bottom is golden. Place a large plate over the pan, carefully flip the tortilla onto the plate, then slide it back into the pan to cook the other side, 3–4 minutes more.","Slide onto a plate, let rest 5 minutes before slicing into wedges. Garnish with parsley.","🌸 This is a wonderfully simple, naturally gluten-free, high-protein breakfast or light lunch. The slow-cooked potato and onion become almost creamy, and four eggs deliver excellent protein for very little effort.","💡 This is genuinely excellent cold the next day — classic Spanish picnic food. Slice and pack a wedge for lunch alongside a side salad.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 6 eggs, a slightly larger potato, and a slice of crusty bread on the side."]},{title:"Hasselback Chicken & Potato Bake",category:"Dinner",cal:400,protein:40,time:"40 min",airfryer:false,pcos:"good",bloat:"low",imperial:["2 boneless, skinless chicken thighs (about 5 oz / 140g each)","2 small potatoes (about 150g / 5.3 oz each), hasselback-sliced (thin cuts not all the way through)","1 tbsp / 15ml olive oil, divided","3 garlic cloves, minced","1 tsp dried thyme or rosemary","1 lemon, half sliced + half juiced","Salt and pepper"],metric:["2 boneless, skinless chicken thighs (~140g each)","2 small potatoes (~150g each), hasselback-sliced","15ml olive oil, divided","3 garlic cloves, minced","Dried thyme or rosemary","1 lemon, half sliced + half juiced","Salt and pepper"],boyfriend:{imperial:["3 boneless, skinless chicken thighs (about 5 oz / 140g each, extra)","3 small potatoes (about 150g / 5.3 oz each, extra), hasselback-sliced","1½ tbsp / 22ml olive oil, divided (extra)","3 garlic cloves, minced","1 tsp dried thyme or rosemary","1 lemon, half sliced + half juiced","Salt and pepper"],metric:["3 boneless, skinless chicken thighs (~140g each, extra)","3 small potatoes (~150g each, extra), hasselback-sliced","22ml olive oil, divided (extra)","3 garlic cloves, minced","Dried thyme or rosemary","1 lemon, half sliced + half juiced","Salt and pepper"],cal:600,protein:56},steps:["Preheat oven to 400°F / 200°C.","Make the hasselback cuts in the potatoes: slice thin cuts across the potato about 3mm apart, going most of the way through but not cutting all the way to the base — the potato should still hold together and fan out slightly when baked.","Place chicken thighs and potatoes in a baking dish. Drizzle with half the olive oil, minced garlic, thyme or rosemary, salt and pepper, rubbing it into the potato slices so it gets between the cuts.","Drizzle the remaining olive oil and lemon juice over the chicken. Tuck lemon slices around the dish.","Bake 35–40 minutes until the chicken is cooked through and the potatoes are tender and lightly crisped at the edges where they've fanned open.","🌸 The hasselback technique maximises surface area for the garlic, herbs and lemon to penetrate, making this taste far more elevated than a standard roast for almost no extra effort. Garlic is mildly anti-inflammatory and supports immune function.","💡 One dish, minimal cleanup, and it looks genuinely impressive for a weeknight dinner. Great for when you want something that feels special without standing over the stove.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 3 chicken thighs, an extra potato, finished with a little extra olive oil for more calories."]},// ── PORK LOIN CHOP RECIPES ─────────────────────────────────
{title:"Pork Chops with Apple & Sage",category:"Dinner",cal:360,protein:36,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["6 oz / 170g boneless pork loin chop","1 small apple, thinly sliced","1 tsp / 5ml olive oil","1 tsp / 5ml apple cider vinegar","½ tsp honey","4–5 fresh sage leaves, torn (or ½ tsp dried)","Salt and pepper","¼ cup / 60ml chicken broth"],metric:["170g boneless pork loin chop","1 small apple, thinly sliced","5ml olive oil","5ml apple cider vinegar","2.5ml honey","Fresh sage leaves, torn (or dried)","Salt and pepper","60ml chicken broth"],boyfriend:{imperial:["8 oz / 225g boneless pork loin chop","1 medium apple, thinly sliced (extra)","1 tsp / 5ml olive oil","1 tsp / 5ml apple cider vinegar","½ tsp honey","4–5 fresh sage leaves, torn (or ½ tsp dried)","Salt and pepper","¼ cup / 60ml chicken broth","1 slice crusty bread, to serve (added)"],metric:["225g boneless pork loin chop","1 medium apple, thinly sliced (extra)","5ml olive oil","5ml apple cider vinegar","2.5ml honey","Fresh sage leaves, torn (or dried)","Salt and pepper","60ml chicken broth","1 slice crusty bread (added)"],cal:480,protein:46},steps:["Season pork chop generously with salt and pepper on both sides.","Heat olive oil in a pan over medium-high heat. Sear pork chop 3–4 minutes per side until golden and cooked through (internal temp 145°F / 63°C). Remove and let rest.","In the same pan, add sliced apple and sage. Cook 3–4 minutes until apple starts to soften and lightly caramelise.","Add chicken broth, apple cider vinegar and honey. Simmer 2–3 minutes, scraping up any browned bits from the pan, until slightly syrupy.","Return pork chop to the pan briefly to coat in the sauce, or slice and pour the apple sage sauce over the top.","🇫🇷 Pork and apple is a classic French and Normandy pairing — the slight acidity from the vinegar balances the natural sweetness of the apple beautifully, and using broth instead of cream keeps this genuinely light.","🌸 Apple cider vinegar has been shown to modestly improve insulin sensitivity when consumed with meals — a small but meaningful PCOS benefit alongside the lean protein from the pork loin.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 8 oz pork chop, extra apple, a slice of crusty bread to mop up the sauce."]},{title:"Mustard & Herb Crusted Pork Chops",category:"Dinner",cal:340,protein:38,time:"25 min",airfryer:true,pcos:"good",bloat:"low",imperial:["6 oz / 170g boneless pork loin chop","1 tbsp / 15ml Dijon mustard","1 tsp dried herbs (thyme, rosemary or Italian blend)","1 garlic clove, minced","2 tbsp / 15g breadcrumbs (panko works well)","Salt and pepper","Optional: lemon wedge to serve"],metric:["170g boneless pork loin chop","15ml Dijon mustard","Dried herbs (thyme, rosemary or Italian blend)","1 garlic clove, minced","15g breadcrumbs (panko)","Salt and pepper","Optional: lemon wedge"],boyfriend:{imperial:["8 oz / 225g boneless pork loin chop","1½ tbsp / 22ml Dijon mustard","1 tsp dried herbs (thyme, rosemary or Italian blend)","1 garlic clove, minced","¼ cup / 30g breadcrumbs (panko, doubled)","Salt and pepper","Optional: lemon wedge to serve"],metric:["225g boneless pork loin chop","22ml Dijon mustard","Dried herbs (thyme, rosemary or Italian blend)","1 garlic clove, minced","30g breadcrumbs (panko, doubled)","Salt and pepper","Optional: lemon wedge"],cal:460,protein:48},steps:["Pat pork chop dry. Season with salt and pepper.","Mix Dijon mustard, dried herbs and minced garlic in a small bowl. Spread evenly over both sides of the pork chop.","Press breadcrumbs onto the mustard layer on both sides — the mustard acts as the glue, so you don't need egg or flour.","Air fry at 400°F / 200°C for 12–14 minutes, flipping halfway, until golden and cooked through (internal temp 145°F / 63°C).","Alternatively bake at 400°F / 200°C for 18–20 minutes on a lined baking sheet.","Let rest 3 minutes before serving. Add a lemon wedge if using.","🌸 Dijon mustard is virtually calorie-free and adds huge flavour while acting as a natural breadcrumb adhesive — no need for a flour-egg-breadcrumb triple dredge that adds unnecessary calories.","💡 This technique works for any cut of meat — once you've got the mustard-and-herb crust down, you can use it on chicken breast or even firm fish.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 8 oz pork chop, double the breadcrumb coating for extra crunch."]},{title:"Greek-Style Lemon Garlic Pork Chops",category:"Dinner",cal:370,protein:38,time:"20 min + marinate",airfryer:false,pcos:"great",bloat:"low",imperial:["6 oz / 170g boneless pork loin chop","Marinade: 1 tbsp olive oil + juice of 1 lemon + 2 garlic cloves minced + 1 tsp dried oregano + salt and pepper","Side salad: 75g / 2.6 oz cucumber diced + 75g / 2.6 oz tomatoes diced + 20g / 0.7 oz red onion + 1 tsp olive oil + red wine vinegar + salt","15g / 0.5 oz feta cheese, crumbled","Optional: tzatziki to serve"],metric:["170g boneless pork loin chop","Marinade: 15ml olive oil + juice of 1 lemon + 2 garlic cloves + dried oregano + salt and pepper","Side salad: 75g cucumber + 75g tomatoes + 20g red onion + olive oil + red wine vinegar + salt","15g feta cheese, crumbled","Optional: tzatziki"],boyfriend:{imperial:["8 oz / 225g boneless pork loin chop","Marinade: 1 tbsp olive oil + juice of 1 lemon + 2 garlic cloves minced + 1 tsp dried oregano + salt and pepper","Side salad: 75g / 2.6 oz cucumber diced + 75g / 2.6 oz tomatoes diced + 20g / 0.7 oz red onion + 1 tsp olive oil + red wine vinegar + salt","30g / 1 oz feta cheese, crumbled (doubled)","1 warm pita, to serve (added)"],metric:["225g boneless pork loin chop","Marinade: 15ml olive oil + juice of 1 lemon + 2 garlic cloves + dried oregano + salt and pepper","Side salad: 75g cucumber + 75g tomatoes + 20g red onion + olive oil + red wine vinegar + salt","30g feta cheese, crumbled (doubled)","1 warm pita (added)"],cal:520,protein:50},steps:["Mix marinade ingredients: olive oil, lemon juice, minced garlic, oregano, salt and pepper.","Marinate the pork chop for at least 30 minutes, or up to 4 hours in the fridge for deeper flavour.","Heat a pan or grill over medium-high heat. Cook pork chop 4–5 minutes per side until golden and cooked through (internal temp 145°F / 63°C). Let rest 3 minutes before slicing.","While pork cooks, make the side salad: dice cucumber, tomatoes and red onion. Toss with olive oil, red wine vinegar and salt.","Plate the sliced pork chop alongside the salad. Top with crumbled feta and a dollop of tzatziki if using.","🌸 This mirrors the same anti-inflammatory profile as your Greek Lamb Bowl — oregano and garlic are both well studied for their anti-inflammatory properties, and the acid from the lemon marinade helps tenderize the lean pork loin while adding brightness.","💡 Marinating ahead of time means this comes together in under 10 minutes of active cooking on a weeknight — prep the marinade the night before or in the morning.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 8 oz pork chop, double the feta, a warm pita added on the side."]},{title:"Pork Chops with Mushroom Onion Sauce (Lightened)",category:"Dinner",cal:380,protein:38,time:"25 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["6 oz / 170g boneless pork loin chop","1 cup / 70g mushrooms, sliced","½ small onion, thinly sliced","1 tsp / 5ml olive oil","¼ cup / 60ml chicken broth or dry white wine","2 tbsp / 30g nonfat Greek yogurt (cream swap)","1 garlic clove, minced","Fresh thyme, salt and pepper"],metric:["170g boneless pork loin chop","70g mushrooms, sliced","½ small onion, thinly sliced","5ml olive oil","60ml chicken broth or dry white wine","30g nonfat Greek yogurt","1 garlic clove, minced","Fresh thyme, salt and pepper"],steps:["Season pork chop with salt and pepper. Sear in a hot pan with olive oil 3–4 minutes per side until golden and cooked through (internal temp 145°F / 63°C). Remove and set aside to rest.","In the same pan, add sliced onion and cook 3–4 minutes until softened. Add mushrooms and garlic, cook another 4–5 minutes until mushrooms release their liquid and turn golden.","Add broth or wine to deglaze, scraping up any browned bits. Simmer 2–3 minutes until slightly reduced.","Remove pan from heat. Stir in Greek yogurt off the heat to prevent it splitting — mix until the sauce turns creamy.","Return pork chop to the pan briefly to warm through and coat in the sauce, or slice and spoon the sauce over the top. Garnish with fresh thyme.","🌸 This swaps the traditional heavy cream for Greek yogurt added off the heat — you genuinely keep the creamy, rich mouthfeel while adding protein and probiotics instead of saturated fat.","⚠️ Onions can contribute to bloating for some — if you're sensitive, cook the onion a few extra minutes until very soft, or reduce the quantity slightly.","💡 This is proper French-bistro comfort food, lightened. Serve with a small portion of rice or mashed cauliflower to soak up the sauce."]},{title:"Sheet Pan Pork Chops with Brussels Sprouts & Sweet Potato",category:"Dinner",cal:410,protein:38,time:"35 min",airfryer:false,pcos:"good",bloat:"low",imperial:["6 oz / 170g boneless pork loin chop","1 cup / 90g Brussels sprouts, halved","1 small sweet potato (about 150g / 5.3 oz), cubed","1 tbsp / 15ml olive oil, divided","1 tsp dried rosemary or thyme","2 garlic cloves, minced","Salt and pepper"],metric:["170g boneless pork loin chop","90g Brussels sprouts, halved","1 small sweet potato (~150g), cubed","15ml olive oil, divided","Dried rosemary or thyme","2 garlic cloves, minced","Salt and pepper"],boyfriend:{imperial:["8 oz / 225g boneless pork loin chop","1 cup / 90g Brussels sprouts, halved","1 medium sweet potato (about 220g / 7.8 oz, extra), cubed","1½ tbsp / 22ml olive oil, divided (extra drizzle at the end)","1 tsp dried rosemary or thyme","2 garlic cloves, minced","Salt and pepper"],metric:["225g boneless pork loin chop","90g Brussels sprouts, halved","220g sweet potato (extra), cubed","22ml olive oil, divided (extra)","Dried rosemary or thyme","2 garlic cloves, minced","Salt and pepper"],cal:530,protein:48},steps:["Preheat oven to 400°F / 200°C. Line a sheet pan with parchment paper.","Toss Brussels sprouts and cubed sweet potato with half the olive oil, garlic, salt and pepper. Spread on the sheet pan.","Roast vegetables alone for 12 minutes to give them a head start since they take a bit longer than the pork.","Push vegetables to one side. Season pork chop with the remaining olive oil, rosemary or thyme, salt and pepper. Add to the empty side of the pan.","Roast 15–18 minutes more until pork is cooked through (internal temp 145°F / 63°C) and vegetables are tender with crisped edges.","Let pork rest 3 minutes before slicing.","🌸 Brussels sprouts contain DIM, a compound that helps the body process and clear excess oestrogen — directly relevant to PCOS hormone balance. Sweet potato's low GI makes this a genuinely well-balanced one-pan dinner.","💡 One pan, very little hands-on effort, and a complete balanced meal — this is exactly the kind of weeknight dinner that fits a busy schedule without sacrificing nutrition.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 8 oz pork chop, extra sweet potato, an extra drizzle of olive oil at the end."]},{title:"Pork Chop Stir-Fry with Bell Peppers",category:"Dinner",cal:350,protein:36,time:"15 min",airfryer:false,pcos:"good",bloat:"low",imperial:["6 oz / 170g pork loin, thinly sliced against the grain","1 cup / 150g bell peppers (mixed colours), sliced","½ small onion, sliced","2 tbsp / 30ml low-sodium soy sauce","1 tsp / 5ml sesame oil","1 garlic clove, minced","½ tsp fresh ginger, grated","1 cup cooked cauliflower rice","Sesame seeds + green onions to garnish"],metric:["170g pork loin, thinly sliced","150g bell peppers, sliced","½ small onion, sliced","30ml low-sodium soy sauce","5ml sesame oil","1 garlic clove, minced","2.5ml fresh ginger, grated","100g cauliflower rice","Sesame seeds + green onions"],boyfriend:{imperial:["8 oz / 225g pork loin, thinly sliced against the grain","1½ cups / 220g bell peppers (mixed colours, extra), sliced","½ small onion, sliced","2 tbsp / 30ml low-sodium soy sauce","1 tsp / 5ml sesame oil","1 garlic clove, minced","½ tsp fresh ginger, grated","1 cup / 180g regular rice (not cauliflower)","Sesame seeds + green onions to garnish"],metric:["225g pork loin, thinly sliced","220g bell peppers, sliced (extra)","½ small onion, sliced","30ml low-sodium soy sauce","5ml sesame oil","1 garlic clove, minced","2.5ml fresh ginger, grated","180g regular rice","Sesame seeds + green onions"],cal:520,protein:46},steps:["Slice pork loin very thinly against the grain — this is key for tenderness in a quick stir-fry.","Heat sesame oil in a wok or large pan over high heat. Add pork slices and stir-fry 2–3 minutes until just cooked through. Remove and set aside.","Add bell peppers and onion to the same pan. Stir-fry 3–4 minutes until just tender but still with some bite.","Add garlic and ginger, cook 30 seconds until fragrant.","Return pork to the pan. Add soy sauce and toss everything together 1–2 minutes until well coated and heated through.","Serve over cauliflower rice. Garnish with sesame seeds and green onions.","🌸 Quick high-heat cooking preserves more nutrients in the bell peppers, which are exceptionally high in vitamin C — important for adrenal function which is often dysregulated in PCOS. Using cauliflower rice keeps the glycemic impact low.","💡 This comes together faster than ordering takeout and tastes noticeably fresher. Slice everything ahead of time and the active cooking takes under 10 minutes.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 8 oz pork loin, regular rice instead of cauliflower, extra peppers."]},{title:"Pork Chops with Balsamic Roasted Grapes",category:"Dinner",cal:370,protein:36,time:"25 min",airfryer:false,pcos:"good",bloat:"low",imperial:["6 oz / 170g boneless pork loin chop","1 cup / 150g red or black grapes, halved if large","1 tbsp / 15ml balsamic vinegar","1 tsp / 5ml olive oil, divided","Fresh thyme or rosemary","Salt and pepper"],metric:["170g boneless pork loin chop","150g red or black grapes, halved if large","15ml balsamic vinegar","5ml olive oil, divided","Fresh thyme or rosemary","Salt and pepper"],boyfriend:{imperial:["8 oz / 225g boneless pork loin chop","1½ cups / 220g red or black grapes, halved if large (extra)","1 tbsp / 15ml balsamic vinegar","1 tsp / 5ml olive oil, divided","Fresh thyme or rosemary","Salt and pepper","1 small piece crusty bread, to serve (added)"],metric:["225g boneless pork loin chop","220g red or black grapes, halved if large (extra)","15ml balsamic vinegar","5ml olive oil, divided","Fresh thyme or rosemary","Salt and pepper","1 small piece crusty bread (added)"],cal:500,protein:46},steps:["Preheat oven to 400°F / 200°C.","Toss grapes with half the olive oil, balsamic vinegar and a pinch of salt. Spread on a small baking sheet or oven-safe dish.","Roast grapes 12–15 minutes until they're soft and starting to burst, releasing their juices and concentrating their sweetness.","Meanwhile, season pork chop with salt, pepper and fresh thyme or rosemary. Sear in a pan with the remaining olive oil 3–4 minutes per side until golden and cooked through (internal temp 145°F / 63°C). Let rest 3 minutes.","Slice the pork chop and plate it with the roasted balsamic grapes spooned over the top, along with any juices from the pan.","🌸 Roasted grapes create a natural sweet-tart sauce without any added sugar — the balsamic vinegar enhances their natural acidity. Grapes contain resveratrol, an antioxidant with mild anti-inflammatory properties relevant to PCOS.","💡 This looks and tastes far more elevated than the effort required — it's a genuinely impressive dish for a dinner you want to feel a little special, like a Friday night in instead of out.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 8 oz pork chop, extra grapes, a small piece of crusty bread to soak up the juices."]},{title:"Pork Chop with Crispy Potatoes, Burrata & Greens",category:"Dinner",cal:560,protein:40,time:"35 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["6 oz / 170g boneless pork loin chop","150g / 5.3 oz baby potatoes, halved","1½ tsp / 7.5ml olive oil, divided","2 garlic cloves, minced (1 for potatoes, 1 for pork)","1 tsp fresh or dried rosemary","Salt and pepper","2 cups / 60g salad greens — arugula, spring mix, romaine or spinach all work","½ cup / 75g diced or sliced tomatoes (regular or Roma)","45g / 1.6 oz burrata (about ⅓ of a standard ball)","Flaky sea salt","Drizzle of good olive oil + balsamic vinegar for the greens","Optional: fresh basil leaves, torn"],metric:["170g boneless pork loin chop","150g baby potatoes, halved","7.5ml olive oil, divided","2 garlic cloves, minced (split for potatoes and pork)","Fresh or dried rosemary","Salt and pepper","60g salad greens — arugula, spring mix, romaine or spinach","75g diced or sliced tomatoes","45g burrata (~⅓ standard ball)","Flaky sea salt","Drizzle of olive oil + balsamic vinegar","Optional: fresh basil, torn"],boyfriend:{imperial:["8 oz / 225g boneless pork loin chop","200g / 7 oz baby potatoes, halved (extra)","2 tsp / 10ml olive oil, divided (extra drizzle at the end)","2 garlic cloves, minced (split for potatoes and pork)","1 tsp fresh or dried rosemary","Salt and pepper","2 cups / 60g salad greens — arugula, spring mix, romaine or spinach all work","15g / 0.5 oz shaved or grated parmesan (in place of burrata)","Flaky sea salt","Drizzle of olive oil + balsamic vinegar for the greens","Optional: cucumber or bell pepper slices for extra crunch"],metric:["225g boneless pork loin chop","200g baby potatoes, halved (extra)","10ml olive oil, divided (extra drizzle)","2 garlic cloves, minced (split for potatoes and pork)","Fresh or dried rosemary","Salt and pepper","60g salad greens — arugula, spring mix, romaine or spinach","15g shaved or grated parmesan (in place of burrata)","Flaky sea salt","Drizzle of olive oil + balsamic vinegar","Optional: cucumber or bell pepper slices"],cal:650,protein:56},steps:["Preheat oven to 400°F / 200°C. Toss halved baby potatoes with ½ tsp olive oil, 1 minced garlic clove, salt and pepper. Spread on a lined baking sheet, cut-side down for maximum crispiness.","Roast potatoes 25–28 minutes, flipping once halfway, until golden and crispy outside, tender inside.","While potatoes roast, season the pork chop with salt, pepper, rosemary and the remaining garlic clove, minced.","About 10 minutes before the potatoes finish, heat 1 tsp olive oil in a pan over medium-high heat. Sear the pork chop 3–4 minutes per side until golden and cooked through (internal temp 145°F / 63°C). Let rest 3 minutes before slicing.","While the pork rests, toss your salad greens of choice with a small drizzle of olive oil and balsamic vinegar — this is your vegetable and fibre component, keep it simple and bright to balance the richness of the burrata.","Plate everything together: sliced pork chop, crispy potatoes, and the dressed greens alongside.","Tear the burrata directly over the warm potatoes or pork so it softens slightly and turns lightly melty at the edges. Finish with flaky sea salt and torn basil if using.","🥗 Greens swap: no arugula on hand? Spring mix, baby spinach, romaine or even shredded cabbage all work fine here — the goal is just a fresh, slightly acidic contrast to the rich burrata, so use whatever salad base you have.","🍅 Tomato swap: if cherry tomatoes aren't available, sliced regular tomatoes, Roma tomatoes, or roasted red peppers work just as well in Eloise's portion.","🍽️ This plate is fully balanced: the pork chop is your protein, the potatoes are your glucides (carbohydrate energy source — skin-on for added fibre), the greens and tomatoes are your fibre and micronutrients (vitamin C, folate, antioxidants), and the burrata is a deliberately small treat portion that adds richness without taking over the plate.","🌸 Rated 'caution' for PCOS specifically because of the burrata's saturated fat content — this is intentionally an occasional treat, not a weekly staple. Eating mindfully and occasionally is a completely normal and healthy part of any long-term eating pattern — restriction-only approaches tend to backfire far more than the occasional 45g of burrata ever will.","💡 The acidity from the balsamic on the greens is doing real work here — it cuts through the richness of the burrata and keeps the whole plate from feeling heavy, so you can genuinely enjoy the treat without it overwhelming the meal.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — no tomatoes and no burrata on his plate at all. 8 oz pork chop, extra potatoes, and parmesan in place of the burrata for richness. Cucumber or bell pepper slices optional for crunch."]},// ── FROM INSTAGRAM / WEB FINDS ─────────────────────────────
{title:"5-Minute Acai Bowl",category:"Breakfast",cal:340,protein:14,time:"5 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["1 packet / 100g unsweetened frozen acai berry blend (Sambazon or Trader Joe's)","1 frozen banana","¼–½ cup / 60–120ml non-dairy milk (or 0% Greek yogurt instead, see note)","Fresh berries, to top","1 tbsp granola, to top","1 tbsp peanut butter, to top","Optional toppings: nut or seed butters, cacao nibs, hemp seeds, chia seeds, flax seeds"],metric:["100g unsweetened frozen acai berry blend","1 frozen banana","60–120ml non-dairy milk (or 0% Greek yogurt, see note)","Fresh berries, to top","1 tbsp granola","1 tbsp peanut butter","Optional: nut butter, cacao nibs, hemp/chia/flax seeds"],steps:["In a high-powered blender, combine the acai packet, frozen banana and ¼ cup of your milk of choice.","Blend on low, using the tamper to push down the ingredients, until the mixture is completely smooth. Add a little more liquid only if needed — too much liquid makes the bowl thin instead of thick and creamy.","If your blender doesn't have a tamper, stop frequently to scrape down the sides and push the unblended pieces toward the blades.","Pour into a bowl and top with fresh berries, granola, peanut butter or your favourite toppings. Eat immediately, while still cold and thick.","⚠️ PCOS note: a standard acai bowl like this is a moderate-to-high glycemic breakfast — frozen banana plus acai blend (which often still contains some natural fruit sugar even unsweetened) with no built-in protein source. The antioxidants in acai are genuinely beneficial, but on its own this spikes blood sugar faster than your usual breakfasts.","🌸 Easy fix: swap the non-dairy milk for ¼ cup / 60g of 0% Greek yogurt blended right in. You get the same thick, creamy texture, plus 8–10g of protein that meaningfully slows the sugar absorption. Worth doing as your default rather than the occasional treat version.","💡 Use a frozen banana, not fresh — it's what gives the bowl its thick, ice-cream-like texture. Keep a few peeled and frozen in a bag specifically for this.","🔄 Sterling's version: blend in a full scoop of vanilla protein powder along with the yogurt swap, double the granola and peanut butter on top. Turns this into a proper post-run recovery bowl rather than a light breakfast."]},{title:"Laughing Cow Cheese Naan (Homemade)",category:"Snack",cal:230,protein:9,time:"20 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["1 cup / 130g all-purpose flour (or half whole wheat for more fibre)","½ tsp baking powder","Pinch of salt","1 tsp / 5ml olive oil","⅓ cup / 80g plain yogurt","2–3 tbsp / 30–45ml warm water, as needed to bring dough together","4 wedges Laughing Cow cheese, mashed with a fork","1 tsp butter or ghee, melted, to brush on after cooking","Optional: pinch of garlic powder worked into the dough"],metric:["130g all-purpose flour (or half whole wheat)","2.5ml baking powder","Pinch of salt","5ml olive oil","80g plain yogurt","30–45ml warm water, as needed","4 wedges Laughing Cow cheese, mashed with a fork","5ml butter or ghee, melted, to brush after cooking","Optional: pinch of garlic powder"],steps:["📍 Adapted from a Marmiton-style cheese naan technique using baking powder instead of yeast — this is the quick version, ready in 20 minutes with no rising time.","In a bowl, mix flour with salt, baking powder and olive oil. Add the yogurt and mix.","Add warm water a little at a time until you get a soft, very slightly sticky dough — you may not need all of it depending on your flour.","Knead briefly on a floured surface, about 1 minute, just until smooth. Divide into 4 equal balls.","Roll out each ball into a thin disc, about 2mm / less than ⅛ inch thick. You'll end up with 4 thin discs total.","In a small bowl, mash the Laughing Cow wedges with a fork until smooth and spreadable.","Take 2 of the rolled discs. Spread the mashed cheese over one, leaving a small border around the edge uncovered. Place the second disc on top and pinch the edges firmly together to seal the cheese inside — like a flat dumpling. Repeat with the remaining 2 discs to make a second filled naan.","Gently roll or press each filled naan once more to flatten slightly and make sure the seal holds — don't roll too hard or the cheese will push out the sides.","Heat a dry non-stick pan over medium-low heat (no oil needed). Cook each cheese naan 2–3 minutes per side, until golden brown spots appear and the dough is cooked through — when you see dark spots forming on one side, that's your cue to flip.","As soon as they come off the pan, brush with melted butter or ghee while still hot.","🌸 PCOS note: refined white flour naan is moderate-to-high glycemic on its own. Swapping half the flour for whole wheat measurably slows that down without changing the texture much. The yogurt in the dough also adds a small amount of protein.","💡 This makes 2 generously cheese-stuffed naan. Keep cooked naan stacked on a plate inside a low oven (around 175°F / 80°C) to stay warm if making a batch for several people.","💡 Make a double batch of dough and freeze extra rolled, unfilled discs between sheets of parchment — thaw, fill with cheese, and cook fresh whenever you want one."]},{title:"Quick Naan Pizza",category:"Dinner",cal:380,protein:24,time:"15 min (+ naan if homemade)",airfryer:false,pcos:"caution",bloat:"low",imperial:["1 Laughing Cow cheese naan (homemade — see separate recipe — or store-bought cheese naan)","2 tbsp / 30ml marinara sauce, pesto, or a light swipe of olive oil for the base","2 oz / 55g cooked chicken or turkey sausage, sliced","2 tbsp / 20g red onion, thinly sliced","Jalapeño slices, to taste","¼ cup / 40g bell peppers, sliced","Optional: extra shredded cheese, fresh basil"],metric:["1 Laughing Cow cheese naan (homemade or store-bought)","30ml marinara, pesto, or olive oil for the base","55g cooked chicken or turkey sausage, sliced","20g red onion, thinly sliced","Jalapeño slices, to taste","40g bell peppers, sliced","Optional: extra shredded cheese, fresh basil"],steps:["Preheat oven to 475°F / 245°C.","Place the naan on a baking sheet. Spread a light, even layer of marinara sauce, pesto, or a thin swipe of olive oil over the top as your base — don't overdo the sauce or the naan will turn soggy in the centre.","Top with cooked chicken or turkey sausage slices, red onion, jalapeño and bell peppers.","Bake 8–10 minutes until the edges are crispy and the toppings are hot and the cheese (especially if using the homemade Laughing Cow version) is melted through.","Slice and serve immediately while the crust is still crisp.","🌸 Using the homemade Laughing Cow naan as the base means the cheese is already built into the crust itself, so you can go lighter on additional shredded cheese on top — keeps this satisfying without it tipping into heavy comfort food territory.","💡 This is genuinely one of the fastest homemade dinners possible if you keep naan made ahead in the freezer — 10 minutes from freezer to table.","🔄 Sterling's version: 2 naan instead of 1, double the chicken or sausage, add a layer of shredded mozzarella on top before baking for extra protein and calories."]},{title:"Homemade Marinara Sauce",category:"Snack",cal:60,protein:2,time:"25 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 can / 400g whole peeled or crushed tomatoes","2 tbsp / 30ml olive oil","3 garlic cloves, minced","½ small onion, finely diced (optional)","1 tsp dried oregano","½ tsp dried basil (or a few fresh leaves, torn)","Pinch of red pepper flakes (optional)","Salt and pepper to taste","1 tsp / 5ml balsamic vinegar (optional, rounds out acidity)"],metric:["400g can whole peeled or crushed tomatoes","30ml olive oil","3 garlic cloves, minced","½ small onion, finely diced (optional)","Dried oregano, dried basil, red pepper flakes, salt and pepper","5ml balsamic vinegar (optional)"],steps:["Heat olive oil in a saucepan over medium heat. If using onion, add it now and cook 3–4 minutes until softened.","Add minced garlic, cook 30 seconds until fragrant — don't let it brown or it turns bitter.","Add the tomatoes, breaking them up with a spoon if whole. Add oregano, basil, red pepper flakes, salt and pepper.","Simmer uncovered 15–20 minutes, stirring occasionally, until thickened to your liking.","Stir in balsamic vinegar at the end if using — it rounds out the acidity without needing any added sugar. Taste and adjust seasoning.","For a smoother sauce, blend briefly with an immersion blender. For a chunkier, rustic texture, leave as is.","🌸 Tomatoes are rich in lycopene, a powerful anti-inflammatory antioxidant — genuinely beneficial for PCOS. Making this yourself means zero added sugar, unlike most jarred marinaras, even ones labelled \"no sugar added\" which can still sneak some in via natural flavourings.","💡 Makes about 1.5 cups / 360ml, enough for 2–3 servings. Freezes beautifully — make a double batch and freeze in portions for quick pasta nights, the Chicken Parmesan Bowl, or as the base for the Quick Naan Pizza."]}];const GROCERY={heb:{label:"H-E-B",note:"Your complete foundation",color:C.heb,categories:[{name:"🥩 Proteins",items:[{name:"HEB Boneless Skinless Chicken Breasts",brand:"HEB Brand — Value Pack",why:"🌸 31g protein / 165 kcal — high protein supports insulin balance"},{name:"Butterball 93% Lean Ground Turkey",brand:"Butterball — 1 lb / 450g pack",why:"22g protein, low fat, super versatile"},{name:"Vital Farms Pasture-Raised Eggs",brand:"Vital Farms — 12 count",why:"🌸 6g protein + hormone-balancing choline — best quality at HEB"},{name:"Fage Total 0% Greek Yogurt",brand:"Fage — Plain, 32 oz / 900g tub",why:"17g protein per 180ml, zero sugar"},{name:"Good Culture Low-Fat Cottage Cheese",brand:"Good Culture — 16 oz / 450g",why:"14g protein, cleaner ingredients than most"},{name:"StarKist Albacore Tuna in Water",brand:"StarKist — 5 oz / 140g cans, 4-pack",why:"🌸 20g protein + omega-3s — anti-inflammatory for PCOS"},{name:"Atlantic Salmon Fillets ,sets:"3 sets of 30 sec. Build to 60 sec over weeks."},{name:"Dead Bug",muscle:"Deep Core + Lower Back Stability",equipment:"Mat",level:"Beginner",video_tip:"Search 'dead bug exercise form core'",how:["Lie on back, arms straight up, knees bent at 90°","Lower opposite arm and leg toward floor simultaneously","Lower back MUST stay pressed into mat — this is the whole exercise","Bring back to start, switch sides","Breathe out as you lower, breathe in as you return"],mistakes:["Lower back arching off floor — reduce range of motion","Moving too fast","Holding breath"],beginner_weight:"Bodyweight only",sets:"3 sets of 8 reps each side"}],running_strength_tips:[{icon:"🦵",title:"Glutes are your engine",tip:"Runners who don't strength train almost always have weak glutes — the hip flexors take over and that's where injuries start. The goblet squat and glute bridge on Sunday are the two most important exercises for your running performance."},{icon:"🧘",title:"Stretch after every run — no exceptions",tip:"Hip flexors, calves and hamstrings tighten significantly with daily running. Tight hip flexors reduce squat depth and hurt glute activation in the gym. 10 minutes of stretching after every run protects your weekend sessions."},{icon:"💤",title:"Saturday is your hardest gym day",tip:"You run Mon–Fri, so Saturday is your first gym day after a full week of running. Your legs need the break — that's why Saturday is upper body only. Sunday has leg work because you've had one full rest day."},{icon:"🥩",title:"Protein is non-negotiable",tip:"You're running 4–5 miles daily AND lifting on weekends. At 194 lbs / 88kg with that activity level you need 155–165g / 5.5–5.8oz of protein every single day. Without it, you'll lose muscle along with fat and feel exhausted."},{icon:"📈",title:"Progress looks different for runners",tip:"Runners who add strength training typically don't see dramatic weight changes immediately — the muscle you build partially offsets the fat you lose. Judge your progress by how running feels (easier, faster, less tired) and how your clothes fit, not just the scale."},{icon:"🔼",title:"When to increase weight",tip:"Same rule: if you can do all reps with good form, increase by the smallest increment available — usually 2 kg / 4 lbs. If you can't complete 8 reps with good form, the weight is too heavy. Progress should feel gradual, not forced."}],progression:[{phase:"Weeks 1–4 — Learn the movements",intensity:"45 min · Low weight",key:"Every exercise will feel awkward at first — that's completely normal. Focus entirely on feeling the right muscle work. Film yourself from the side. Ask gym staff to check your form if unsure.",checkpoints:["Can you feel your back (not biceps) during rows?","Are your knees tracking correctly in squats?","Can you hold a plank for 30 seconds?","Does the gym feel less intimidating than Week 1?"]},{phase:"Weeks 5–8 — Add weight, add confidence",intensity:"45–60 min · Moderate weight",key:"Increase weight by the smallest increment once you can complete all reps cleanly. The last 2 reps should feel challenging but doable.",checkpoints:["Are you lifting more than Week 1?","Are your runs feeling any easier or faster?","Are your glutes actually sore after Sunday sessions? If not, increase weight.","Still stretching after every run? No exceptions."]},{phase:"Weeks 9–14 — Build real strength",intensity:"60 min · Progressive weight",key:"This is where the running and lifting synergy becomes noticeable. You should feel stronger on runs and more capable in the gym. Results compound here.",checkpoints:["Is your goblet squat weight significantly higher than Week 1?","Is your running pace improving or the effort reducing?","Are your clothes fitting differently?","Consistent with both Saturday AND Sunday — no skipping?"]}],machines:[{name:"Lat Pulldown",week:"Week 5",muscle:"Back + Biceps",goal:"Upper body strength + running posture",equipment:"Lat pulldown machine",video_tip:"Search 'lat pulldown form beginners'",how:["Sit at the machine, adjust thigh pad snugly over your legs","Grip bar slightly wider than shoulder-width, palms facing away","Pull bar down to your upper chest — lead with elbows, not hands","Squeeze your back at the bottom — feel it between your shoulder blades","Let the bar rise slowly back up, arms fully extended"],mistakes:["Pulling behind the head — skip this entirely","Using momentum to yank the bar down","Not fully extending at the top"],beginner_weight:"25–30 kg / 55–66 lbs",sets:"3 sets of 10 reps",why:"Runners have almost zero pulling strength — it's completely untrained. The lat pulldown builds the back muscles that keep your torso upright in the final miles of a run, reducing fatigue and improving form."},{name:"Leg Press",week:"Week 5",muscle:"Quads + Glutes + Hamstrings",goal:"Leg strength + running power",equipment:"Leg press machine",video_tip:"Search 'leg press form beginners'",how:["Sit in machine, back and head against pad","Feet shoulder-width on platform, toes slightly out","Lower platform by bending knees to 90°","Drive through heels to press back up — don't lock knees at top","Keep lower back pressed into the seat throughout"],mistakes:["Knees caving inward — push them out","Locking knees at the top","Lowering too fast"],beginner_weight:"50–60 kg / 110–132 lbs",sets:"3 sets of 10 reps",why:"You can load the leg press 4–5x heavier than a goblet squat. For a runner this directly translates to more powerful push-off and faster finishing speed. This is your most important machine."},{name:"Seated Cable Row",week:"Week 5",muscle:"Mid-back + Biceps",goal:"Upper body balance, running posture",equipment:"Cable row machine + V-bar",video_tip:"Search 'seated cable row form beginners'",how:["Sit at cable row, feet on platform, slight knee bend","Grip V-bar, sit up tall","Pull bar to lower stomach — elbows go back behind you","Squeeze shoulder blades together at the end","Extend arms slowly with full stretch forward"],mistakes:["Using lower back momentum — torso stays almost still","Rounding shoulders forward","Pulling to chest instead of stomach"],beginner_weight:"25–30 kg / 55–66 lbs",sets:"3 sets of 12 reps",why:"Runners almost always have tight, weak mid-backs from the forward lean of running. Cable rows fix this directly, reducing injury risk and making you more efficient over distance."},{name:"Cable Tricep Pushdown",week:"Week 6",muscle:"Triceps",goal:"Arm definition + upper body balance",equipment:"Cable machine + rope attachment",video_tip:"Search 'cable tricep pushdown rope form'",how:["Attach rope to high pulley","Stand facing machine, grip rope ends, elbows pinned to sides","Push rope down and slightly apart until arms fully straight","Squeeze triceps hard at bottom for 1 second","Let rope rise slowly — control the movement up"],mistakes:["Elbows flaring out — keep them glued to your sides","Leaning excessively forward","Not fully extending at the bottom"],beginner_weight:"15–20 kg / 33–44 lbs",sets:"3 sets of 12 reps",why:"Running does almost nothing for arm definition. Cable tricep work directly tones the back of the arms and builds the arm drive that improves your running economy over longer distances."},{name:"Hip Abductor Machine",week:"Week 6",muscle:"Outer glutes + Hip stabilisers",goal:"Running injury prevention + glute strength",equipment:"Hip abductor machine",video_tip:"Search 'hip abductor machine form'",how:["Sit in machine with pads against outer thighs","Push legs outward as far as comfortable","Hold 1 second at widest point, squeeze glutes","Return slowly — don't let weight slam back"],mistakes:["Going too fast — slow controlled movement is everything here","Forgetting to squeeze glutes at the widest point","Too much weight before feeling the right muscles"],beginner_weight:"30–40 kg / 66–88 lbs",sets:"3 sets of 15 reps",why:"Weak hip abductors are the #1 cause of runner's knee and IT band syndrome. Strengthening them now is the best injury prevention investment you can make for long-term running."},{name:"Chest Press Machine",week:"Week 6",muscle:"Chest + Triceps + Shoulders",goal:"Upper body strength without needing a spotter",equipment:"Chest press machine",video_tip:"Search 'chest press machine form beginners'",how:["Adjust seat so handles are at chest height","Sit back fully against pad","Grip handles, press forward until arms nearly straight","Lower slowly back — 3 seconds down","Keep shoulder blades pinned back throughout"],mistakes:["Seat height wrong — handles should be at chest not chin","Arching back off the pad","Locking elbows at full extension"],beginner_weight:"30–40 kg / 66–88 lbs",sets:"3 sets of 12 reps",why:"Lets you go significantly heavier than dumbbell press without a spotter, driving more chest and shoulder development. Great swap for Saturday sessions when you want to push harder."}]};// ── WORKOUT PLAN ────────────────────────────────────────────

e rises, body temperature increases, inflammation is higher. This is the PCOS danger zone for overtraining.",do:["Keep lifting but reduce weight by 10–15%","Focus on form over load","More rest between sets (2–3 min instead of 1)","Prioritise sleep and stress management","Gentle walking over intense cardio"],avoid:["Pushing through unusual fatigue — listen to your body","HIIT or high-intensity cardio","Comparing this week to your ovulatory week"],tip:"Many PCOS women plateau here because they fight the luteal phase instead of working with it. Reduce intensity, maintain consistency, trust the process."}],exercises:[// UPPER BODY
