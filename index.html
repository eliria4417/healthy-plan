ed oregano, salt & pepper","Avocado oil spray"],steps:["Pound chicken to even ¾-inch / 2cm thickness for even cooking.","Mix lemon juice + spices, coat chicken thoroughly. Let sit 5 min.","Spray air fryer basket. Place chicken in single layer.","Air fry 375°F / 190°C for 10–12 min, flip halfway. Internal temp: 165°F / 74°C.","Rest 3 min before slicing. Serve over spinach or with broccoli."]},{title:"Turkey & Zucchini Stir-Fry",category:"Dinner",cal:350,protein:32,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4 oz 93% lean ground turkey","1 medium zucchini diced","½ cup bell peppers sliced","2 tbsp coconut aminos","2 garlic cloves minced, 1 tsp sesame oil","Optional: ½ cup brown rice (+100 kcal)"],metric:["115g 93% lean ground turkey","1 medium zucchini diced","80g bell peppers sliced","30ml coconut aminos","2 garlic cloves minced, 5ml sesame oil","Optional: 90g cooked brown rice (+100 kcal)"],steps:["Spray pan, sauté garlic on medium-high 30 seconds.","Add turkey, break apart, cook until browned ~5 minutes.","Add zucchini and peppers, cook 4–5 min until tender-crisp.","Pour in coconut aminos and sesame oil, toss to coat.","Serve alone or over a small portion of brown rice."]},{title:"Air Fryer Salmon with Lemon",category:"Dinner",cal:320,protein:34,time:"15 min",airfryer:true,pcos:"great",bloat:"low",imperial:["1 salmon fillet (~6 oz)","Juice of ½ lemon","1 tsp garlic powder, dried dill","Salt & pepper","Avocado oil spray"],metric:["1 salmon fillet (~170g)","Juice of ½ lemon","5ml garlic powder, dried dill","Salt & pepper","Avocado oil spray"],steps:["Pat salmon dry. Spray with avocado oil, season with all spices.","Squeeze lemon generously over the top.","Air fry at 400°F / 200°C for 10–12 minutes. No flipping needed.","Serve with a big spinach salad or roasted broccoli."]},{title:"Air Fryer Chicken Fajita Bowl",category:"Dinner",cal:380,protein:38,time:"25 min",airfryer:true,pcos:"great",bloat:"medium",imperial:["2 chicken breasts sliced into strips","1 cup bell peppers sliced","½ onion sliced","1 tsp cumin + 1 tsp chili powder + garlic powder","½ cup frozen cauliflower rice","Avocado oil spray, lime juice, salt"],metric:["2 chicken breasts sliced into strips","150g bell peppers sliced","½ onion sliced","5ml cumin + 5ml chili powder + garlic powder","90g frozen cauliflower rice","Avocado oil spray, lime juice, salt"],steps:["Toss chicken strips and veggies with all spices and a spray of oil.","Spread in air fryer basket in a single layer.","Air fry at 390°F / 200°C for 12–14 min, shaking halfway.","Microwave cauliflower rice per package, use as bowl base.","Top with chicken fajita mix, squeeze of lime. Done."]},{title:"Ground Turkey Soup",category:"Dinner",cal:300,protein:30,time:"25 min",airfryer:false,pcos:"great",bloat:"medium",imperial:["4 oz 93% lean ground turkey","1 can diced tomatoes (14.5 oz, no salt added)","1 cup low-sodium chicken broth","½ cup zucchini diced","½ cup spinach","1 garlic clove, 1 tsp Italian seasoning","Salt & pepper"],metric:["115g 93% lean ground turkey","1 can diced tomatoes (~410g, no salt added)","240ml low-sodium chicken broth","80g zucchini diced","30g spinach","1 garlic clove, 5ml Italian seasoning","Salt & pepper"],steps:["Brown turkey with garlic in a pot over medium heat, ~5 min.","Add diced tomatoes, broth, zucchini, and seasoning.","Bring to a boil, then simmer 15 minutes.","Stir in spinach in the last 2 min — it wilts fast.","Season to taste. This makes excellent leftovers."]},{title:"Chicken & Broccoli Sheet Pan",category:"Dinner",cal:340,protein:40,time:"30 min",airfryer:false,pcos:"great",bloat:"medium",imperial:["2 chicken breasts","2 cups broccoli florets","1 tbsp olive oil","1 tsp garlic powder, 1 tsp smoked paprika","Salt & pepper","Optional: red pepper flakes"],metric:["2 chicken breasts","200g broccoli florets","15ml olive oil","5ml garlic powder, 5ml smoked paprika","Salt & pepper","Optional: red pepper flakes"],steps:["Preheat oven to 425°F / 220°C. Line a baking sheet with foil.","Toss broccoli in olive oil, salt, and pepper. Spread on sheet.","Season chicken with garlic, paprika, salt. Place beside broccoli.","Roast 20–25 min until chicken hits 165°F / 74°C and broccoli is slightly charred.","Squeeze lemon over everything before serving."]},{title:"Air Fryer Crispy Drumsticks",category:"Dinner",cal:370,protein:38,time:"30 min",airfryer:true,pcos:"great",bloat:"low",imperial:["4 chicken drumsticks (skin on)","1 tsp garlic powder","1 tsp smoked paprika","½ tsp onion powder","½ tsp dried oregano","Salt & pepper","Avocado oil spray"],metric:["4 chicken drumsticks (skin on)","5ml garlic powder","5ml smoked paprika","2.5ml onion powder","2.5ml dried oregano","Salt & pepper","Avocado oil spray"],steps:["Pat drumsticks completely dry with paper towels — the secret to crispy skin.","Mix all spices, rub generously all over including under the skin.","Spray drumsticks with avocado oil.","Air fry at 400°F / 200°C for 22–25 minutes, flipping halfway. Skin should be deeply golden.","Internal temp: 165°F / 74°C near the bone.","Rest 3 minutes. Serve with a big green salad."]},{title:"Honey Mustard Baked Drumsticks",category:"Dinner",cal:390,protein:36,time:"45 min",airfryer:false,pcos:"good",bloat:"low",imperial:["4 chicken drumsticks","1 tbsp Dijon mustard","1 tsp honey","1 tsp garlic powder","1 tsp apple cider vinegar","Salt & pepper","Avocado oil spray"],metric:["4 chicken drumsticks","15ml Dijon mustard","5ml honey","5ml garlic powder","5ml apple cider vinegar","Salt & pepper","Avocado oil spray"],steps:["Preheat oven to 425°F / 220°C. Line a baking sheet with foil.","Mix Dijon, honey, garlic powder, apple cider vinegar, salt and pepper into a glaze.","Pat drumsticks dry, coat thoroughly in the glaze.","Bake 35–40 minutes, flipping once halfway, until skin is caramelized and internal temp is 165°F / 74°C.","The honey is minimal — just enough to caramelize without a significant sugar spike."]},{title:"Air Fryer Garlic Shrimp",category:"Dinner",cal:280,protein:32,time:"12 min",airfryer:true,pcos:"great",bloat:"low",imperial:["10 oz raw shrimp, peeled and deveined","3 garlic cloves minced","1 tsp smoked paprika","½ tsp red pepper flakes","Juice of 1 lemon","1 tsp olive oil","Salt & pepper","Fresh parsley to serve"],metric:["300g raw shrimp, peeled and deveined","3 garlic cloves minced","5ml smoked paprika","2.5ml red pepper flakes","Juice of 1 lemon","5ml olive oil","Salt & pepper","Fresh parsley to serve"],steps:["Pat shrimp dry. Toss with garlic, paprika, red pepper flakes, olive oil, salt and pepper.","Spread in a single layer in air fryer basket — don't overlap or they steam instead of crisp.","Air fry at 400°F / 200°C for 6–8 minutes until pink and slightly curled. Don't overcook — rubbery fast.","Squeeze lemon over immediately after cooking.","Serve over cauliflower rice or a bed of spinach. Top with parsley."]},{title:"Shrimp & Zucchini Stir-Fry",category:"Dinner",cal:260,protein:30,time:"15 min",airfryer:false,pcos:"great",bloat:"low",imperial:["10 oz raw shrimp, peeled and deveined","1 medium zucchini sliced into half-moons","½ cup bell peppers sliced","2 garlic cloves minced","2 tbsp coconut aminos","1 tsp sesame oil","Red pepper flakes, salt & pepper","Avocado oil spray"],metric:["300g raw shrimp, peeled and deveined","1 medium zucchini sliced into half-moons","80g bell peppers sliced","2 garlic cloves minced","30ml coconut aminos","5ml sesame oil","Red pepper flakes, salt & pepper","Avocado oil spray"],steps:["Spray pan on high heat. Add garlic, cook 30 seconds.","Add zucchini and peppers, cook 3–4 minutes until just tender.","Push veggies to the side, add shrimp in a single layer. Cook 2 min per side until pink.","Pour in coconut aminos and sesame oil, toss everything together.","Season with red pepper flakes, salt and pepper. Serve immediately."]},{title:"Turkey-Stuffed Baby Bell Peppers",category:"Dinner",cal:340,protein:34,time:"25 min",airfryer:true,pcos:"great",bloat:"low",imperial:["1 lb 93% lean ground turkey","12–15 baby bell peppers, halved & seeded","2 garlic cloves minced","½ tsp each: cumin, smoked paprika, chili powder","¼ cup canned diced tomatoes (drained)","Salt & pepper","Optional: shredded cheese, cilantro, lime"],metric:["450g 93% lean ground turkey","12–15 baby bell peppers, halved & seeded","2 garlic cloves minced","2.5ml each: cumin, smoked paprika, chili powder","60g canned diced tomatoes (drained)","Salt & pepper","Optional: shredded cheese, cilantro, lime"],steps:["Preheat oven to 400°F / 200°C (air fryer: 375°F / 190°C). Halve peppers, scoop seeds.","Spray pan, cook garlic on medium 30 seconds.","Add turkey, break apart, cook until browned ~5–6 min. Drain excess liquid.","Stir in spices and drained tomatoes. Cook 2 more minutes.","Arrange pepper halves cut-side up. Spray lightly with avocado oil.","Spoon turkey filling into each pepper half — pack it in.","Oven: bake 12–15 min. Air fryer: 8–10 min until peppers are tender.","Optional: tiny cheese sprinkle in last 2 min.","Finish with cilantro and squeeze of lime. Eat immediately."]},{title:"Lighter Gnocchi Carbonara",category:"Dinner",cal:520,protein:28,time:"20 min",airfryer:false,pcos:"caution",bloat:"medium",imperial:["5 oz regular gnocchi (weigh it — don't eyeball)","2 strips bacon cut into pieces","2 whole eggs","¼ cup cottage cheese (blended smooth)","2 tbsp shredded parmesan","1 garlic clove minced","Black pepper — generous, it's essential","Salt for pasta water","Optional: handful baby spinach"],metric:["150g regular gnocchi (weigh it — don't eyeball)","2 strips bacon cut into pieces","2 whole eggs","60g cottage cheese (blended smooth)","20g shredded parmesan","1 garlic clove minced","Black pepper — generous, it's essential","Salt for pasta water","Optional: handful baby spinach (~30g)"],steps:["⚠️ Occasional treat — ~520 kcal, higher carbs than usual. Enjoy it and get back on track tomorrow.","Blitz cottage cheese until completely smooth — silky sauce, zero lumps.","Whisk eggs, blended cottage cheese, parmesan, and generous black pepper. Set aside.","Cook gnocchi in well-salted boiling water until they float, 2–3 min. Reserve ¼ cup / 60ml pasta water before draining.","Cook bacon until crispy. Remove, leave tiny bit of fat. Add garlic, cook 30 seconds.","Turn heat to LOW — critical. High heat scrambles your eggs.","Add drained gnocchi. Pour egg mixture over, tossing constantly.","Add pasta water a splash at a time until creamy. Residual heat cooks eggs gently.","Stir in bacon and optional spinach. Plate immediately — carbonara waits for no one."]},{title:"Juicy Brined Air Fryer Chicken Breast",category:"Dinner",cal:290,protein:38,time:"30 min + 15 min brine",airfryer:true,imperial:["2 boneless skinless chicken breasts (~1 lb total)","BRINE: 2 cups cold water + 1 tbsp salt + 1 tsp sugar","1 tbsp olive oil","1 tsp garlic powder","1 tsp smoked paprika","½ tsp onion powder","½ tsp dried thyme","Salt & black pepper","Avocado oil spray"],metric:["2 boneless skinless chicken breasts (~450g total)","BRINE: 480ml cold water + 15g salt + 5g sugar","15ml olive oil","5ml garlic powder","5ml smoked paprika","2.5ml onion powder","2.5ml dried thyme","Salt & black pepper","Avocado oil spray"],steps:["BRINE FIRST — this is the secret. Dissolve salt and sugar in cold water in a bowl. Submerge chicken breasts completely. Brine for 15–30 minutes at room temperature. Don't skip this — it's what keeps them juicy.","Remove chicken from brine, pat completely dry with paper towels. Dry surface = better browning.","If breasts are thick (over 1 inch / 2.5cm), butterfly them or pound to even thickness. Uneven thickness = dry edges before the center is cooked.","Mix olive oil with all spices. Rub thoroughly all over the chicken — top, bottom, and sides.","Preheat air fryer for 3 minutes at 375°F / 190°C. A hot basket sears the surface immediately and locks in moisture.","Spray basket with avocado oil. Place chicken smooth-side down. Do NOT overcrowd.","Cook at 375°F / 190°C for 9 minutes. Flip. Cook another 6–9 minutes.","🌡️ CHECK THE TEMP — pull it out the moment it hits 160°F / 71°C. It will carry-cook to 165°F / 74°C while resting. This is the most important step.","REST for 5 full minutes before slicing. Cutting too early lets all the juices run out. Cover loosely with foil while it rests.","Slice against the grain. It should be visibly moist inside. If it's dry, you cooked it too long or skipped the brine."]},{title:"Juicy Italian Herb Chicken Breast",category:"Dinner",cal:285,protein:38,time:"30 min + 15 min brine",airfryer:true,pcos:"great",bloat:"low",imperial:["2 boneless skinless chicken breasts (~1 lb total)","BRINE: 2 cups cold water + 1 tbsp salt + 1 tsp sugar","1 tbsp olive oil","1 tsp dried oregano","1 tsp dried basil","½ tsp garlic powder","½ tsp onion powder","¼ tsp red pepper flakes","Salt & black pepper","Fresh lemon squeeze + fresh parsley to finish"],metric:["2 boneless skinless chicken breasts (~450g total)","BRINE: 480ml cold water + 15g salt + 5g sugar","15ml olive oil","5ml dried oregano","5ml dried basil","2.5ml garlic powder","2.5ml onion powder","1.25ml red pepper flakes","Salt & black pepper","Fresh lemon squeeze + fresh parsley to finish"],steps:["BRINE FIRST — dissolve salt and sugar in cold water. Submerge chicken 15–30 min at room temperature. Non-negotiable for juicy chicken.","Remove from brine, pat completely dry. Dry surface = better browning.","Butterfly or pound to even thickness if over 1 inch / 2.5cm thick.","Mix olive oil with all herbs and spices. Rub all over chicken — top, bottom, and sides.","Preheat air fryer 3 min at 375°F / 190°C. Hot basket = instant surface sear.","Spray basket, place chicken smooth-side down. Cook 9 min, flip, cook 6–9 more min.","Pull at 160°F / 71°C internal temp — it carries over to 165°F / 74°C while resting.","REST 5 full minutes before slicing. Cover loosely with foil.","Squeeze fresh lemon over the top, scatter fresh parsley. Serve immediately."]},{title:"Juicy Lemon Garlic Chicken Breast",category:"Dinner",cal:280,protein:38,time:"30 min + 15 min brine",airfryer:true,pcos:"great",bloat:"low",imperial:["2 boneless skinless chicken breasts (~1 lb total)","BRINE: 2 cups cold water + 1 tbsp salt + 1 tsp sugar","Zest and juice of 1 lemon","3 garlic cloves, minced","1 tbsp olive oil","1 tsp dried oregano","½ tsp black pepper","Salt","Fresh parsley to finish"],metric:["2 boneless skinless chicken breasts (~450g total)","BRINE: 480ml cold water + 15g salt + 5g sugar","Zest and juice of 1 lemon","3 garlic cloves, minced","15ml olive oil","5ml dried oregano","2.5ml black pepper","Salt","Fresh parsley to finish"],steps:["BRINE FIRST — dissolve salt and sugar in cold water. Submerge chicken 15–30 min. This is what makes the difference between juicy and dry.","Remove from brine, pat completely dry.","Butterfly or pound to even thickness if needed — uneven thickness is the #1 cause of dry chicken.","Mix lemon zest, lemon juice, minced garlic, olive oil, oregano, salt and pepper into a paste. Rub all over chicken.","Preheat air fryer 3 min at 375°F / 190°C.","Spray basket, place chicken smooth-side down. Cook 9 min, flip, cook 6–9 more min.","Pull at 160°F / 71°C — carry-over cooking takes it to 165°F / 74°C.","REST 5 full minutes before slicing. The lemon-garlic aroma while it rests is incredible.","Scatter fresh parsley and an extra squeeze of lemon. Done."]},{title:"Juicy Smoky Paprika & Honey Chicken",category:"Dinner",cal:305,protein:37,time:"30 min + 15 min brine",airfryer:true,pcos:"good",bloat:"low",imperial:["2 boneless skinless chicken breasts (~1 lb total)","BRINE: 2 cups cold water + 1 tbsp salt + 1 tsp sugar","1 tbsp olive oil","1½ tsp smoked paprika","1 tsp garlic powder","½ tsp cumin","½ tsp onion powder","1 tsp honey (just 1 — it caramelizes beautifully)","Salt & black pepper","Avocado oil spray"],metric:["2 boneless skinless chicken breasts (~450g total)","BRINE: 480ml cold water + 15g salt + 5g sugar","15ml olive oil","7.5ml smoked paprika","5ml garlic powder","2.5ml cumin","2.5ml onion powder","5ml honey","Salt & black pepper","Avocado oil spray"],steps:["BRINE FIRST — dissolve salt and sugar in cold water. Submerge chicken 15–30 min. Do not skip this.","Remove from brine, pat completely dry with paper towels.","Mix olive oil, smoked paprika, garlic powder, cumin, onion powder, salt and pepper. Add the honey last and mix into the rub.","Coat chicken completely in the rub. The honey will make it slightly sticky — that's what creates the caramelized crust.","Preheat air fryer 3 min at 375°F / 190°C.","Spray basket, place chicken smooth-side down. Cook 9 min, flip, cook 6–9 more min.","Watch the last few minutes — the honey can darken fast. Pull at 160°F / 71°C internal temp.","REST 5 full minutes before slicing. The crust should be deep red and slightly sticky.","The inside will be juicy, the outside caramelized. This is the most crowd-pleasing version."]},{title:"Juicy French Mustard & Thyme Chicken",category:"Dinner",cal:290,protein:38,time:"30 min + 15 min brine",airfryer:true,pcos:"great",bloat:"low",imperial:["2 boneless skinless chicken breasts (~1 lb total)","BRINE: 2 cups cold water + 1 tbsp salt + 1 tsp sugar","1 tbsp Dijon mustard","1 tbsp olive oil","1 tsp fresh or dried thyme","1 tsp garlic powder","½ tsp onion powder","1 tsp apple cider vinegar","Salt & black pepper","Fresh thyme to finish (optional)"],metric:["2 boneless skinless chicken breasts (~450g total)","BRINE: 480ml cold water + 15g salt + 5g sugar","15ml Dijon mustard","15ml olive oil","5ml fresh or dried thyme","5ml garlic powder","2.5ml onion powder","5ml apple cider vinegar","Salt & black pepper","Fresh thyme to finish (optional)"],steps:["BRINE FIRST — dissolve salt and sugar in cold water. Submerge chicken 15–30 min. This is always the first step for juicy chicken.","Remove from brine, pat completely dry.","Mix Dijon mustard, olive oil, thyme, garlic powder, onion powder, apple cider vinegar, salt and pepper into a smooth marinade. Taste it — it should be punchy.","Coat chicken completely. The mustard forms a crust that keeps moisture locked inside during cooking.","Preheat air fryer 3 min at 375°F / 190°C.","Spray basket, place chicken smooth-side down. Cook 9 min, flip, cook 6–9 more min.","Pull at 160°F / 71°C. Rest 5 full minutes — mandatory.","The mustard crust should be golden and slightly set. Slice against the grain.","This pairs beautifully with roasted asparagus or a simple green salad. Very French, very good."]},// ── WRAPS (HEB Carb Sense Whole Wheat Tortillas) ──────────
{title:"Tuna Avocado Wrap",category:"Wrap",cal:310,protein:28,time:"5 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 HEB Carb Sense Whole Wheat tortilla","1 can albacore tuna (~5 oz, drained)","¼ avocado, mashed","1 tsp Dijon mustard","Handful baby spinach","¼ cup cherry tomatoes, halved","Juice of ¼ lemon","Salt, pepper, red pepper flakes"],metric:["1 HEB Carb Sense Whole Wheat tortilla","1 can albacore tuna (~140g, drained)","¼ avocado, mashed","5ml Dijon mustard","Handful baby spinach (~20g)","40g cherry tomatoes, halved","Juice of ¼ lemon","Salt, pepper, red pepper flakes"],steps:["Drain tuna and mix with mashed avocado, Dijon, lemon juice, salt and pepper — the avocado replaces mayo completely.","Lay tortilla flat. Layer spinach first — it acts as a moisture barrier and keeps the wrap from going soggy.","Spread tuna mixture over spinach. Add cherry tomatoes.","Fold sides in, roll tightly from the bottom. Slice diagonally. Works perfectly cold — great meal prep wrap."]},{title:"Greek Egg Salad Wrap",category:"Wrap",cal:320,protein:24,time:"15 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 HEB Carb Sense Whole Wheat tortilla","3 hard-boiled eggs, chopped","2 tbsp Fage 0% Greek yogurt (mayo swap)","1 tsp Dijon mustard","¼ cucumber, diced","Handful baby spinach","Salt, pepper, fresh dill or dried","Optional: ¼ tsp paprika"],metric:["1 HEB Carb Sense Whole Wheat tortilla","3 hard-boiled eggs, chopped","30ml Fage 0% Greek yogurt (mayo swap)","5ml Dijon mustard","¼ cucumber, diced","Handful baby spinach (~20g)","Salt, pepper, fresh dill or dried","Optional: 1.25ml paprika"],steps:["Boil eggs 10 min, transfer to ice water, peel and chop.","Mix eggs with Greek yogurt, Dijon, salt, pepper, and dill. Greek yogurt makes it creamy and adds protein vs mayo.","Lay tortilla flat. Add spinach, then egg salad, then diced cucumber for crunch.","Roll tightly, slice diagonally. Eat immediately or wrap in foil and refrigerate up to 1 day."]},{title:"Grilled Chicken Caesar Wrap",category:"Wrap",cal:350,protein:36,time:"10 min",airfryer:true,pcos:"good",bloat:"low",imperial:["1 HEB Carb Sense Whole Wheat tortilla","4 oz air fryer chicken breast, sliced","1 cup romaine lettuce, chopped","1 tbsp light Caesar dressing (measure it)","1 tbsp shaved parmesan","Juice of ¼ lemon","Black pepper"],metric:["1 HEB Carb Sense Whole Wheat tortilla","115g air fryer chicken breast, sliced","40g romaine lettuce, chopped","15ml light Caesar dressing (measure it)","10g shaved parmesan","Juice of ¼ lemon","Black pepper"],steps:["Cook chicken breast using the juicy air fryer method (brine, 375°F / 190°C, pull at 160°F / 71°C, rest 5 min). Slice thin.","Toss chopped romaine with Caesar dressing and lemon juice — use just enough to coat, not drown.","Lay tortilla flat. Layer romaine first, then chicken slices, then parmesan.","Crack black pepper generously over the top. Roll tightly, slice diagonally. Serve warm."]},{title:"Turkey, Spinach & Hummus Wrap",category:"Wrap",cal:330,protein:30,time:"15 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["1 HEB Carb Sense Whole Wheat tortilla","4 oz ground turkey, cooked and seasoned","2 tbsp hummus","Handful baby spinach","¼ cup roasted red peppers or fresh bell pepper strips","¼ avocado sliced","Salt, cumin, garlic powder"],metric:["1 HEB Carb Sense Whole Wheat tortilla","115g ground turkey, cooked and seasoned","30ml hummus","Handful baby spinach (~20g)","40g roasted red peppers or fresh bell pepper strips","¼ avocado sliced","Salt, cumin, garlic powder"],steps:["Cook ground turkey in a sprayed pan with garlic powder, cumin, salt until browned, ~5 min. Let cool slightly.","Spread hummus across the full surface of the tortilla — it acts as a moisture barrier and flavor base.","Layer spinach, warm turkey, bell peppers, and avocado slices.","Roll tightly from the bottom, folding sides in. Great warm or packed cold for lunch."]},{title:"Spicy Shrimp Wrap",category:"Wrap",cal:300,protein:29,time:"15 min",airfryer:true,pcos:"great",bloat:"low",imperial:["1 HEB Carb Sense Whole Wheat tortilla","6 oz raw shrimp, peeled and deveined","1 tsp smoked paprika + ½ tsp cayenne","1 tsp garlic powder","Juice of ½ lime","2 tbsp Fage 0% Greek yogurt (sour cream swap)","Handful shredded cabbage or romaine","¼ avocado sliced","Avocado oil spray, salt"],metric:["1 HEB Carb Sense Whole Wheat tortilla","170g raw shrimp, peeled and deveined","5ml smoked paprika + 2.5ml cayenne","5ml garlic powder","Juice of ½ lime","30ml Fage 0% Greek yogurt (sour cream swap)","Handful shredded cabbage or romaine","¼ avocado sliced","Avocado oil spray, salt"],steps:["Toss shrimp with paprika, cayenne, garlic powder, salt and a squeeze of lime.","Air fry at 400°F / 200°C for 6–8 min until pink and slightly charred. Or cook in a hot pan 2 min per side.","Mix Greek yogurt with a squeeze of lime and pinch of salt — your creamy sauce.","Spread Greek yogurt sauce on tortilla. Layer cabbage or romaine, shrimp, and avocado slices.","Squeeze more lime over everything. Roll tightly, eat immediately — shrimp wraps don't keep well."]},{title:"Veggie Hummus Wrap",category:"Wrap",cal:260,protein:12,time:"8 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["1 HEB Carb Sense Whole Wheat tortilla","3 tbsp hummus","Handful baby spinach","¼ cucumber, sliced thin","¼ cup cherry tomatoes, halved","¼ avocado, sliced","¼ cup shredded carrots","Juice of ¼ lemon","Salt, pepper, red pepper flakes","Optional: 1 tbsp feta cheese for extra flavor"],metric:["1 HEB Carb Sense Whole Wheat tortilla","45ml hummus","Handful baby spinach (~20g)","¼ cucumber, sliced thin","40g cherry tomatoes, halved","¼ avocado, sliced","30g shredded carrots","Juice of ¼ lemon","Salt, pepper, red pepper flakes","Optional: 15g feta cheese"],steps:["Spread hummus generously across the tortilla — this is your protein and moisture base.","Layer spinach, then cucumber, tomatoes, carrots, and avocado.","Squeeze lemon over everything, season with salt, pepper, and red pepper flakes.","Optional: crumble feta on top for a salty punch.","Roll tightly, slice diagonally. This one is light — pair with a hard-boiled egg or string cheese to hit your protein target."]},{title:"BBQ Chicken Wrap",category:"Wrap",cal:370,protein:38,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["1 HEB Carb Sense Whole Wheat tortilla","4 oz air fryer chicken breast, shredded","1 tbsp low-sugar BBQ sauce (measure it)","Handful shredded cabbage or romaine","2 tbsp Fage 0% Greek yogurt","1 tsp apple cider vinegar","Salt & pepper","Optional: thinly sliced red onion"],metric:["1 HEB Carb Sense Whole Wheat tortilla","115g air fryer chicken breast, shredded","15ml low-sugar BBQ sauce (measure it)","Handful shredded cabbage (~30g)","30ml Fage 0% Greek yogurt","5ml apple cider vinegar","Salt & pepper","Optional: thinly sliced red onion"],steps:["Cook chicken using the juicy brine method. Shred with two forks while still warm — it absorbs the BBQ sauce better when hot.","Toss shredded chicken with BBQ sauce. Just 1 tbsp / 15ml — enough to coat without overdoing the sugar.","Mix Greek yogurt with apple cider vinegar, salt and pepper — this is your slaw dressing.","Toss cabbage in the dressing.","Layer slaw on tortilla, then BBQ chicken, then optional red onion.","Roll tightly, serve warm. This is the most satisfying wrap on the list."]},// ── FRIED RICE ─────────────────────────────────────────────
{title:"High-Protein Beef Fried Rice",category:"Dinner",cal:420,protein:36,time:"25 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["5 oz lean ground beef (90% or higher) or sirloin, diced small","1 cup cooked white or black rice — start with ⅓ cup / 60g uncooked (rice triples when cooked)","2 whole eggs","½ cup frozen peas","3 garlic cloves, minced","1 inch fresh ginger, grated (or ½ tsp ground ginger)","3 tbsp low-sodium soy sauce or coconut aminos","1 tsp sesame oil","2 green onions, sliced","Avocado oil spray","Optional: red pepper flakes, sriracha"],metric:["140g lean ground beef (90%+) or sirloin, diced small","180g cooked white or black rice — start with 60g uncooked (rice triples when cooked)","2 whole eggs","75g frozen peas","3 garlic cloves, minced","2.5cm fresh ginger, grated (or 2.5ml ground ginger)","45ml low-sodium soy sauce or coconut aminos","5ml sesame oil","2 green onions, sliced","Avocado oil spray","Optional: red pepper flakes, sriracha"],steps:["🍚 RICE PREP — two options: (1) Best: cook rice the night before, refrigerate uncovered. (2) Same-day: spread freshly cooked rice in a thin layer on a baking sheet, bake at 350°F / 175°C for 10–15 min stirring once halfway, cool 5 min. Either method gives you dry rice that won't turn mushy.","If using ground beef, cook in a sprayed pan on high heat, breaking apart until browned. If using sirloin, cook diced pieces 2–3 min per side. Season with salt and pepper. Remove and set aside.","In the same pan on high heat, add garlic and ginger. Cook 30 seconds — it should smell incredible.","Add rice. Press it flat and let it sit untouched 2 min — this is how you get that slightly crispy texture.","Push rice to the side. Crack eggs directly into the pan, scramble quickly, then fold into the rice before fully set.","Add frozen peas — no need to thaw, they'll cook in 2 minutes.","Return beef to the pan. Pour soy sauce or coconut aminos and sesame oil over everything, toss well on high heat 1–2 min.","Finish with green onions and optional sriracha. Eat immediately — fried rice doesn't reheat well.","Black rice tip: it has a slightly nutty flavor and turns deep purple when cooked. Stunning in the bowl and genuinely more nutritious than white rice."]},{title:"High-Protein Chicken Fried Rice",category:"Dinner",cal:390,protein:38,time:"25 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["6 oz boneless skinless chicken breast, diced small","1 cup cooked white or black rice — start with ⅓ cup / 60g uncooked (rice triples when cooked)","2 whole eggs","½ cup frozen peas","3 garlic cloves, minced","1 inch fresh ginger, grated (or ½ tsp ground ginger)","3 tbsp low-sodium soy sauce or coconut aminos","1 tsp sesame oil","2 green onions, sliced","1 tsp rice vinegar (optional but brightens everything)","Avocado oil spray, salt & pepper"],metric:["170g boneless skinless chicken breast, diced small","180g cooked white or black rice — start with 60g uncooked (rice triples when cooked)","2 whole eggs","75g frozen peas","3 garlic cloves, minced","2.5cm fresh ginger, grated (or 2.5ml ground ginger)","45ml low-sodium soy sauce or coconut aminos","5ml sesame oil","2 green onions, sliced","5ml rice vinegar (optional)","Avocado oil spray, salt & pepper"],steps:["🍚 RICE PREP — two options: (1) Best: cook rice the night before, refrigerate uncovered. (2) Same-day: spread freshly cooked rice on a baking sheet in a thin layer, bake at 350°F / 175°C for 10–15 min stirring once halfway, cool 5 min. Both give you dry rice that won't go mushy.","Dice chicken into small, even pieces — about 1cm / ½ inch. Small pieces cook fast and distribute evenly through the rice.","Heat pan or wok on HIGH heat — this is critical. Fried rice needs high heat to get that restaurant-style char, not steam.","Spray with avocado oil. Add chicken, spread flat, don't stir for 2 min. Let it get golden. Stir, cook 2 more min until cooked through. Season with salt and pepper. Remove and set aside.","Same pan, add garlic and ginger. Cook 30 seconds, stirring constantly.","Add rice. Press flat, leave untouched 2 min for crispy bits to form.","Push rice to the side. Crack eggs in, scramble quickly, fold into rice before fully set.","Add frozen peas, return chicken to the pan.","Pour soy sauce/coconut aminos, sesame oil, and rice vinegar over everything. Toss on high heat 1–2 min until everything is glossy and fragrant.","Top with green onions. Taste and adjust seasoning. Eat immediately.","💡 Make it lower carb: replace half or all the rice with riced cauliflower — same technique, half the calories."]},{title:"Beef Fried Rice (Cauliflower)",category:"Dinner",cal:300,protein:35,time:"20 min",airfryer:false,pcos:"great",bloat:"medium",imperial:["5 oz lean ground beef (90%+) or sirloin diced small","2 cups cauliflower rice (fresh or frozen)","2 whole eggs","½ cup frozen peas","3 garlic cloves minced","1 inch fresh ginger grated","3 tbsp low-sodium soy sauce or coconut aminos","1 tsp sesame oil","2 green onions sliced","Avocado oil spray, salt & pepper","Optional: sriracha"],metric:["140g lean ground beef (90%+) or sirloin diced small","200g cauliflower rice (fresh or frozen)","2 whole eggs","75g frozen peas","3 garlic cloves minced","2.5cm fresh ginger grated","45ml low-sodium soy sauce or coconut aminos","5ml sesame oil","2 green onions sliced","Avocado oil spray, salt & pepper","Optional: sriracha"],steps:["Key rule: cauliflower rice releases a lot of water — HIGH heat and don't overcrowd the pan or it steams and turns soggy.","If using frozen cauliflower rice, microwave 3 min first, then spread on paper towels and press firmly to remove as much moisture as possible. Non-negotiable step.","Cook beef on high heat until browned, season with salt and pepper. Remove and set aside.","Same pan high heat. Add garlic and ginger, cook 30 seconds.","Add cauliflower rice in a single layer. Press flat, cook untouched 3–4 min until slightly golden on the bottom.","Push to the side. Crack eggs in, scramble quickly, fold into cauliflower rice before fully set.","Add peas and return beef. Pour soy sauce and sesame oil over everything. Toss on high heat 2 min.","Top with green onions. Saves ~120 kcal vs the white rice version with the same protein. Doesn't feel like a compromise."]},{title:"Beef Fried Rice (Half & Half)",category:"Dinner",cal:360,protein:36,time:"25 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["5 oz lean ground beef (90%+) or sirloin diced small","½ cup cooked white or black rice — start with ~2½ tbsp / 30g uncooked","1 cup cauliflower rice","2 whole eggs","½ cup frozen peas","3 garlic cloves minced","1 inch fresh ginger grated","3 tbsp low-sodium soy sauce or coconut aminos","1 tsp sesame oil","2 green onions sliced","Avocado oil spray, salt & pepper"],metric:["140g lean ground beef (90%+) or sirloin diced small","90g cooked white or black rice — start with 30g uncooked","100g cauliflower rice","2 whole eggs","75g frozen peas","3 garlic cloves minced","2.5cm fresh ginger grated","45ml low-sodium soy sauce or coconut aminos","5ml sesame oil","2 green onions sliced","Avocado oil spray, salt & pepper"],steps:["🍚 RICE PREP — two options: (1) Best: cook rice the night before, refrigerate uncovered. (2) Same-day: spread freshly cooked rice on a baking sheet, bake at 350°F / 175°C for 10–15 min stirring once halfway, cool 5 min before using.","Microwave frozen cauliflower rice 3 min, press dry with paper towels before using.","Cook beef on high heat until browned. Remove and set aside.","Same pan, garlic and ginger, 30 seconds.","Add cauliflower rice first — cook untouched on high heat 2–3 min to drive off moisture.","Add the dry regular rice on top. Toss together, press flat, cook 2 more min for crispy bits.","Push to the side. Crack eggs in, scramble, fold in before fully set.","Add peas and beef back. Soy sauce and sesame oil over everything. High heat, toss 1–2 min.","Top with green onions. 💡 Black rice half & half looks stunning — deep purple mixed with cauliflower white."]},{title:"Chicken Fried Rice (Cauliflower)",category:"Dinner",cal:280,protein:37,time:"20 min",airfryer:false,pcos:"great",bloat:"medium",imperial:["6 oz boneless skinless chicken breast diced small","2 cups cauliflower rice (fresh or frozen)","2 whole eggs","½ cup frozen peas","3 garlic cloves minced","1 inch fresh ginger grated","3 tbsp low-sodium soy sauce or coconut aminos","1 tsp sesame oil","1 tsp rice vinegar (optional)","2 green onions sliced","Avocado oil spray, salt & pepper"],metric:["170g boneless skinless chicken breast diced small","200g cauliflower rice (fresh or frozen)","2 whole eggs","75g frozen peas","3 garlic cloves minced","2.5cm fresh ginger grated","45ml low-sodium soy sauce or coconut aminos","5ml sesame oil","5ml rice vinegar (optional)","2 green onions sliced","Avocado oil spray, salt & pepper"],steps:["Lowest calorie version of all six fried rice recipes at 280 kcal — best macro ratio in the app.","Microwave frozen cauliflower rice 3 min, spread on paper towels and press out moisture. Do not skip this.","Dice chicken into small even pieces (~1cm / ½ inch). High heat, spray pan, cook chicken spread flat — don't stir for 2 min. Flip, 2 more min until cooked through. Season, remove and set aside.","Same pan high heat. Garlic and ginger, 30 seconds.","Add cauliflower rice, press flat, cook untouched 3–4 min until slightly golden.","Push to side. Crack eggs in, scramble, fold into rice before fully set.","Add peas and chicken back. Soy sauce, sesame oil, rice vinegar over everything. High heat, toss 2 min.","Top with green onions. At 37g protein and 280 kcal this is your best protein-to-calorie ratio of any dinner in the app."]},{title:"Chicken Fried Rice (Half & Half)",category:"Dinner",cal:335,protein:38,time:"25 min",airfryer:false,pcos:"good",bloat:"medium",imperial:["6 oz boneless skinless chicken breast diced small","½ cup cooked white or black rice — start with ~2½ tbsp / 30g uncooked","1 cup cauliflower rice","2 whole eggs","½ cup frozen peas","3 garlic cloves minced","1 inch fresh ginger grated","3 tbsp low-sodium soy sauce or coconut aminos","1 tsp sesame oil","1 tsp rice vinegar (optional)","2 green onions sliced","Avocado oil spray, salt & pepper"],metric:["170g boneless skinless chicken breast diced small","90g cooked white or black rice — start with 30g uncooked","100g cauliflower rice","2 whole eggs","75g frozen peas","3 garlic cloves minced","2.5cm fresh ginger grated","45ml low-sodium soy sauce or coconut aminos","5ml sesame oil","5ml rice vinegar (optional)","2 green onions sliced","Avocado oil spray, salt & pepper"],steps:["🍚 RICE PREP — two options: (1) Best: cook rice the night before, refrigerate uncovered. (2) Same-day: spread freshly cooked rice on a baking sheet, bake at 350°F / 175°C for 10–15 min stirring once halfway, cool 5 min before using.","Microwave frozen cauliflower rice 3 min, press dry with paper towels.","Cook diced chicken on high heat — flat, no stirring for 2 min, flip, 2 more min. Season, remove and set aside.","Garlic and ginger in same pan, 30 seconds.","Add cauliflower rice first, cook on high heat untouched 2–3 min.","Add dry regular rice, toss together, press flat and cook 2 more min for crispy bits.","Push to side. Eggs in, scramble quickly, fold in before fully set.","Add peas and chicken back. Soy sauce, sesame oil, rice vinegar over everything. High heat, toss 2 min.","Top with green onions. 💡 Black rice half & half looks incredible — deep purple mixed with cauliflower white. Worth trying just for the visual."]},// ── GOÛTER (AFTERNOON SNACKS) ───────────────────────────────
{title:"Banana & Peanut Butter Rice Cake",category:"Snack",cal:130,protein:5,time:"2 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 Lundberg rice cake","1 tsp natural peanut butter","½ small banana, sliced","Pinch of cinnamon"],metric:["1 Lundberg rice cake","5ml natural peanut butter","½ small banana, sliced","Pinch of cinnamon"],steps:["Spread peanut butter thinly over rice cake — 1 tsp only, it adds up fast.","Layer banana slices on top.","Sprinkle cinnamon over everything.","Eat immediately. Simple, sweet, satisfying — classic goûter energy without the guilt."]},{title:"Greek Yogurt with Honey & Cinnamon",category:"Snack",cal:120,protein:12,time:"2 min",airfryer:false,pcos:"good",bloat:"low",imperial:["½ cup Fage 0% Greek yogurt","1 tsp honey","¼ tsp cinnamon","Optional: 4–5 walnut halves for crunch"],metric:["120ml Fage 0% Greek yogurt","5ml honey","1.25ml cinnamon","Optional: 4–5 walnut halves for crunch"],steps:["Spoon yogurt into a small bowl or jar.","Drizzle honey in a thin spiral over the top — 1 tsp max.","Dust with cinnamon.","Add a few walnut halves if you want crunch and healthy fats.","This is the French pharmacy version of a goûter — feels indulgent, costs you almost nothing calorically."]},{title:"Apple Slices with Cottage Cheese",category:"Snack",cal:110,protein:10,time:"3 min",airfryer:false,pcos:"great",bloat:"low",imperial:["½ medium apple, sliced thin","¼ cup low-fat cottage cheese","Pinch of cinnamon","Optional: tiny drizzle of honey"],metric:["½ medium apple, sliced thin","60g low-fat cottage cheese","Pinch of cinnamon","Optional: tiny drizzle of honey"],steps:["Slice apple into thin rounds or wedges.","Spoon cottage cheese into a small bowl alongside.","Dust both with cinnamon.","Dip apple slices into cottage cheese as you eat — sweet, creamy, crunchy.","Genuinely one of the best light sweet snacks on this list."]},{title:"Chocolate Protein Mug Cake",category:"Snack",cal:150,protein:14,time:"5 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop chocolate whey protein","1 tbsp unsweetened cocoa powder","1 egg","2 tbsp HEB 2% milk","¼ tsp baking powder","Pinch of salt","Optional: 5 dark chocolate chips on top"],metric:["1 scoop chocolate whey protein","7g unsweetened cocoa powder","1 egg","30ml HEB 2% milk","1.25ml baking powder","Pinch of salt","Optional: 5 dark chocolate chips on top"],steps:["Mix protein powder, cocoa powder, baking powder and salt in a microwave-safe mug.","Add egg and milk, stir vigorously until completely smooth — no lumps.","Press a few chocolate chips on top if using.","Microwave on high 60–75 seconds. Check at 60 — should be just set in the middle, slightly fudgy. Don't overcook or it goes rubbery.","Let cool 1 minute before eating — it finishes cooking from residual heat.","Your goûter chocolat. 14g protein, 150 kcal, ready in 5 minutes. Better than any packaged snack."]},{title:"Cucumber & Feta Bites",category:"Snack",cal:90,protein:6,time:"5 min",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cucumber, sliced into thick rounds","2 tbsp feta cheese, crumbled","¼ tsp dried oregano","Red pepper flakes","Juice of ¼ lemon","Optional: 2–3 cherry tomatoes, halved"],metric:["½ cucumber, sliced into thick rounds","30g feta cheese, crumbled","1.25ml dried oregano","Red pepper flakes","Juice of ¼ lemon","Optional: 2–3 cherry tomatoes, halved"],steps:["Slice cucumber into thick rounds — about 1cm / ½ inch each.","Top each round with a pinch of crumbled feta.","Sprinkle oregano and red pepper flakes over everything.","Squeeze a little lemon over the top.","Add a cherry tomato half on top of each one if you have them.","Savory, fresh, crunchy — zero cooking, ready in 5 min. Very Mediterranean goûter energy."]},{title:"Soft-Boiled Egg with Fleur de Sel",category:"Snack",cal:80,protein:7,time:"10 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 large egg","Fleur de sel or good sea salt","Black pepper","Optional: 1 rice cake alongside"],metric:["1 large egg","Fleur de sel or good sea salt","Black pepper","Optional: 1 rice cake alongside"],steps:["Bring a small pot of water to a full boil.","Lower egg in gently with a spoon. Cook exactly 6 minutes for a runny yolk, 7 for jammy.","Transfer immediately to ice water for 2 minutes — stops the cooking.","Peel carefully. Slice in half.","Sprinkle fleur de sel and black pepper over the yolk.","The most French goûter on the list. Simple, perfect, satisfying. The quality of the egg matters — Vital Farms is worth it here."]},{title:"Rice Cake with Tuna & Dijon",category:"Snack",cal:120,protein:14,time:"3 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 Lundberg rice cake","2 oz canned albacore tuna, drained","½ tsp Dijon mustard","3–4 cucumber slices","Squeeze of lemon, black pepper"],metric:["1 Lundberg rice cake","55g canned albacore tuna, drained","2.5ml Dijon mustard","3–4 cucumber slices","Squeeze of lemon, black pepper"],steps:["Mix tuna with Dijon mustard, lemon and black pepper.","Pile onto rice cake.","Top with cucumber slices.","Savory, high protein, no cooking. The Dijon makes it feel properly French.","Make the tuna mix in advance and keep in the fridge — assemble in 30 seconds when hungry."]},{title:"Frozen Banana Bites",category:"Snack",cal:90,protein:2,time:"5 min + freeze time",airfryer:false,pcos:"great",bloat:"low",imperial:["1 ripe banana","2 tbsp dark chocolate chips, melted","1 tsp natural peanut butter (optional drizzle)","Pinch of fleur de sel"],metric:["1 ripe banana","20g dark chocolate chips, melted","5ml natural peanut butter (optional drizzle)","Pinch of fleur de sel"],steps:["Slice banana into rounds about 1cm / ½ inch thick.","Melt chocolate chips in the microwave in 20-second bursts, stirring between each.","Dip each banana round halfway into melted chocolate, or drizzle over the top.","Place on a parchment-lined plate or tray.","Optional: drizzle a tiny bit of peanut butter over and sprinkle fleur de sel.","Freeze at least 1 hour. Store in a freezer bag.","Eat straight from the freezer — best frozen solid. Make a batch on Sunday for the whole week.","Your healthy Magnum. Better than anything from a packet."]},// ── PETITS GÂTEAUX ─────────────────────────────────────────
{title:"Protein Brownies",category:"Snack",cal:145,protein:12,time:"25 min",airfryer:false,pcos:"good",bloat:"low",imperial:["2 scoops chocolate whey protein","2 tbsp sweet cocoa powder","2 tbsp all-purpose flour","¼ tsp baking powder","2 eggs","3 tbsp honey or maple syrup","2 tbsp melted butter","2 tbsp HEB 2% milk","½ tsp vanilla extract","Pinch of salt","¼ cup dark chocolate chips"],metric:["2 scoops chocolate whey protein","14g sweet cocoa powder","16g all-purpose flour","1.25ml baking powder","2 eggs","45ml honey or maple syrup","30g melted butter","30ml HEB 2% milk","2.5ml vanilla extract","Pinch of salt","45g dark chocolate chips"],steps:["Preheat oven to 325°F / 160°C. Line an 8x8 inch / 20x20cm tin with parchment.","Whisk protein powder, cocoa, flour, baking powder and salt together in a bowl.","In a separate bowl whisk eggs, honey/maple syrup, melted butter, milk and vanilla until smooth.","Pour wet into dry, stir until just combined — don't overmix or they go tough.","Fold in chocolate chips gently.","Pour into tin, smooth the top. Tap tin on counter twice to release air bubbles.","Bake 15–17 minutes. Center should look slightly underdone — it firms up as it cools. A toothpick should come out with a few moist crumbs, not wet batter.","Cool completely before cutting — at least 20 minutes. Cutting warm = crumbling.","Cut into 9 squares. Store in the fridge up to 5 days. Each square ~145 kcal / 12g protein."]},{title:"Classic Brownies (Naturally Healthy)",category:"Snack",cal:160,protein:4,time:"30 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["½ cup dark chocolate chips, melted","3 tbsp melted butter","2 eggs","¼ cup honey or maple syrup","1 tsp vanilla extract","¼ cup all-purpose flour","2 tbsp sweet cocoa powder","¼ tsp baking powder","Pinch of salt"],metric:["90g dark chocolate chips, melted","45g melted butter","2 eggs","60ml honey or maple syrup","5ml vanilla extract","32g all-purpose flour","14g sweet cocoa powder","1.25ml baking powder","Pinch of salt"],steps:["Preheat oven to 325°F / 160°C. Line an 8x8 inch / 20x20cm tin with parchment.","Melt chocolate chips and butter together in 30-second microwave bursts, stirring between each, until smooth. Cool 5 minutes.","Whisk eggs, honey/maple syrup and vanilla into the chocolate mixture.","Sift in flour, cocoa, baking powder and salt. Fold until just combined — stop the moment no dry streaks remain.","Pour into tin. Bake 18–20 minutes. Center should look barely set — this gives fudgy brownies, not cakey ones.","Cool completely before cutting. Proper fudgy brownies made with honey instead of refined sugar.","Cut into 9 squares. Room temp up to 3 days, fridge up to 1 week."]},{title:"Protein Chocolate Chip Cookies",category:"Snack",cal:120,protein:8,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop vanilla whey protein","½ cup all-purpose flour","¼ tsp baking soda","Pinch of salt","1 egg","2 tbsp melted butter","2 tbsp honey or maple syrup","1 tsp vanilla extract","¼ cup dark chocolate chips"],metric:["1 scoop vanilla whey protein","65g all-purpose flour","1.25ml baking soda","Pinch of salt","1 egg","30g melted butter","30ml honey or maple syrup","5ml vanilla extract","45g dark chocolate chips"],steps:["Preheat oven to 350°F / 175°C. Line a baking sheet with parchment.","Mix protein powder, flour, baking soda and salt in a bowl.","In another bowl whisk egg, melted butter, honey/maple syrup and vanilla.","Combine wet and dry until a dough forms. Fold in chocolate chips.","Roll into 10 balls, place on sheet, flatten slightly with your palm — they don't spread much.","Bake 9–11 minutes. They should look underdone and pale — they firm up on the tray as they cool.","Leave on tray 10 minutes before moving. Makes 10 cookies at ~120 kcal / 8g protein each."]},{title:"Honey Butter Cookies",category:"Snack",cal:110,protein:2,time:"20 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["1 cup all-purpose flour","¼ tsp baking powder","Pinch of salt","4 tbsp softened butter","3 tbsp honey","1 egg yolk","1 tsp vanilla extract","1 tsp cinnamon-sugar to dust on top"],metric:["130g all-purpose flour","1.25ml baking powder","Pinch of salt","60g softened butter","45ml honey","1 egg yolk","5ml vanilla extract","5ml cinnamon-sugar to dust"],steps:["Preheat oven to 350°F / 175°C. Line a baking sheet with parchment.","Beat softened butter and honey until pale and creamy — 2 minutes by hand.","Add egg yolk and vanilla, beat until smooth.","Fold in flour, baking powder and salt until a soft dough forms. Don't overwork.","Roll into 12 small balls. Place on tray, flatten with a fork.","Dust lightly with cinnamon-sugar.","Bake 10–12 minutes until just golden at the edges — centers should still look pale.","Cool on the tray. Buttery, delicate, very French. Honey gives a floral sweetness sugar can't replicate.","Makes 12 cookies at ~110 kcal each."]},{title:"Protein Madeleines",category:"Snack",cal:95,protein:7,time:"25 min + 30 min rest",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop vanilla whey protein","½ cup all-purpose flour","1 tsp baking powder","Pinch of salt","2 eggs","2 tbsp honey","3 tbsp melted butter","1 tsp vanilla extract","Zest of ½ lemon — essential, don't skip","Cinnamon-sugar to dust"],metric:["1 scoop vanilla whey protein","65g all-purpose flour","5ml baking powder","Pinch of salt","2 eggs","30ml honey","45g melted butter","5ml vanilla extract","Zest of ½ lemon","5ml cinnamon-sugar to dust"],steps:["You'll need a madeleine tin for the shell shape. No tin? Use a mini muffin tin — same taste, different look.","Preheat oven to 375°F / 190°C. Butter and lightly flour each mould.","Whisk eggs and honey vigorously 2 minutes until pale and slightly thickened — this creates the signature hump.","Add vanilla and lemon zest. Whisk again.","Sift in flour, protein powder and baking powder. Fold gently with a spatula — don't whisk, you'll lose the air.","Fold in melted butter last, in a slow stream. Batter should be smooth and glossy.","Refrigerate batter 30 minutes minimum — cold batter creates the famous hump. Don't skip this.","Fill each mould ¾ full. Bake 11–13 minutes until edges are golden and centers spring back when pressed.","Unmould after 5 minutes. Dust with cinnamon-sugar while still warm.","Best eaten within 2 hours. Makes ~12 at 95 kcal / 7g protein each."]},{title:"Madeleines Classiques (La vraie recette)",category:"Snack",cal:110,protein:3,time:"25 min + 1h rest",airfryer:false,pcos:"caution",bloat:"low",imperial:["¾ cup all-purpose flour","1 tsp baking powder","Pinch of salt","2 eggs","¼ cup white sugar","1 tsp vanilla extract","Zest of 1 lemon","4 tbsp butter, browned (beurre noisette)","Cinnamon-sugar or powdered sugar to dust"],metric:["100g all-purpose flour","5ml baking powder","Pinch of salt","2 eggs","50g white sugar","5ml vanilla extract","Zest of 1 lemon","60g butter, browned (beurre noisette)","Cinnamon-sugar or powdered sugar to dust"],steps:["Make beurre noisette: melt butter in a small pan over medium heat, swirling constantly until it smells nutty and turns golden brown. Pour into a bowl immediately. Let cool.","Whisk eggs and sugar a full 3 minutes until pale, thick and ribbon-like. Don't rush this — it's what makes madeleines light.","Add vanilla and lemon zest. The lemon zest is non-negotiable — it's what makes a madeleine a madeleine.","Sift flour, baking powder and salt over the egg mixture. Fold very gently in large sweeping motions.","Drizzle in cooled brown butter slowly, fold until just incorporated.","Cover and refrigerate at least 1 hour — overnight is even better. The cold rest creates the famous hump.","Preheat oven to 400°F / 200°C. Butter and flour the tin generously.","Fill moulds ¾ full. Bake 10–12 minutes until edges are deep golden and centers have humped.","Unmould immediately. Dust with cinnamon-sugar. Eat warm. Marcel Proust était dans le vrai.","Makes ~12 at ~110 kcal each."]},{title:"Protein Blondies",category:"Snack",cal:135,protein:10,time:"25 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop vanilla whey protein","½ cup all-purpose flour","¼ tsp baking powder","Pinch of salt","1 egg","3 tbsp maple syrup","2 tbsp melted butter","1 tsp vanilla extract","¼ cup dark chocolate chips"],metric:["1 scoop vanilla whey protein","65g all-purpose flour","1.25ml baking powder","Pinch of salt","1 egg","45ml maple syrup","30g melted butter","5ml vanilla extract","45g dark chocolate chips"],steps:["Preheat oven to 325°F / 160°C. Line an 8x8 inch / 20x20cm tin with parchment.","Whisk egg, maple syrup, melted butter and vanilla until smooth.","Fold in protein powder, flour, baking powder and salt until just combined.","Fold in chocolate chips.","Spread into tin — batter will be thick, use a spatula to push into corners.","Bake 15–18 minutes. Edges golden, center slightly underdone — firms up as it cools.","Cool fully before cutting — minimum 30 minutes. Better the next day.","Cut into 9 squares at ~135 kcal / 10g protein each. Maple syrup gives caramel depth honey can't match."]},{title:"Blondies Beurre & Miel",category:"Snack",cal:155,protein:3,time:"25 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["¾ cup all-purpose flour","¼ tsp baking powder","¼ tsp salt","4 tbsp melted butter","¼ cup honey or maple syrup","1 egg","1 tsp vanilla extract","¼ cup dark chocolate chips"],metric:["100g all-purpose flour","1.25ml baking powder","1.25ml salt","60g melted butter","60ml honey or maple syrup","1 egg","5ml vanilla extract","45g dark chocolate chips"],steps:["Preheat oven to 325°F / 160°C. Line an 8x8 inch / 20x20cm tin with parchment.","Whisk melted butter and honey/maple syrup together until smooth.","Add egg and vanilla, whisk again until well combined.","Fold in flour, baking powder and salt until just combined.","Fold in chocolate chips. Pour into tin, smooth the top.","Bake 18–20 minutes. Golden on top, slightly soft in the center.","Cool completely before cutting. Makes 9 squares at ~155 kcal each.","Honey version: floral sweetness. Maple version: deep caramel. Try both."]},{title:"No-Bake Energy Balls",category:"Snack",cal:100,protein:5,time:"10 min + chill",airfryer:false,pcos:"good",bloat:"medium",imperial:["1 cup rolled oats","1 scoop vanilla whey protein","3 tbsp honey","2 tbsp peanut butter","1 tsp vanilla extract","¼ cup dark chocolate chips","Pinch of salt","2–3 tbsp HEB 2% milk if too dry"],metric:["90g rolled oats","1 scoop vanilla whey protein","45ml honey","30ml peanut butter","5ml vanilla extract","45g dark chocolate chips","Pinch of salt","30–45ml HEB 2% milk if too dry"],steps:["Mix oats, protein powder and salt in a bowl.","Add honey, peanut butter and vanilla. Mix well — it will be thick and sticky.","Fold in chocolate chips.","If mixture is too dry to hold together, add milk 1 tbsp at a time until it just comes together.","Refrigerate mixture 20–30 minutes — cold mixture is much easier to roll.","Roll into 12 balls using your palms. If they crack, add a tiny splash more milk.","Store in an airtight container in the fridge up to 1 week, or freeze up to 1 month.","Makes 12 balls at ~100 kcal / 5g protein each. No oven, no mess — grab straight from the fridge all week."]},// ── EGG BITES (STARBUCKS-STYLE) ────────────────────────────
{title:"Bacon & Cheese Egg Bites",category:"Breakfast",cal:130,protein:12,time:"35 min",airfryer:false,imperial:["4 large eggs","½ cup low-fat cottage cheese","¼ cup shredded cheddar or gruyère","2 strips bacon, cooked and crumbled","Salt, pepper, pinch of garlic powder","Avocado oil spray"],metric:["4 large eggs","120g low-fat cottage cheese","30g shredded cheddar or gruyère","2 strips bacon, cooked and crumbled","Salt, pepper, pinch of garlic powder","Avocado oil spray"],steps:["Preheat oven to 300°F / 150°C. This low temp is the key — too hot and they turn rubbery instead of silky.","Blend eggs and cottage cheese together in a blender for 30 seconds until completely smooth. The cottage cheese is what gives you that creamy Starbucks texture — don't skip it.","Add shredded cheese, salt, pepper and garlic powder. Pulse 3–4 times to combine — don't over-blend.","Spray a silicone muffin mold or muffin tin very generously with avocado oil.","Divide crumbled bacon evenly into each mold.","Pour egg mixture over the bacon, filling each mold about ¾ full.","Place mold inside a larger baking dish. Pour hot water into the outer dish until it comes halfway up the sides of the mold. This water bath is the Starbucks secret — it steams them gently from outside.","Bake 25–30 minutes until just set — they should jiggle very slightly in the center when you tap the pan.","Cool 5 minutes before unmolding. They pop out cleanly from silicone.","Makes 6 bites at ~130 kcal / 12g protein each. Store in the fridge up to 4 days — reheat 30 seconds in the microwave."]},{title:"Spinach & Feta Egg Bites",category:"Breakfast",cal:110,protein:11,time:"35 min",airfryer:false,imperial:["4 large eggs","½ cup low-fat cottage cheese","¼ cup crumbled feta cheese","½ cup baby spinach, finely chopped","1 garlic clove, minced","¼ tsp dried oregano","Salt & pepper","Avocado oil spray"],metric:["4 large eggs","120g low-fat cottage cheese","40g crumbled feta cheese","30g baby spinach, finely chopped","1 garlic clove, minced","1.25ml dried oregano","Salt & pepper","Avocado oil spray"],steps:["Preheat oven to 300°F / 150°C.","Blend eggs and cottage cheese until completely smooth — full 30 seconds in the blender.","Add oregano, garlic, salt and pepper. Pulse briefly.","Chop spinach very finely — large pieces don't distribute well in small bites.","Stir spinach and crumbled feta into the blended egg mixture by hand — don't blend, you want visible pieces.","Spray muffin molds generously with avocado oil.","Pour mixture evenly into molds, ¾ full.","Place in a larger baking dish with hot water halfway up the sides.","Bake 25–30 minutes until just set with a slight jiggle in the center.","Cool 5 minutes, unmold. Makes 6 bites at ~110 kcal / 11g protein. Very Mediterranean, works perfectly cold as a goûter too."]},{title:"Sun-Dried Tomato & Mozzarella Egg Bites",category:"Breakfast",cal:125,protein:11,time:"35 min",airfryer:false,imperial:["4 large eggs","½ cup low-fat cottage cheese","¼ cup fresh mozzarella, diced small","3 tbsp sun-dried tomatoes (in oil, drained and chopped)","1 tsp fresh or dried basil","Salt & pepper","Avocado oil spray"],metric:["4 large eggs","120g low-fat cottage cheese","40g fresh mozzarella, diced small","30g sun-dried tomatoes, drained and chopped","5ml fresh or dried basil","Salt & pepper","Avocado oil spray"],steps:["Preheat oven to 300°F / 150°C.","Pat sun-dried tomatoes completely dry with paper towels — excess oil will make the bites greasy.","Blend eggs and cottage cheese 30 seconds until silky smooth.","Season with basil, salt and pepper. Pulse twice.","Stir in diced mozzarella and chopped sun-dried tomatoes by hand — don't blend, you want distinct pockets of flavor.","Spray molds generously. Pour mixture in, ¾ full.","Water bath: place in larger dish with hot water halfway up the sides.","Bake 25–30 minutes until just set.","Cool 5 minutes before unmolding. These taste like a caprese salad in egg form — the sun-dried tomatoes are intense and sweet, the mozzarella melts into little creamy pockets.","Makes 6 bites at ~125 kcal / 11g protein. Add to your HEB list: sun-dried tomatoes (jarred), fresh mozzarella."]},{title:"Turkey & Bell Pepper Egg Bites",category:"Breakfast",cal:120,protein:13,time:"35 min",airfryer:false,imperial:["4 large eggs","½ cup low-fat cottage cheese","3 oz cooked ground turkey or diced deli turkey","¼ cup bell peppers, finely diced","2 tbsp shredded cheddar","¼ tsp smoked paprika","Salt & pepper","Avocado oil spray"],metric:["4 large eggs","120g low-fat cottage cheese","85g cooked ground turkey or diced deli turkey","40g bell peppers, finely diced","15g shredded cheddar","1.25ml smoked paprika","Salt & pepper","Avocado oil spray"],steps:["Preheat oven to 300°F / 150°C.","If using raw ground turkey, cook it first in a sprayed pan until browned. Season with salt, pepper and smoked paprika. Let cool.","Blend eggs and cottage cheese 30 seconds until completely smooth.","Add smoked paprika, salt and pepper. Pulse twice.","Dice bell peppers very finely — small pieces integrate better in egg bites.","Stir turkey, bell peppers and shredded cheddar into the egg mixture by hand.","Spray molds well. Pour mixture in ¾ full.","Place in water bath — larger baking dish, hot water halfway up the sides.","Bake 25–30 min until just set with a slight jiggle.","Cool 5 minutes, unmold. Highest protein of the four at 13g per bite. Perfect grab-and-go breakfast — make a batch Sunday, reheat 30 sec each morning all week."]},// ── PROTEIN MILKSHAKES ─────────────────────────────────────
{title:"Vanilla Protein Milkshake (Thick)",category:"Breakfast",cal:220,protein:26,time:"5 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop vanilla whey protein","1 cup HEB 2% milk","4–5 ice cubes","½ tsp vanilla extract","1 tsp honey (optional)","Pinch of salt — brings out the vanilla"],metric:["1 scoop vanilla whey protein","240ml HEB 2% milk","4–5 ice cubes","2.5ml vanilla extract","5ml honey (optional)","Pinch of salt"],steps:["Add liquid first, then protein powder, then ice — this order protects your blender and ensures smooth blending.","Blend on high 45–60 seconds until thick and completely smooth.","Should be like a thick soft-serve shake. Too thick? Add a splash of milk. Too thin? Add 2–3 more ice cubes and blend again.","The pinch of salt is not optional — it rounds out the sweetness and makes the vanilla pop. Trust it.","Drink immediately — milkshakes separate quickly.","💡 For extra thickness: freeze your milk into ice cubes the night before and use those instead of regular ice."]},{title:"Vanilla Protein Milkshake (Drinkable)",category:"Breakfast",cal:240,protein:26,time:"5 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop vanilla whey protein","1½ cups HEB 2% milk","3 ice cubes","½ tsp vanilla extract","1 tsp honey (optional)","Pinch of salt"],metric:["1 scoop vanilla whey protein","360ml HEB 2% milk","3 ice cubes","2.5ml vanilla extract","5ml honey (optional)","Pinch of salt"],steps:["Add milk first, then protein powder, vanilla, honey, salt and ice.","Blend 30–40 seconds — shorter blend time and more milk gives you the classic drinkable texture.","Should pour easily through a straw. Too thick? Add milk 30ml / 2 tbsp at a time.","Pour into a tall glass over fresh ice cubes.","Your everyday version — easy to drink on the go, light enough alongside breakfast."]},{title:"Vanilla Banana Protein Milkshake",category:"Breakfast",cal:280,protein:27,time:"5 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop vanilla whey protein","1 cup HEB 2% milk","½ frozen banana","3 ice cubes","½ tsp vanilla extract","Pinch of cinnamon","Pinch of salt"],metric:["1 scoop vanilla whey protein","240ml HEB 2% milk","½ frozen banana (~60g)","3 ice cubes","2.5ml vanilla extract","Pinch of cinnamon","Pinch of salt"],steps:["Freeze your banana at least 2 hours in advance — frozen banana is the key to natural thickness and creaminess without ice cream.","Add milk, protein powder, frozen banana, vanilla, cinnamon, salt and ice to blender.","Blend on high 45–60 seconds — frozen banana takes longer to break down than ice.","Taste before adding honey — the banana sweetens it naturally, you probably won't need any.","Thick, creamy, naturally sweet. Tastes like a banana soft-serve shake.","💡 The riper the banana was before freezing, the sweeter the shake."]},{title:"Vanilla Peanut Butter Protein Milkshake",category:"Breakfast",cal:320,protein:30,time:"5 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 scoop vanilla whey protein","1 cup HEB 2% milk","1 tbsp natural peanut butter","4 ice cubes","½ tsp vanilla extract","1 tsp honey","Pinch of salt"],metric:["1 scoop vanilla whey protein","240ml HEB 2% milk","15ml natural peanut butter","4 ice cubes","2.5ml vanilla extract","5ml honey","Pinch of salt"],steps:["Add milk first — this helps the peanut butter blend smoothly without sticking to the bottom.","Add protein powder, peanut butter, vanilla, honey, salt and ice.","Blend on high 60 seconds — peanut butter needs a full minute to fully incorporate.","Taste — want more peanut butter flavor? Add another tiny bit, but remember 1 tbsp is already 95 kcal so be precise.","Most filling milkshake on the list — protein + fat keeps you full for hours.","Pour over ice and drink immediately. Dangerously good."]},{title:"Vanilla Berry Protein Milkshake",category:"Breakfast",cal:250,protein:27,time:"5 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 scoop vanilla whey protein","1 cup HEB 2% milk","½ cup frozen blueberries or mixed berries","3 ice cubes","½ tsp vanilla extract","1 tsp honey (optional)","Pinch of salt"],metric:["1 scoop vanilla whey protein","240ml HEB 2% milk","75g frozen blueberries or mixed berries","3 ice cubes","2.5ml vanilla extract","5ml honey (optional)","Pinch of salt"],steps:["Add milk, protein powder, frozen berries, vanilla, salt and ice to blender.","Blend on high 60 seconds — frozen berries need longer than ice to fully break down.","Check color — should be a deep purple-pink. Taste before adding honey — frozen berries are usually sweet enough.","Pour immediately — this one separates faster than the others due to berry juice. Drink within 5 minutes.","💡 Blueberries give the best color and flavor. Mixed berries give more complexity. Both work beautifully."]},// ── PETITS GÂTEAUX FRANÇAIS ────────────────────────────────
{title:"Brioche Moelleuse (No-Yeast)",category:"Snack",cal:150,protein:5,time:"30 min",airfryer:false,pcos:"caution",bloat:"medium",imperial:["1½ cups all-purpose flour","2 tsp baking powder","¼ tsp salt","2 tbsp white sugar","2 eggs","¼ cup HEB 2% milk","3 tbsp melted butter","1 tsp vanilla extract","1 tsp honey (to brush on top)"],metric:["195g all-purpose flour","10ml baking powder","1.25ml salt","25g white sugar","2 eggs","60ml HEB 2% milk","45g melted butter","5ml vanilla extract","5ml honey to brush on top"],steps:["No yeast = no waiting. Baking powder gives the pillowy lift. Not a classic brioche but genuinely soft, buttery and satisfying — exactly the goûter feeling.","Preheat oven to 350°F / 175°C. Line a muffin tin with paper cups or spray well.","Whisk eggs, milk, melted butter, vanilla and sugar together until smooth and slightly pale — about 2 minutes. The whisking adds air which is your rise.","Sift in flour, baking powder and salt. Fold gently until just combined — lumps are fine. Overmixing = tough texture.","Fill each muffin cup about ⅔ full — they rise significantly.","Bake 15–18 minutes until golden and a toothpick comes out clean.","Immediately brush with a thin layer of honey while still hot — gives that signature brioche shine.","Cool 5 minutes before eating. Warm is best. Makes 9 at ~150 kcal / 5g protein each."]},{title:"Pain au Chocolat Style Rolls (No-Yeast)",category:"Snack",cal:180,protein:4,time:"35 min",airfryer:false,pcos:"caution",bloat:"medium",imperial:["1½ cups all-purpose flour","2 tsp baking powder","¼ tsp salt","1 tbsp white sugar","2 eggs","¼ cup HEB 2% milk","3 tbsp melted butter","1 tsp vanilla extract","Filling: ¼ cup dark chocolate chips + 1 tsp butter, melted together","1 egg yolk + 1 tsp milk (egg wash)"],metric:["195g all-purpose flour","10ml baking powder","1.25ml salt","12g white sugar","2 eggs","60ml HEB 2% milk","45g melted butter","5ml vanilla extract","Filling: 45g dark chocolate chips + 5g butter, melted together","1 egg yolk + 5ml milk (egg wash)"],steps:["Preheat oven to 375°F / 190°C. Line a baking sheet with parchment.","Make the chocolate filling first: melt dark chocolate chips and butter together in 20-second microwave bursts, stirring between each until smooth. Set aside to cool and thicken slightly — about 10 min.","Make the dough: whisk eggs, milk, melted butter, vanilla and sugar. Fold in flour, baking powder and salt until a soft dough forms.","Turn onto a lightly floured surface. Roll into a rectangle about 25x20cm / 10x8 inch, roughly 5mm / ¼ inch thick.","Spread chocolate filling in a thin layer over the dough, leaving a 1cm / ½ inch border all around.","Roll up tightly from the long side like a Swiss roll. Slice into 8 rounds.","Place cut-side up on baking sheet. Brush generously with egg wash — this gives you that signature golden crust.","Bake 15–18 minutes until deeply golden. The chocolate will ooze slightly at the edges — that's perfect.","Best eaten warm. Makes 8 at ~180 kcal each. Not a real pain au chocolat — but the chocolate-in-soft-dough feeling is absolutely there."]},{title:"Pitch-Style Chocolate Brioche Buns",category:"Snack",cal:190,protein:6,time:"35 min",airfryer:false,pcos:"caution",bloat:"medium",imperial:["1½ cups all-purpose flour","1 scoop vanilla whey protein","2 tsp baking powder","¼ tsp salt","2 tbsp white sugar","2 eggs","¼ cup HEB 2% milk","3 tbsp melted butter","1 tsp vanilla extract","Filling: ⅓ cup dark chocolate chips + 1 tsp butter melted together","1 tsp honey to brush on top"],metric:["195g all-purpose flour","1 scoop vanilla whey protein","10ml baking powder","1.25ml salt","25g white sugar","2 eggs","60ml HEB 2% milk","45g melted butter","5ml vanilla extract","Filling: 60g dark chocolate chips + 5g butter melted","5ml honey to brush on top"],steps:["The Pitch is a soft brioche roll with a generous chocolate heart — this is the no-yeast protein version. Less guilt, same soul.","Preheat oven to 350°F / 175°C. Spray a muffin tin well or use silicone molds.","Melt chocolate chips and butter together. Let cool and thicken 10 minutes — it needs to be spreadable but not liquid.","Whisk eggs, milk, melted butter, vanilla and sugar until smooth.","Fold in flour, protein powder, baking powder and salt until just combined.","Fill each muffin cup ⅓ full of batter. Add a generous teaspoon of chocolate filling in the center — don't be shy, this is the whole point.","Cover with more batter until each cup is ⅔ full. The chocolate should be completely enclosed.","Bake 16–18 minutes until tops are golden and set.","Brush immediately with honey. Cool 5 minutes before eating — the chocolate center stays molten for a while, be careful.","Makes 9 at ~190 kcal / 6g protein. Closest thing to a real Pitch on this list."]},{title:"Petit Prince Style Biscuits",category:"Snack",cal:95,protein:3,time:"25 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["1 cup all-purpose flour","2 tbsp white sugar","¼ tsp baking powder","Pinch of salt","3 tbsp softened butter","1 egg yolk","1 tbsp HEB 2% milk","½ tsp vanilla extract","Filling: 2 tbsp dark chocolate chips melted","Cinnamon-sugar to dust"],metric:["130g all-purpose flour","25g white sugar","1.25ml baking powder","Pinch of salt","45g softened butter","1 egg yolk","15ml HEB 2% milk","2.5ml vanilla extract","Filling: 20g dark chocolate chips, melted","Cinnamon-sugar to dust"],steps:["The Petit Prince is a small round biscuit with a chocolate base — buttery, slightly crisp, not too sweet. This is the closest thing you can make without a factory.","Preheat oven to 350°F / 175°C. Line a baking sheet with parchment.","Beat softened butter and sugar until pale and creamy — 2 minutes by hand.","Add egg yolk, milk and vanilla. Beat until smooth.","Fold in flour, baking powder and salt until a soft dough forms. Don't overwork.","Roll into 14 small balls, place on tray, flatten into rounds about 5mm / ¼ inch thick with the bottom of a glass.","Bake 10–12 minutes until edges are just golden. Centers should still look pale.","Cool completely — they firm up as they cool. Warm they're too soft.","Melt chocolate chips. Spread or drizzle a thin layer on the flat side of each biscuit. Let set 15 minutes.","Makes 14 biscuits at ~95 kcal each. Best after the chocolate has fully set."]},{title:"Financiers (Without Almond Flour)",category:"Snack",cal:110,protein:4,time:"25 min",airfryer:false,pcos:"caution",bloat:"low",imperial:["½ cup all-purpose flour","¼ cup white sugar","Pinch of salt","3 egg whites","4 tbsp butter (browned — beurre noisette)","1 tsp vanilla extract","1 tsp honey","Optional: a few dark chocolate chips pressed on top"],metric:["65g all-purpose flour","50g white sugar","Pinch of salt","3 egg whites","60g butter, browned","5ml vanilla extract","5ml honey","Optional: a few dark chocolate chips pressed on top"],steps:["Classic financiers use almond flour — we don't have it so we use all-purpose flour with browned butter to compensate. The beurre noisette is absolutely essential and non-negotiable.","Make beurre noisette: melt butter in a small pan over medium heat, swirling constantly until it turns golden brown and smells nutty — like hazelnuts. Pour immediately into a bowl. Let cool 10 minutes.","Preheat oven to 375°F / 190°C. Spray a mini muffin tin or financier mold well.","Whisk flour, sugar and salt together in a bowl.","Add egg whites (not whipped — just straight from the shell), vanilla and honey. Stir until combined.","Pour in the cooled brown butter. Mix until smooth and glossy.","Fill each mold ¾ full. Press a chocolate chip or two on top if using.","Bake 12–14 minutes until edges are golden and centers spring back when pressed.","Cool in the mold 5 minutes before removing — they're delicate warm.","Without almond flour they're slightly less chewy than the classic, but the beurre noisette makes them deeply, properly French. Makes 12 at ~110 kcal / 4g protein each."]},{title:"Crêpes Légères",category:"Snack",cal:120,protein:6,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["¾ cup all-purpose flour","1 egg","1 cup HEB 2% milk","1 tbsp melted butter","1 tsp vanilla extract","Pinch of salt","1 tsp white sugar","Butter for the pan","Toppings: honey, cinnamon-sugar, banana slices, or dark chocolate chips melted"],metric:["100g all-purpose flour","1 egg","240ml HEB 2% milk","15g melted butter","5ml vanilla extract","Pinch of salt","5g white sugar","Butter for the pan","Toppings: honey, cinnamon-sugar, banana slices, or dark chocolate chips melted"],steps:["Blend flour, egg, milk, melted butter, vanilla, salt and sugar in a blender 30 seconds until completely smooth. Or whisk by hand until no lumps remain.","Refrigerate batter 30 minutes minimum — rested batter makes thinner, more elastic crêpes. This step is worth it.","Heat a non-stick pan on medium. Add a tiny knob of butter, swirl to coat.","Pour a small ladle of batter (~60ml / ¼ cup) into the pan. Immediately lift and swirl the pan in a circular motion to spread batter into a thin even circle.","Cook 60–90 seconds until edges look dry and slightly lacy. Flip with a spatula or toss if you're feeling French.","Cook 30 seconds on the other side. Slide onto a plate.","Repeat with remaining batter — each crêpe gets faster as the pan heats up.","Fill with your choice: a drizzle of honey + squeeze of lemon (classic), cinnamon-sugar, sliced banana, or a few melted chocolate chips.","Fold into quarters or roll into a tube. Eat immediately.","Makes about 8 crêpes at ~120 kcal / 6g protein each (before toppings). This is your most authentically French recipe in the entire app."]},{title:"Crêpes Protéinées",category:"Snack",cal:130,protein:10,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["½ cup all-purpose flour","1 scoop vanilla whey protein","1 egg","1 cup HEB 2% milk","1 tbsp melted butter","½ tsp vanilla extract","Pinch of salt","Butter for the pan"],metric:["65g all-purpose flour","1 scoop vanilla whey protein","1 egg","240ml HEB 2% milk","15g melted butter","2.5ml vanilla extract","Pinch of salt","Butter for the pan"],steps:["Protein crêpes are thicker than classic ones due to the whey — expect something between a crêpe and a thin American pancake. Still delicious.","Blend all ingredients 30 seconds until completely smooth. Batter will be slightly thicker than classic crêpe batter.","Rest 15 minutes minimum — the protein powder needs time to hydrate properly.","Heat non-stick pan on medium-low. Protein crêpes burn faster than classic ones — lower heat is key.","Pour ~60ml / ¼ cup batter. Swirl to spread. Cook 90 seconds until edges look set.","Flip carefully — protein crêpes are more delicate. Cook 45 seconds on the other side.","Fill with honey + banana, cinnamon-sugar, or melted dark chocolate.","Makes about 7 crêpes at ~130 kcal / 10g protein each. 4g more protein per crêpe than the classic version — worth it for goûter."]},// ── PRE-WORKOUT (MORNING LIFTING) ──────────────────────────
{title:"Banana & Peanut Butter Toast",category:"Snack",cal:220,protein:7,time:"2 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 slice whole grain or Carb Sense bread","1 tbsp natural peanut butter","½ banana, sliced","Pinch of cinnamon","Optional: drizzle of honey"],metric:["1 slice whole grain or Carb Sense bread","15ml natural peanut butter","½ banana, sliced","Pinch of cinnamon","Optional: drizzle of honey"],steps:["Toast bread until golden.","Spread peanut butter evenly — 1 tbsp only, measure it.","Layer banana slices on top. Dust with cinnamon.","Eat immediately, head to the gym. No sitting around — this is fuel, not a meal.","🏋️ Why this works pre-lifting: the banana gives fast carbs for energy, peanut butter gives a small protein hit to start muscle repair, cinnamon helps with blood sugar stability. Perfect 5-min pre-workout."]},{title:"Greek Yogurt with Banana & Honey",category:"Snack",cal:200,protein:15,time:"2 min",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup Fage 0% Greek yogurt","½ banana, sliced","1 tsp honey","Pinch of cinnamon"],metric:["120ml Fage 0% Greek yogurt","½ banana, sliced","5ml honey","Pinch of cinnamon"],steps:["Spoon yogurt into a bowl or eat straight from the container.","Top with banana slices, honey and cinnamon.","Eat immediately and go.","🏋️ Higher protein than the toast option — good if you're doing heavier lifting. The yogurt protein starts working before you even get to the gym. Banana carbs fuel the session.","🌸 PCOS bonus: cinnamon before a workout helps insulin sensitivity during the glycogen-burning phase."]},{title:"Overnight Oats Pre-Workout Jar",category:"Snack",cal:240,protein:18,time:"2 min (prep night before)",airfryer:false,pcos:"great",bloat:"low",imperial:["⅓ cup rolled oats","½ cup Fage 0% Greek yogurt","¼ cup HEB 2% milk","1 tsp honey","½ tsp cinnamon","½ banana, sliced on top in the morning"],metric:["30g rolled oats","120ml Fage 0% Greek yogurt","60ml HEB 2% milk","5ml honey","2.5ml cinnamon
