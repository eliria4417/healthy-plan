8 each side"],duration:"45–55 min",notes:"Rest 60–90 sec between sets. Focus entirely on form — weight is secondary."},{day:"Tuesday 🦵",type:"Lower Body A",focus:"Quads + Glutes + Hamstrings",exercises:["Dumbbell Goblet Squat — 3×12","Dumbbell Romanian Deadlift (RDL) — 3×10","Glute Bridge — 3×15","Dumbbell Lateral Lunge — 3×10 each","Calf Raises — 3×20"],duration:"40–50 min",notes:"Squeeze the target muscle on every rep. Slow the lowering phase — 3 seconds down."},{day:"Wednesday 🚶",type:"Active Rest",focus:"Recovery",exercises:["Walk toward 10K steps goal","Gentle stretching — 10 min","Optional: 20 min light yoga"],duration:"As needed",notes:"No lifting. Let muscles recover. This is part of the programme, not a skip day."},{day:"Thursday 💪",type:"Upper Body B",focus:"Shoulders + Triceps + Core",exercises:["Seated Dumbbell Shoulder Press — 3×12","Tricep Dumbbell Overhead Extension — 3×12","Dumbbell Bent-Over Row — 3×12 each","Dumbbell Bicep Curl — 3×12","Plank — 3×30 sec","Dead Bug — 3×8 each side"],duration:"45–55 min",notes:"Upper Body B is slightly different from A — each day trains everything but with different emphasis."},{day:"Friday 🦵",type:"Lower Body B",focus:"Glutes + Inner Thighs + Core",exercises:["Dumbbell Romanian Deadlift (RDL) — 3×10","Glute Bridge — 3×15","Dumbbell Goblet Squat — 3×12","Dumbbell Lateral Lunge — 3×10 each","Calf Raises — 3×20","Dead Bug — 3×8 each side"],duration:"40–50 min",notes:"Lower Body B has more glute focus. Add dumbbell to glute bridge once bodyweight feels easy."},{day:"Saturday 🚶",type:"Active Rest",focus:"Steps + Stretch",exercises:["Walk toward 10K steps","15 min full body stretch","Enjoy the weekend — you earned it"],duration:"As needed",notes:"Optional light activity only. Your body is recovering and getting stronger right now."},{day:"Sunday 🚶",type:"Active Rest",focus:"Walk + Recovery",exercises:["Walk toward 10K steps goal","Meal prep for the week","Plan workouts for next week","Prioritise 8 hours sleep"],duration:"As needed",notes:"Gentle movement on Sunday keeps your step streak going without taxing your muscles. Let the lifting days recover while staying active."}],progression:[{phase:"Phase 1 — Learn",weeks:"Weeks 1–4 (May 26 – June 22)",focus:"Master movement patterns. Weight is irrelevant.",intensity:"60% effort",key:"Every exercise feels awkward at first. That's normal. Focus on what the exercise is supposed to feel like, not how much weight you're moving.",checkpoints:["Can you feel the right muscle working?","Is your back flat during RDLs?","Are your knees tracking properly in squats?","Can you hold a plank for 30 seconds?"]},{phase:"Phase 2 — Build + Add Machines",weeks:"Weeks 5–8 (June 23 – July 20)",focus:"Increase dumbbell weight + introduce machines",intensity:"70–75% effort",key:"Start increasing weight on dumbbells. Add machines progressively — they isolate muscles better and let you go heavier safely. See the Machine Guide tab for exactly what to add and when.",checkpoints:["Are you lifting more than Week 1?","Have you tried the cable tricep pushdown?","Are you still sore in the right places?","Getting 100–110g protein daily?"]},{phase:"Phase 3 — Push",weeks:"Weeks 9–12 (July 21 – Aug 17)",focus:"Heavier loads, more machine variety",intensity:"80% effort",key:"This is where visible changes accelerate. Mix dumbbells and machines freely — use whichever gives you better muscle activation for each exercise.",checkpoints:["Goblet squat weight doubled from Week 1?","Can you do a 60-second plank?","Are machines feeling more natural?","Sleeping 7–8 hours consistently?"]},{phase:"Phase 4 — Peak",weeks:"Weeks 13–14 (Aug 18 – Sep 1)",focus:"Maintain intensity, prioritise sleep and nutrition.",intensity:"75% effort",key:"Don't try to do too much in the final two weeks. Results are the sum of 14 weeks of consistency — not one heroic final push. Stay the course.",checkpoints:["Compare photos from Week 1","How do your clothes fit?","What's your energy like vs May?","Celebrate how far you've come"]}],machines:[{name:"Lat Pulldown",week:"Week 5",muscle:"Back + Biceps",goal:"Flat stomach / posture / upper body definition",equipment:"Lat pulldown machine",video_tip:"Search 'lat pulldown form beginners'",how:["Sit at the machine, adjust thigh pad so it fits snugly over your legs","Grip the bar slightly wider than shoulder-width, palms facing away","Pull the bar down to your upper chest — lead with your elbows, not your hands","Squeeze your back at the bottom — you should feel it between your shoulder blades","Let the bar rise slowly back up, fully extending arms"],mistakes:["Pulling behind the head — strains neck, skip this entirely","Using momentum to yank the bar down","Not fully extending at the top — you lose range of motion"],beginner_weight:"20–25 kg / 44–55 lbs",sets:"3 sets of 10–12 reps",why:"The lat pulldown builds the V-shape back muscles that create the illusion of a smaller waist. A strong back also reduces upper body tension, dramatically improves posture, and makes everything you lift easier."},{name:"Cable Tricep Pushdown",week:"Week 5",muscle:"Triceps (back of arm)",goal:"Toned arms — eliminates 'bingo wing' appearance",equipment:"Cable machine + rope or bar attachment",video_tip:"Search 'cable tricep pushdown rope form'",how:["Attach a rope to the high pulley of the cable machine","Stand facing the machine, grip the rope ends, elbows pinned to your sides","Push the rope down and slightly apart until arms are fully straight","Squeeze triceps hard at the bottom for 1 second","Let rope rise slowly — control the weight up"],mistakes:["Elbows flaring out — keep them glued to your sides","Leaning forward excessively","Not fully extending at the bottom — incomplete contraction"],beginner_weight:"10–15 kg / 22–33 lbs",sets:"3 sets of 12–15 reps",why:"This is the single best exercise for toning the back of the arms. Triceps make up 2/3 of arm volume — more impact than biceps for arm appearance."},{name:"Cable Bicep Curl",week:"Week 5",muscle:"Biceps",goal:"Toned, defined arms",equipment:"Cable machine + straight bar or EZ bar",video_tip:"Search 'cable bicep curl form beginners'",how:["Attach a straight bar to the low pulley","Stand facing machine, grip bar palms up, arms extended","Curl bar up toward shoulders, keeping elbows pinned to sides","Squeeze at the top, lower slowly — 3 seconds down","Cable keeps constant tension throughout — more effective than dumbbells for this movement"],mistakes:["Swinging body to lift — too heavy, reduce weight","Elbows drifting forward","Rushing the lowering phase"],beginner_weight:"10–12 kg / 22–26 lbs",sets:"3 sets of 12 reps",why:"Cable curls maintain tension throughout the full range of motion, unlike dumbbells which lose tension at the top. Better muscle activation = better arm definition."},{name:"Leg Press",week:"Week 6",muscle:"Quads + Glutes + Hamstrings",goal:"Toned legs, fat loss acceleration",equipment:"Leg press machine",video_tip:"Search 'leg press form beginners foot placement'",how:["Sit in the machine, back and head against the pad","Place feet shoulder-width apart on the platform, toes slightly out","Unrack by straightening legs, then lower platform by bending knees to 90°","Drive through heels to press back up — don't lock knees at top","Keep lower back pressed into the seat throughout"],mistakes:["Letting knees cave inward — push them out","Locking knees at the top — keeps tension on the joint","Lowering too fast — you lose the muscle-building benefit"],beginner_weight:"30–40 kg / 66–88 lbs",sets:"3 sets of 12 reps",why:"You can load the leg press 3–4x heavier than a goblet squat, driving significantly more glute and quad development. This is where legs really start to change shape."},{name:"Hip Abductor Machine",week:"Week 6",muscle:"Outer glutes + Hip abductors",goal:"Rounder glutes, outer thigh toning",equipment:"Hip abductor machine (the butterfly leg machine)",video_tip:"Search 'hip abductor machine form'",how:["Sit in the machine with pads against outer thighs","Push legs outward against the resistance as far as comfortable","Hold 1 second at the widest point — squeeze glutes","Return slowly — don't let the weight slam back"],mistakes:["Going too fast — slow controlled movement builds more muscle","Using too much weight before you feel the right muscles working","Forgetting to squeeze glutes at the widest point"],beginner_weight:"25–35 kg / 55–77 lbs",sets:"3 sets of 15 reps",why:"The hip abductor and glute medius are almost always underdeveloped in women who focus on cardio. Strengthening them directly improves glute activation in squats and deadlifts, and reduces lower body fat storage around the hips."},{name:"Seated Cable Row",week:"Week 6",muscle:"Mid-back + Biceps + Rear Shoulders",goal:"Back definition, posture, upper body strength",equipment:"Cable row machine + V-bar or wide bar",video_tip:"Search 'seated cable row form beginners'",how:["Sit at the cable row station, feet on the platform, slight bend in knees","Grip the V-bar, sit up tall — don't lean back","Pull the bar to your lower stomach — elbows go back behind you","Squeeze shoulder blades together at the end","Extend arms slowly, lean slightly forward to get full stretch"],mistakes:["Using lower back momentum to pull — keep torso almost still","Rounding shoulders forward","Pulling to the chest instead of stomach"],beginner_weight:"20–25 kg / 44–55 lbs",sets:"3 sets of 12 reps",why:"Rows build the mid-back muscles that pull your shoulders back, immediately improving posture. Better posture makes your stomach look flatter without losing a single gram."},{name:"Assisted Pull-Up Machine",week:"Week 8",muscle:"Back + Biceps + Core",goal:"Upper body strength, V-shape definition",equipment:"Assisted pull-up machine",video_tip:"Search 'assisted pull-up machine form beginners'",how:["Select assistance weight — heavier assistance = easier (start high)","Kneel or stand on the platform depending on the machine","Grip handles wide, palms facing away","Pull yourself up until chin is above the handles","Lower slowly — 3 seconds down"],mistakes:["Not going all the way up — half reps build nothing","Dropping down fast — the lowering phase builds as much strength as pulling up","Using too much assistance — challenge yourself"],beginner_weight:"Start with high assistance (machine does most of the work), reduce over weeks",sets:"3 sets of 8–10 reps",why:"Pull-ups are the ultimate upper body exercise. The assisted version lets you build toward them gradually. When you can do a real unassisted pull-up, you'll know your upper body strength has fundamentally changed."}],beginner_tips:[{icon:"📱",title:"Film yourself",tip:"For the first two weeks, film your side profile during squats and RDLs. You don't need to show anyone — it's just for you to check your form. Most people are shocked by what they see vs what they thought they were doing."},{icon:"📓",title:"Log every session",tip:"Write down: exercise, weight used, reps completed. Every single session. This tells you when to increase weight and gives you proof of progress when you feel like nothing is changing."},{icon:"⏱️",title:"Rest between sets",tip:"60–90 seconds minimum between sets. Beginners often rush because they feel fine — but the rest is when your muscles prepare for the next set. Rushing = weaker sets = less progress."},{icon:"🎯",title:"Mind-muscle connection",tip:"Before each set, think about the muscle you're supposed to be working. Touch it if that helps. Intentional contraction is what causes adaptation — mindlessly moving weight through space is not the same thing."},{icon:"🔼",title:"Progressive overload",tip:"The fundamental law of getting stronger: you must gradually increase the challenge over time. Add 1–2 kg when you can complete all reps with good form. Never add weight until your form is solid."},{icon:"😴",title:"Sleep is the workout",tip:"Your muscles don't grow in the gym — they grow overnight. 7–8 hours is not a bonus, it's a requirement. Two weeks of poor sleep will erase 2 weeks of good training."}]};// ─────────────────────────────────────────────────────────────
