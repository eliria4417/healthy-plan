rips, a dollop of Greek yogurt, green onions and optional cheese.","🌸 Sweet potato has a significantly lower GI than regular potato — it releases sugars slowly which is ideal for PCOS blood sugar stability. The Greek yogurt replaces sour cream with virtually identical flavour but adds protein and probiotics.","💡 G-Hughes Sugar Free BBQ Sauce is at HEB — zero sugar, excellent flavour. Worth having permanently in your fridge.","🔄 Works as a very satisfying lunch too — prep the sweet potato Sunday and reheat in the microwave in 90 seconds."]},{title:"Chicken Tikka-Style Bowl",category:"Dinner",cal:380,protein:38,time:"20 min",airfryer:true,pcos:"great",bloat:"low",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","Tikka sauce: 3 tbsp nonfat Greek yogurt + 2 tbsp canned diced tomatoes + ½ tsp garam masala + ½ tsp cumin + ¼ tsp turmeric + ¼ tsp smoked paprika + salt + garlic","1 cup / 100g cauliflower rice","½ cup / 80g spinach, wilted","Fresh cilantro + lime to serve"],metric:["140g Real Good Foods Breaded Chicken Strips","Tikka sauce: 45ml nonfat Greek yogurt + 30ml canned diced tomatoes + garam masala + cumin + turmeric + smoked paprika + salt + garlic","100g cauliflower rice","80g spinach, wilted","Cilantro + lime"],steps:["Air fry chicken strips at 400°F / 200°C for 15–18 minutes until fully cooked and crispy.","Make the tikka sauce: mix Greek yogurt, diced tomatoes and all spices together in a small bowl until smooth and combined.","Warm the sauce briefly in a small pan over low heat 2–3 minutes — don't boil or it will split.","Microwave cauliflower rice 3 minutes. Wilt spinach in a sprayed pan 1–2 minutes.","Build the bowl: cauliflower rice base, wilted spinach, then chicken strips. Pour warm tikka sauce over the chicken.","Finish with fresh cilantro and a squeeze of lime.","🌸 This is one of the most PCOS-powerful warm recipes in the app. Turmeric is anti-inflammatory, cumin improves insulin sensitivity, Greek yogurt adds probiotics, spinach adds magnesium, tomatoes add lycopene. Every element serves your hormones.","💡 The Greek yogurt tikka sauce is a game-changer — it tastes genuinely creamy and rich but is protein-dense and low fat. Add a pinch of cayenne if you want more heat."]},{title:"Chicken & Broccoli Cheese Bowl",category:"Dinner",cal:370,protein:40,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","2 cups / 200g broccoli florets, steamed","Cheese sauce: 40g / 1.4 oz low-fat cottage cheese + 20g / 0.7 oz shredded cheddar + 2 tbsp milk + ½ tsp garlic powder + salt and pepper — blended until smooth","Optional: ¼ cup / 45g cooked rice or cauliflower rice as base"],metric:["140g Real Good Foods Breaded Chicken Strips","200g broccoli florets, steamed","Cheese sauce: 40g low-fat cottage cheese + 20g shredded cheddar + 30ml milk + garlic powder + salt","Optional: 45g cooked rice or cauliflower rice"],steps:["Air fry chicken strips at 400°F / 200°C for 15–18 minutes until crispy.","Steam broccoli in the microwave 3–4 minutes until tender but still bright green.","Make the cheese sauce: blend cottage cheese, cheddar, milk, garlic powder and seasoning in a small blender or with an immersion blender until completely smooth. Warm in a small saucepan over low heat 2–3 minutes, stirring.","Build the bowl: optional rice base, then broccoli, then chicken strips.","Pour warm cheese sauce generously over everything.","🌸 The cottage cheese base makes this sauce surprisingly high-protein while keeping the fat low. It genuinely tastes like a creamy cheddar sauce — no one would guess it's mostly cottage cheese.","💡 This is the ultimate PCOS comfort food — it satisfies the cheesy, warm, creamy craving without a single compromise. Sterling should double everything for his portion.","💡 The cheese sauce keeps in the fridge 3 days — make a batch and pour it over broccoli and chicken all week."]},{title:"Chicken Fajita Bowl",category:"Dinner",cal:400,protein:38,time:"20 min",airfryer:true,pcos:"great",bloat:"medium",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","1 cup / 150g bell peppers (mixed colours), sliced","½ cup / 70g onion, sliced","Fajita seasoning: cumin + smoked paprika + garlic powder + chili powder + salt","75g / 2.6 oz cauliflower rice","20g / 0.7 oz avocado","2 tbsp nonfat Greek yogurt (instead of sour cream)","Lime juice + fresh cilantro"],metric:["140g Real Good Foods Breaded Chicken Strips","150g bell peppers, sliced","70g onion, sliced","Fajita seasoning to taste","75g cauliflower rice","20g avocado","30ml nonfat Greek yogurt","Lime + cilantro"],steps:["Air fry chicken strips at 400°F / 200°C for 15–18 minutes until crispy.","While chicken cooks, sauté bell peppers and onion in a sprayed pan over high heat with fajita seasoning — cook 4–5 minutes until slightly charred and softened.","Microwave cauliflower rice 3 minutes.","Slice chicken strips into diagonal pieces.","Build the bowl: cauliflower rice base, then fajita peppers and onions, then sliced chicken.","Top with avocado, a dollop of Greek yogurt and fresh cilantro. Squeeze lime over everything.","🌸 Bell peppers are extremely high in vitamin C which supports adrenal function — particularly important in PCOS where adrenal androgens are often elevated. The three colours give you three different antioxidant profiles.","⚠️ Bloat rating is medium because of onions — if you're in the luteal phase, use cooked onion only and reduce the portion. The cooked peppers are fine.","💡 This works equally well as a wrap — roll everything in a low-carb tortilla after building the bowl. Instant fajita wrap with all the same macros."]},{title:"Chicken Quesadilla Bowl",category:"Dinner",cal:380,protein:36,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["5 oz / 140g Real Good Foods Breaded Chicken Strips","1 large low-carb tortilla (HEB Carb Sense)","40g / 1.4 oz black beans, rinsed","30g / 1 oz corn","30g / 1 oz shredded Mexican cheese blend","2 tbsp nonfat Greek yogurt","2 tbsp salsa (no added sugar)","Optional: jalapeño slices, fresh cilantro, lime"],metric:["140g Real Good Foods Breaded Chicken Strips","1 large low-carb tortilla","40g black beans rinsed","30g corn","30g Mexican cheese blend shredded","30ml nonfat Greek yogurt","30ml salsa","Optional: jalapeño, cilantro, lime"],boyfriend:{imperial:["7 oz / 200g Real Good Foods Breaded Chicken Strips","1 large regular flour tortilla","60g / 2.1 oz black beans, rinsed","45g / 1.6 oz corn","60g / 2.1 oz shredded Mexican cheese blend (doubled)","4 tbsp nonfat Greek yogurt (extra)","3 tbsp salsa (no added sugar)","Optional: jalapeño slices, fresh cilantro, lime"],metric:["200g Real Good Foods Breaded Chicken Strips","1 large regular flour tortilla","60g black beans, rinsed","45g corn","60g Mexican cheese blend, shredded (doubled)","60ml nonfat Greek yogurt (extra)","45ml salsa","Optional: jalapeño, cilantro, lime"],cal:540,protein:48},steps:["Air fry chicken strips at 400°F / 200°C for 15–18 minutes until crispy. Let cool slightly, then slice into small pieces.","Lay tortilla flat. On one half, layer cheese, black beans, corn and sliced chicken.","Fold the tortilla in half over the filling.","Heat a pan over medium heat, spray lightly. Press the folded quesadilla down with a spatula and cook 2–3 minutes per side until golden and crispy and cheese is melted.","Slice into wedges. Serve with Greek yogurt as the dip instead of sour cream, and salsa on the side.","🌸 Black beans are a high-fibre, high-protein PCOS superfood — they slow glucose absorption significantly. Combined with the Greek yogurt dip instead of sour cream, this is a PCOS-adapted quesadilla that actually tastes like the real thing.","💡 This also works perfectly deconstructed as a bowl — skip the pan-pressing step, just add everything to a bowl with cauliflower rice, Greek yogurt, salsa and the sliced chicken on top. Saves 5 minutes.","🔄 Sterling version: his full ingredient list and macros are shown above under the 🏃 Sterling tab — regular large flour tortilla instead of low-carb, double cheese, extra Greek yogurt. He can eat both halves."]},// ── THE WOMEN'S DIETITIAN RECIPES ──────────────────────────
{title:"High Protein Breakfast Biscuits",category:"Breakfast",cal:280,protein:22,time:"30 min",airfryer:false,pcos:"great",bloat:"low",imperial:["8 eggs","½ cup / 115g low-fat cottage cheese","1 tsp salt, ½ tsp black pepper, ½ tsp garlic powder, ½ tsp onion powder, ¼ tsp red chili flakes","6 oz / 170g cooked chicken sausage (Bilinski or Al Fresco), diced","½ cup / 75g grape tomatoes, diced","1 large handful spinach, roughly chopped","¾ cup / 75g almond flour","⅓ cup / 40g coconut flour","½ tsp baking powder","½ cup / 60g shredded cheddar cheese (to top)"],metric:["8 eggs","115g low-fat cottage cheese","Salt, pepper, garlic powder, onion powder, chili flakes","170g cooked chicken sausage, diced","75g grape tomatoes, diced","1 large handful spinach, chopped","75g almond flour","40g coconut flour","2.5ml baking powder","60g shredded cheddar (to top)"],steps:["Preheat oven to 375°F / 190°C. Line two baking sheets with parchment paper.","Whisk eggs, cottage cheese and all spices together in a large bowl until combined.","Fold in diced chicken sausage, tomatoes and spinach.","Add almond flour, coconut flour and baking powder. Stir until a thick dough forms — it will be sticky and dense.","Using a large cookie scoop or large spoon, scoop dough onto baking sheets forming 12 large biscuits. Sprinkle cheddar cheese on top of each.","Bake 18–20 minutes until set and golden. Let cool fully before transferring to a container — they firm up as they cool.","Store in the fridge up to 5 days. Reheat microwave 45–60 seconds.","🌸 These are one of the best PCOS batch breakfasts in the app — almond flour keeps the GI extremely low, cottage cheese adds casein protein, spinach adds magnesium. Makes 12 biscuits = breakfast for 4–6 days.","💡 Make a double batch on Sunday. Sterling eats 2–3, you eat 1–2. Perfect portion flexibility."]},{title:"Smoky Harissa Chicken Bake",category:"Dinner",cal:410,protein:42,time:"50 min",airfryer:false,pcos:"great",bloat:"low",imperial:["2 carrots, shredded","1 cup / 70g kale, chopped","¾ cup / 140g brown rice (uncooked)","1⅔ cups / 400ml chicken bone broth","1 can / 400g chickpeas, drained","⅓ cup / 80ml harissa paste","1 tsp salt, ½ tsp black pepper, ½ tsp cumin, ½ tsp turmeric, ½ tsp onion powder","1 lb / 450g chicken thighs (bone-in skin-on, or boneless skinless)","4 oz / 115g feta cheese, crumbled"],metric:["2 carrots, shredded","70g kale, chopped","140g brown rice (uncooked)","400ml chicken bone broth","400g can chickpeas, drained","80ml harissa paste","Salt, pepper, cumin, turmeric, onion powder","450g chicken thighs","115g feta, crumbled"],boyfriend:{imperial:["Same shared bake — his portion simply takes extra chicken thigh","When portioning, give him 2 chicken thighs instead of 1 from the same dish","Same rice, chickpeas and kale mixture, same feta"],metric:["Same shared bake — his portion takes extra chicken thigh","2 chicken thighs instead of 1 from the same dish","Same rice, chickpeas, kale and feta"],cal:480,protein:54},steps:["Preheat oven to 375°F / 190°C.","Combine shredded carrots, kale, uncooked rice, bone broth, chickpeas, harissa paste and all spices in a large rectangular baking dish. Stir very well to combine.","Season chicken thighs with salt and pepper. Place on top of the rice mixture, pressing them in slightly.","Cover the dish tightly with foil and bake 35 minutes.","Remove foil, sprinkle feta over everything and bake uncovered 10–15 more minutes until rice is cooked through and chicken is fully cooked.","🌸 Harissa is made from roasted chilli peppers, garlic, olive oil and spices — all PCOS-positive. Turmeric + cumin are anti-inflammatory. Bone broth supports gut healing. Chickpeas add fibre that slows glucose absorption. This is a PCOS powerhouse one-pan meal.","💡 Makes 4 servings — batch cook Sunday and eat Monday + Tuesday dinner or lunch. The rice absorbs all the flavour overnight and tastes even better reheated.","🔄 Sterling's version: since this is one shared baked dish, his version isn't separate ingredients — just give him 2 chicken thighs from the pan instead of 1 when portioning out. See his tab above for the adjusted macros."]},{title:"Tiramisu Overnight Oats",category:"Breakfast",cal:320,protein:28,time:"5 min prep + overnight",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup / 45g rolled oats","⅔ cup / 160ml whole milk or oat milk","¼ cup / 60ml brewed coffee (cooled)","1 tbsp chia seeds","1 tbsp sweetener (allulose, monk fruit or honey)","1 scoop unflavored collagen peptides or vanilla protein powder","½ tsp vanilla extract","Pinch of salt","2 tbsp / 30ml Greek yogurt (on top)","Pinch of unsweetened cocoa powder (to finish)"],metric:["45g rolled oats","160ml whole or oat milk","60ml brewed coffee, cooled","8g chia seeds","15ml sweetener","1 scoop collagen or vanilla protein powder","Vanilla extract, salt","30ml Greek yogurt to top","Pinch cocoa powder"],steps:["Combine oats, milk, cooled coffee, chia seeds, sweetener, protein powder, vanilla and salt in a jar. Stir thoroughly.","Refrigerate overnight or at least 4 hours.","In the morning, spoon Greek yogurt on top and dust with cocoa powder.","🌸 Coffee + dark cocoa powder both contain flavanols that reduce inflammation and improve insulin sensitivity. Collagen peptides support joint health and skin — often affected by PCOS hormonal imbalances. Chia seeds add omega-3 fatty acids and fibre.","💡 This tastes genuinely like tiramisu for breakfast. Make 5 jars on Sunday — breakfast sorted all week with zero morning effort.","The cooled coffee is essential — it soaks into the oats and creates that authentic espresso flavour. Don't skip it."]},{title:"Ramen Jars",category:"Lunch",cal:350,protein:34,time:"10 min prep",airfryer:false,pcos:"great",bloat:"low",imperial:["2 cups / 170g cooked and shredded chicken breast","2 carrots, shredded","1 cup / 70g kale, shredded","½ cup / 40g brown mushrooms, thinly sliced","1 tbsp chili garlic sauce","3 tbsp / 45ml low-sodium soy sauce or tamari","2 tsp miso paste","2 oz / 55g thin rice noodles","Boiling water to pour over"],metric:["170g cooked shredded chicken breast","2 carrots, shredded","70g kale, shredded","40g brown mushrooms, thinly sliced","15ml chili garlic sauce","45ml low-sodium soy sauce or tamari","10g miso paste","55g thin rice noodles","Boiling water"],steps:["Divide all ingredients equally into a large heat-resistant glass jar or bowl: rice noodles first at the bottom, then miso paste, soy sauce, chili garlic sauce, mushrooms, carrots, kale, then shredded chicken on top.","When ready to eat, pour boiling water over everything, stir well and put the lid on.","Wait 3–5 minutes until noodles are soft and everything is warmed through. Stir again before eating.","🌸 Miso is one of the best probiotic foods you can eat — it contains live cultures that directly support the gut microbiome which regulates oestrogen in PCOS. Kale is one of the highest magnesium vegetables. Mushrooms contain vitamin D.","💡 Batch prep 3–4 jars on Sunday — assembled and ready in the fridge. Just pour boiling water when you want to eat. The perfect desk lunch or post-workout meal.","🌸 Use tamari instead of soy sauce for a gluten-free version — equally good."]},{title:"Honey Garlic Chicken & Rice",category:"Dinner",cal:420,protein:40,time:"30 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 lb / 450g chicken breast, sliced into bite-sized pieces","2 tbsp toasted sesame oil","2 yellow onions, diced","4 cloves garlic, minced","3 green onions, sliced","2 tbsp / 30ml honey","3 tbsp / 45ml low-sodium soy sauce or tamari","1 cup / 185g brown rice (uncooked) — or cauliflower rice for lower GI","2 cups / 480ml chicken bone broth or water (for cooking rice)","Sesame seeds to garnish","Salt, pepper to taste"],metric:["450g chicken breast, bite-sized pieces","30ml toasted sesame oil","2 yellow onions, diced","4 cloves garlic, minced","3 green onions, sliced","30ml honey","45ml low-sodium soy sauce","185g brown rice or cauliflower rice","480ml chicken bone broth","Sesame seeds, salt, pepper"],steps:["Cook rice in bone broth according to package instructions. Bone broth instead of water adds protein and gut-healing collagen.","Heat sesame oil in a large pan over medium-high heat. Add onions and cook 4–5 minutes until soft and translucent.","Add garlic and cook 1 minute more until fragrant.","Add chicken pieces, season with salt and pepper, cook 6–8 minutes until browned and cooked through.","Mix honey and soy sauce together, pour over chicken. Stir and cook 2–3 minutes until sauce caramelises slightly and coats everything.","Serve over cooked rice. Garnish with green onions and sesame seeds.","🌸 Sesame oil contains lignans that directly support hormone balance. Garlic is anti-inflammatory. Honey in small amounts has a lower GI impact than refined sugar. Use cauliflower rice to make this PCOS-great rated.","💡 Batch cook 4 portions Sunday — portion into containers. Reheats perfectly in 90 seconds."]},{title:"Denver Omelette Bowls",category:"Breakfast",cal:310,protein:30,time:"35 min",airfryer:false,pcos:"great",bloat:"low",imperial:["2 eggs per bowl","½ cup / 115g low-fat cottage cheese per bowl","¼ red bell pepper, diced","¼ green bell pepper, diced","¼ cup / 40g yellow onion, diced","¼ cup / 35g diced ham or turkey ham","¼ cup / 30g shredded cheddar cheese","¼ tsp salt, ⅛ tsp black pepper, ⅛ tsp red chili flakes (optional)","1 tbsp grated Parmesan (to top)"],metric:["2 eggs","115g low-fat cottage cheese","¼ red bell pepper diced","¼ green bell pepper diced","40g yellow onion diced","35g ham or turkey ham diced","30g shredded cheddar","Salt, pepper, optional chili flakes","10g Parmesan to top"],steps:["Preheat oven to 400°F / 200°C. Lightly grease 4 small oven-safe baking dishes or ramekins.","For each bowl: add all ingredients except Parmesan and stir well to combine — eggs, cottage cheese, peppers, onion, ham, cheddar and seasoning.","Sprinkle Parmesan on top of each bowl.","Bake 28–30 minutes until eggs are fully set. They may need a little longer depending on the size of your dishes — check after 25 minutes.","🌸 Cottage cheese + eggs = complete amino acid profile. Bell peppers (both colours) provide two different antioxidant profiles and vitamin C which supports adrenal function — key in PCOS. Ham adds iron which is often deficient in women with heavy periods from PCOS.","💡 Make 4 bowls at once on Sunday — batch breakfast for Mon–Thu. Cover and refrigerate, reheat 60–90 seconds each morning. The most efficient high-protein PCOS breakfast in the app."]},{title:"Low Carb Beef Stroganoff",category:"Dinner",cal:380,protein:40,time:"30 min",airfryer:false,pcos:"good",bloat:"low",imperial:["1 lb / 450g sirloin steak, sliced thin (or lean ground beef)","8 oz / 225g white mushrooms, sliced","½ yellow onion, diced","3 cloves garlic, minced","1½ cups / 360ml beef bone broth","3 oz / 85g low-fat cream cheese, cut into pieces","1 tbsp tamari or low-sodium soy sauce","1 tbsp Dijon or honey mustard","1 tsp salt, 1 tsp black pepper, 1 tsp Italian seasoning","2 tbsp / 30ml nonfat Greek yogurt (instead of sour cream)","5 cups / 500g frozen cauliflower rice, heated","1 tbsp avocado oil"],metric:["450g sirloin steak, thin strips or lean ground beef","225g white mushrooms, sliced","½ yellow onion diced","3 cloves garlic","360ml beef bone broth","85g low-fat cream cheese","Tamari, Dijon, salt, pepper, Italian seasoning","30ml nonfat Greek yogurt","500g cauliflower rice","15ml avocado oil"],steps:["Heat avocado oil in a large pan over medium-high heat. Add steak strips or ground beef, season well. Cook until browned, 5–7 minutes. Remove and set aside.","In the same pan, add mushrooms and onion. Cook 4–5 minutes until mushrooms are golden.","Add garlic, cook 1 minute. Add bone broth, cream cheese pieces, tamari, mustard and all spices. Stir until cream cheese melts and sauce becomes smooth and creamy.","Return beef to the pan. Simmer 5 minutes until sauce thickens slightly.","Remove from heat. Stir in Greek yogurt — don't add it while boiling or it will split.","Serve over heated cauliflower rice.","🌸 Cauliflower rice instead of egg noodles drops the carbs from ~45g to ~6g per serving — a massive GI improvement without compromising the satisfaction. Bone broth supports gut healing. Greek yogurt adds probiotics vs traditional sour cream.","💡 Batch cook 4 portions Sunday. Keeps 4 days in the fridge. Even better the next day as the sauce thickens."]},{title:"Brownie Batter Baked Oats",category:"Breakfast",cal:295,protein:18,time:"35 min",airfryer:false,pcos:"good",bloat:"low",imperial:["½ cup / 45g rolled oats","1 tbsp unsweetened cocoa powder","1 tbsp chocolate protein powder","Pinch salt, pinch cinnamon","¼ tsp baking powder","Pinch baking soda","½ cup / 120ml whole milk or oat milk","½ tsp vanilla","½ tsp brewed coffee (optional — deepens flavour)","1 tsp liquid sweetener (maple syrup, honey or allulose)","½ tsp apple cider vinegar","2 tbsp / 20g dark chocolate chips (70%+)","Yogurt frosting: 3 tbsp / 45ml Greek yogurt + 1 tsp chocolate protein powder + ½ tsp honey"],metric:["45g rolled oats","7g cocoa powder","1 tbsp chocolate protein powder","Pinch salt + cinnamon","Baking powder, baking soda","120ml whole or oat milk","Vanilla, coffee, sweetener, apple cider vinegar","20g dark chocolate chips","Frosting: 45ml Greek yogurt + protein powder + honey"],steps:["Preheat oven to 350°F / 175°C. Grease a small oven-safe ramekin or dish.","Mix oats, cocoa powder, protein powder, salt, cinnamon, baking powder and baking soda in a bowl.","In a separate bowl, combine milk, vanilla, coffee, sweetener and vinegar. Pour into dry ingredients and mix well. Fold in chocolate chips.","Pour into greased dish and bake 28–30 minutes until set.","Let cool. Mix yogurt frosting ingredients together and spread on top. Chill and slice or eat warm.","🌸 Dark chocolate (70%+) and cocoa powder contain flavanols that measurably reduce inflammation and improve insulin sensitivity — direct PCOS benefits from what tastes like a dessert breakfast.","💡 Make 4 portions Sunday by using a rectangular dish and slicing into squares. Eat cold with frosting on top — genuinely feels indulgent for a weekday morning.","The apple cider vinegar + baking soda creates lift — don't skip it."]},{title:"Hot Honey Chicken",category:"Dinner",cal:400,protein:40,time:"40 min",airfryer:true,pcos:"good",bloat:"low",imperial:["1 lb / 450g chicken breast, diced","3 small sweet potatoes, peeled and diced","1 small red onion, sliced","1 cup / 90g broccoli florets","2 tbsp hot honey (or mix 2 tbsp honey + ½ tsp chili flakes)","1 tbsp avocado oil","1 tsp smoked paprika","½ tsp garlic powder","Salt and pepper to taste","Optional: crumbled feta to serve"],metric:["450g chicken breast, diced","3 small sweet potatoes, peeled and diced","1 small red onion, sliced","90g broccoli florets","30ml hot honey","15ml avocado oil","Smoked paprika, garlic powder, salt, pepper","Optional: feta"],steps:["Preheat oven to 400°F / 200°C (or use air fryer at 380°F / 195°C for crispier results).","Toss sweet potato and red onion with avocado oil, smoked paprika, garlic powder, salt and pepper on a large baking sheet. Spread in a single layer.","Roast 20 minutes, then add broccoli and diced chicken to the pan. Drizzle hot honey over everything.","Return to oven for 15–20 more minutes until chicken is cooked through and sweet potato is tender.","Air fryer version: cook sweet potato and onion 15 minutes at 380°F, add chicken and broccoli, drizzle honey, cook 12–15 more minutes.","Serve topped with optional crumbled feta.","🌸 Sweet potato instead of regular potato significantly lowers the GI impact. Hot honey adds anti-inflammatory capsaicin. Broccoli contains DIM for oestrogen clearance.","💡 Sheet pan or air fryer — this is the easiest batch dinner in the app. Makes 4 servings, reheats in 90 seconds."]},{title:"Thai Peanut Chicken Salad Jars",category:"Lunch",cal:380,protein:36,time:"15 min",airfryer:false,pcos:"good",bloat:"low",imperial:["For dressing (per jar): 1½ tsp warm water + 1 tbsp tamari + ¾ tbsp sesame oil + ¾ tbsp rice vinegar + ½ tbsp honey + 1 tbsp PB2 powder (or 1½ tsp peanut butter) + squeeze lime juice + ¼ clove garlic minced","Per jar: 1 cup / 120g cooked shredded chicken","½ cup / 40g shredded red cabbage","½ cup / 40g shredded carrots","¼ cup / 20g edamame","2 tbsp sliced green onions","1 tbsp chopped peanuts or pumpkin seeds","Optional: fresh cilantro, lime wedge"],metric:["Dressing per jar: water + tamari + sesame oil + rice vinegar + honey + PB2 + lime + garlic","120g cooked shredded chicken","40g red cabbage shredded","40g carrots shredded","20g edamame","Green onions, peanuts or pumpkin seeds","Optional: cilantro, lime"],steps:["Make the dressing: whisk all dressing ingredients in a small bowl until smooth. Pour into the bottom of a large jar.","Layer ingredients on top in this order: shredded chicken, red cabbage, carrots, edamame, green onions, peanuts/pumpkin seeds.","Seal and refrigerate — will keep 4 days.","When ready to eat, shake the jar to distribute the dressing, or pour into a bowl and toss.","🌸 Red cabbage contains anthocyanins — the same PCOS-beneficial antioxidants as blueberries. Edamame adds phytoestrogens that can help balance oestrogen levels. Pumpkin seeds are high in zinc which directly supports ovarian function.","💡 Make 4 jars Sunday — lunch sorted Mon–Thu. Incredibly portable and the dressing keeps everything crisp.","🔄 Use PB2 powder instead of full peanut butter — same flavour, dramatically less fat and calories."]},{title:"Zucchini Lasagna",category:"Dinner",cal:370,protein:38,time:"60 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4 zucchini, sliced very thin (use a mandolin if available)","1 tbsp olive oil","1 lb / 450g 96/4 lean ground beef or ground turkey","Salt + pepper","1 jar / 680g bolognese or marinara sauce (Rao's recommended — no added sugar)","1 egg","1½ cups / 340g low-fat cottage cheese","¼ cup / 25g grated Parmesan","2 cups / 225g shredded mozzarella (part-skim)"],metric:["4 zucchini, very thinly sliced","15ml olive oil","450g 96/4 lean ground beef or turkey","Salt, pepper","680g marinara sauce (no added sugar)","1 egg","340g low-fat cottage cheese","25g Parmesan grated","225g part-skim mozzarella"],steps:["Preheat oven to 250°F / 120°C. Arrange zucchini slices on parchment-lined baking sheets, sprinkle with salt. Let sit 10 minutes to draw out moisture, then blot thoroughly with paper towels. This step is crucial — prevents watery lasagna.","Increase oven to 375°F / 190°C. Brown ground beef or turkey in a pan with olive oil, salt and pepper. Drain any excess fat. Add marinara sauce and simmer 5 minutes.","Mix cottage cheese, egg and Parmesan together in a bowl.","Build the lasagna in a large baking dish: meat sauce layer → zucchini slices → cottage cheese mixture → mozzarella. Repeat until all ingredients used. Top with remaining mozzarella.","Bake 35–40 minutes until bubbling and golden on top. Let rest 10–15 minutes before slicing — crucial for holding together.","🌸 Zucchini instead of pasta drops carbs from ~40g to ~6g per serving — one of the biggest GI improvements possible without sacrificing a single drop of satisfaction. Cottage cheese adds casein protein and probiotics vs ricotta.","💡 Makes 6 portions — freeze what you won't eat this week. Reheats perfectly from frozen in 4 minutes in the microwave."]},{title:"Cottage Cheese Alfredo",category:"Dinner",cal:390,protein:28,time:"25 min",airfryer:false,pcos:"good",bloat:"low",imperial:["2 cups / 450g whole fat cottage cheese","½ cup / 50g freshly grated Parmesan","2 cloves garlic, minced","2 tbsp room-temperature butter","3 tbsp / 45ml milk","1 tsp salt, 1 tsp black pepper","6 oz / 170g high-protein pasta (Banza or Carb Diem recommended)","2 cups / 180g frozen broccoli, heated","Red chili flakes to serve"],metric:["450g whole fat cottage cheese","50g Parmesan grated","2 cloves garlic","30g butter (room temp)","45ml milk","Salt, pepper","170g high-protein pasta","180g broccoli florets, cooked","Red chili flakes"],steps:["Blend cottage cheese, Parmesan, garlic, butter, milk, salt and pepper in a blender or with an immersion blender until completely smooth and creamy — no lumps. This takes 60–90 seconds.","Cook pasta in a large pot of well-salted boiling water until al dente. Drain, reserving ½ cup pasta water.","Return pasta to the pot over low heat. Add the cottage cheese alfredo sauce, stir well. Cook on low 3–4 minutes until heated through. Add a splash of pasta water if it's too thick.","Add cooked broccoli, toss gently.","Serve immediately with red chili flakes and extra Parmesan.","🌸 Cottage cheese blended into an alfredo sauce is genuinely one of the cleverest PCOS hacks — you get the creamy, rich, indulgent taste of classic alfredo with a fraction of the fat and triple the protein. Banza or Carb Diem pasta cuts the net carbs significantly vs standard pasta.","⚠️ This is higher calorie — pair with a light dinner the same night or use as a lunch portion."]},{title:"Crispy Orange Chicken Bowl",category:"Dinner",cal:390,protein:38,time:"25 min",airfryer:true,pcos:"good",bloat:"low",imperial:["1 lb / 450g boneless skinless chicken thigh, chopped into bite-sized pieces","1 tbsp cornstarch","Zest of 1 orange + ¼ cup / 60ml fresh orange juice","¾ cup / 180ml G-Hughes Sugar Free Teriyaki sauce","75g / 2.6 oz cauliflower rice","75g / 2.6 oz steamed broccoli","Sesame seeds + green onions to garnish"],metric:["450g boneless skinless chicken thigh, bite-sized","8g cornstarch","Zest + 60ml juice of 1 orange","180ml sugar-free teriyaki sauce","75g cauliflower rice","75g steamed broccoli","Sesame seeds, green onions"],steps:["Toss chicken pieces with cornstarch until lightly coated.","Air fry at 400°F / 200°C for 16–18 minutes, shaking halfway, until crispy and cooked through.","While chicken cooks, mix orange zest, orange juice and teriyaki sauce in a small pan. Heat over medium heat 2–3 minutes until slightly reduced and glossy.","Toss hot crispy chicken in the orange teriyaki glaze immediately.","Serve over cauliflower rice with steamed broccoli. Garnish with sesame seeds and green onions.","🌸 Fresh orange zest is packed with flavanoids and vitamin C — anti-inflammatory and directly supportive of adrenal function in PCOS. Sugar-free teriyaki eliminates the typical insulin spike of restaurant orange chicken. Cauliflower rice keeps the overall GI very low.","💡 Batch cook 4 portions — store chicken and sauce separately and combine when reheating for best crispiness."]},{title:"Chipotle-Style Burrito Bowl",category:"Dinner",cal:420,protein:40,time:"30 min",airfryer:true,pcos:"good",bloat:"medium",imperial:["5 oz / 140g chicken breast, seasoned with cumin + smoked paprika + garlic + oregano + salt","½ cup / 90g cooked brown rice (or cauliflower rice for lower GI)","¼ cup / 45g black beans, rinsed","¼ cup / 40g corn","¼ cup / 40g salsa (no added sugar)","2 tbsp / 30ml nonfat Greek yogurt (instead of sour cream)","¼ avocado, sliced","10g / 0.35 oz shredded cheese","Romaine lettuce base","Lime juice + fresh cilantro"],metric:["140g chicken breast, seasoned","90g cooked brown rice or cauliflower rice","45g black beans","40g corn","40g salsa","30ml nonfat Greek yogurt","¼ avocado","10g shredded cheese","Romaine, lime, cilantro"],steps:["Season chicken breast with cumin, smoked paprika, garlic powder, dried oregano, salt and pepper.","Air fry at 375°F / 190°C for 18–20 minutes until fully cooked. Rest 3 minutes, then slice.","Build the bowl: romaine base, then rice, black beans, corn, salsa, sliced chicken, avocado and cheese.","Top with Greek yogurt and fresh cilantro. Squeeze lime juice over everything.","🌸 Black beans are a PCOS superfood — they have one of the lowest GI ratings of any carbohydrate source and are loaded with fibre and resistant starch that feeds beneficial gut bacteria. Avocado adds healthy fats that slow glucose absorption from everything else in the bowl.","⚠️ Bloat rating is medium because of beans + corn — reduce beans and skip corn if you're in a sensitive luteal phase week.","💡 Batch cook 4 chicken breasts Sunday — pre-seasoned and air fried. Assemble bowls daily in 5 minutes."]},{title:"Sun Dried Tomato Breakfast Biscuits",category:"Breakfast",cal:270,protein:17,time:"30 min",airfryer:false,pcos:"great",bloat:"low",imperial:["6 eggs","½ cup / 115g low-fat cottage cheese","1 tsp avocado oil","½ yellow onion, diced","2 cups / 60g baby spinach, chopped","1 tsp minced garlic","¾ cup / 75g almond flour","½ cup / 60g whole wheat flour","½ tsp baking powder","½ tsp salt + ¼ tsp black pepper","¼ cup / 40g sun dried tomatoes, patted dry and chopped","½ cup / 55g shredded mozzarella","¼ cup / 30g shredded cheddar","Extra mozzarella to top"],metric:["6 eggs","115g low-fat cottage cheese","Avocado oil","½ yellow onion diced","60g baby spinach chopped","1 tsp garlic","75g almond flour","60g whole wheat flour","Baking powder, salt, pepper","40g sun dried tomatoes, chopped","55g mozzarella + 30g cheddar + extra to top"],steps:["Preheat oven to 375°F / 190°C. Line a baking sheet with parchment paper.","Heat avocado oil in a skillet over medium heat. Sauté onion 3 minutes, add spinach and garlic, cook 1 minute more. Remove from heat.","Whisk eggs and cottage cheese in a small bowl.","In a large bowl, whisk together almond flour, whole wheat flour, baking powder, salt and pepper.","Add egg mixture to flour mixture and stir. Add sautéed vegetables and sun dried tomatoes. Fold in mozzarella and cheddar. Mix until a dough-like texture forms.","Scoop about ¼ cup each onto baking sheet, pressing slightly to flatten. Top with extra mozzarella. Bake 20 minutes until golden and cooked through.","🌸 Sun dried tomatoes are concentrated lycopene — one of the most powerful anti-inflammatory antioxidants. The almond flour base keeps GI very low. Spinach adds magnesium. Cottage cheese adds probiotics and protein.","💡 Makes 6 biscuits — Sunday batch breakfast for 3 days (2 per serving). Even better the next day."]},{title:"Protein Cheesecake Cups",category:"Dessert",cal:195,protein:18,time:"35 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 cup / 225g plain Greek yogurt","1 cup / 225g low-fat cottage cheese","¼ cup / 85g honey","4 eggs","1 cup / 150g blueberries (fresh or frozen — recommended)"],metric:["225g plain Greek yogurt","225g low-fat cottage cheese","85g honey","4 eggs","150g blueberries"],steps:["Preheat oven to 350°F / 175°C.","Blend Greek yogurt, cottage cheese, honey and eggs in a blender or with an immersion blender until completely smooth.","Divide evenly into 4 oven-safe ramekins or dishes. Drop blueberries into each one.","Bake 30–40 minutes until the cheesecakes are set but still have a slight jiggle in the centre — they firm up as they cool.","Refrigerate before eating — they're much better cold.","🌸 This is the most impressive PCOS dessert in the entire app. Greek yogurt + cottage cheese + eggs = complete high-quality protein with probiotics and casein. Blueberries add anthocyanins. Honey has a lower GI than refined sugar. At 195 kcal and 18g protein it fits perfectly after lunch or dinner.","💡 Make 4 on Sunday — dessert sorted for 4 days with zero effort. Sterling can eat 2 for a larger dessert portion."]},{title:"Low Iron Girly Summer Salad",category:"Lunch",cal:380,protein:34,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4 oz / 115g ribeye or sirloin steak, cooked medium-rare then cubed","¼ cup / 60ml avocado oil","2 tbsp fresh cilantro, chopped","2 tbsp fresh flat-leaf parsley, chopped","1 clove garlic, minced","½ tsp salt + ½ tsp black pepper","Juice of ½ lemon","½ cup / 75g grape or cherry tomatoes, halved","¾ cup / 90g Persian cucumbers, sliced","2 tbsp / 20g red onion, sliced","1 oz / 28g feta, crumbled"],metric:["115g ribeye or sirloin, cooked and cubed","60ml avocado oil","Cilantro, parsley, garlic, salt, pepper, lemon","75g cherry tomatoes halved","90g Persian cucumbers sliced","20g red onion","28g feta crumbled"],steps:["Season and cook steak to your preferred doneness. Let rest 5 minutes then cube.","Whisk avocado oil, cilantro, parsley, garlic, salt, pepper and lemon juice in a large bowl to create the herb dressing.","Add tomatoes, cucumbers, red onion and cubed steak to the bowl. Toss to coat everything in the dressing.","Add crumbled feta and gently toss once more.","🌸 This salad is specifically designed for women with iron deficiency — extremely common with PCOS due to heavy periods. Ribeye is one of the richest sources of heme iron (the most absorbable form). Vitamin C from parsley and lemon juice dramatically increases iron absorption. Feta provides calcium.","⚠️ At 29g fat this is higher in fat than most app lunches — but all healthy fats from avocado oil and steak. Works best as a lunch, paired with a lower-fat dinner.","💡 Make the herb dressing Sunday and store separately — it keeps 5 days in the fridge and works as a marinade too."]},{title:"Hot Honey Chicken Crust Pizza",category:"Dinner",cal:380,protein:42,time:"40 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 lb / 450g ground chicken","1 cup / 100g grated Parmesan","4 eggs","1 tsp Italian seasoning + 1 tsp salt + ½ tsp black pepper + 1 tsp garlic powder","¾ cup / 180ml pizza sauce (Rao's or no-sugar-added)","1 cup / 115g shredded mozzarella","¼ cup / 35g nitrite-free pepperoni (optional)","1–2 tbsp hot honey","Red chili flakes to finish"],metric:["450g ground chicken","100g Parmesan grated","4 eggs","Italian seasoning, salt, pepper, garlic powder","180ml pizza sauce (no sugar added)","115g mozzarella shredded","35g nitrite-free pepperoni optional","Hot honey, red chili flakes"],steps:["Preheat oven to 400°F / 200°C. Line a baking sheet with parchment paper.","Mix ground chicken, Parmesan, eggs and all spices together until fully combined.","Spread the mixture onto the parchment in a thin, even rectangle or circle — the thinner, the crispier. Aim for about ½ inch / 1.5cm thick.","Bake 20 minutes until the chicken crust is cooked through and lightly golden.","Remove from oven. Spread pizza sauce over the crust, top with mozzarella and pepperoni if using.","Return to oven 8–10 minutes until cheese is fully melted and bubbly.","Drizzle hot honey over the pizza and finish with red chili flakes.","🌸 Ground chicken crust has essentially zero refined carbohydrates — this is pizza adapted for PCOS without compromising the experience. Parmesan + eggs bind everything. The protein content (42g) rivals any meal in the app.","💡 Cut into 4–6 slices. Keeps in the fridge 4 days. Reheats in the air fryer 3–4 minutes at 350°F for crispy crust."]},// ── MODIFIED DIETITIAN RECIPES ─────────────────────────────
{title:"PCOS Pecan Protein Bars",category:"Snack",cal:185,protein:10,time:"20 min + chill",airfryer:false,pcos:"great",bloat:"low",imperial:["Base: 1 cup / 100g rolled oats + ¾ cup / 75g almond flour + ½ tsp cinnamon + pinch salt","1 scoop vanilla protein powder","3 tbsp / 45ml allulose or monk fruit sweetener","3 tbsp / 45ml coconut oil, melted","2 tbsp / 30ml milk of choice","Filling: 1 cup / 115g pecan halves, roughly chopped + 2 tbsp / 30ml allulose + 1 tbsp / 15ml coconut oil + ½ tsp cinnamon + pinch salt","Optional: 2 tbsp / 20g dark chocolate chips (70%+) to top"],metric:["100g rolled oats + 75g almond flour + cinnamon + salt","1 scoop vanilla protein powder","45ml allulose sweetener","45ml coconut oil, melted","30ml milk","115g pecans, roughly chopped + allulose + coconut oil + cinnamon + salt","Optional: 20g dark chocolate chips"],steps:["Mix oats, almond flour, cinnamon, salt and protein powder in a bowl. Add allulose, melted coconut oil and milk. Mix until a soft dough forms. It should hold together when pressed.","Press dough evenly into a parchment-lined 8x8 inch / 20x20cm dish.","For the filling: combine pecans, allulose, coconut oil and cinnamon in a small bowl. Spread evenly over the base and press gently.","Optional: sprinkle dark chocolate chips over the top.","Refrigerate at least 2 hours until firm. Slice into 8–10 bars.","Store in the fridge up to 1 week or freeze for 1 month.","🌸 Pecans are exceptionally PCOS-friendly — they contain gamma-tocopherol (a form of vitamin E) that directly reduces androgen production. Almond flour base keeps GI very low. Allulose sweetener has almost zero impact on blood sugar. Protein powder makes this a genuinely high-protein snack bar.","💡 Make a batch Sunday — grab-and-go snack for the entire week. At 185 kcal and 10g protein they fit perfectly as a goûter."]},{title:"PCOS Blueberry Protein Bagels",category:"Breakfast",cal:250,protein:20,time:"35 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 cup / 100g oat flour (blend rolled oats)","½ cup / 50g almond flour","1 scoop unflavored or vanilla protein powder","1 tsp baking powder + generous pinch sea salt","1 cup / 225g whole fat Greek yogurt","½ cup / 75g frozen wild blueberries","1 egg + 1 tbsp water (egg wash)"],metric:["100g oat flour","50g almond flour","1 scoop protein powder","Baking powder, salt","225g whole fat Greek yogurt","75g frozen wild blueberries","1 egg + 15ml water for egg wash"],steps:["Preheat oven to 350°F / 175°C. Line a baking sheet with parchment paper.","Mix oat flour, almond flour, protein powder, baking powder and salt together. Add Greek yogurt and mix with a spoon, then knead with hands until a dough forms. If too sticky, add a little more oat flour. If too dry, add a little more yogurt.","Gently fold blueberries into the dough.","Divide dough into 4 balls. Roll each into a rope and shape into a bagel by joining the ends.","Brush with egg wash. Bake 25 minutes, then broil 2–3 minutes until golden brown.","🌸 Oat flour + almond flour instead of white bread flour has a significantly lower GI profile — the fibre in oats slows glucose absorption. Greek yogurt adds probiotics and protein. Wild blueberries contain more anthocyanins per gram than regular blueberries — a direct PCOS benefit.","💡 Make 4 on Sunday. Eat with cottage cheese and a drizzle of honey, or toast and top with nut butter. These freeze beautifully — toast from frozen."]},{title:"Hormone-Balancing Coffee Creamer",category:"Snack",cal:60,protein:4,time:"2 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1¾ cups / 420ml unsweetened soy milk or oat milk","¼ cup / 30g raw cashews","¼ cup / 30g raw pecans","1 tbsp / 20ml honey or 2 tbsp allulose (replaces 4 dates from original recipe)","1½ tsp vanilla extract","½ tsp cinnamon","¼ tsp salt"],metric:["420ml unsweetened soy or oat milk","30g raw cashews","30g raw pecans","20ml honey or 30ml allulose","Vanilla, cinnamon, salt"],steps:["Add all ingredients to a high-speed blender.","Blend 60 seconds until completely smooth.","Pour into an airtight jar or bottle. Refrigerate up to 1 week. Shake well before each use.","🌸 Soy milk contains phytoestrogens that help balance oestrogen levels — particularly beneficial in PCOS where oestrogen can fluctuate. Pecans provide gamma-tocopherol (vitamin E) that reduces androgens. Cinnamon helps stabilise blood sugar — even in your coffee. Replacing dates with allulose drops the sugar from ~35g to nearly zero with identical sweetness.","💡 Makes about 2 cups / 480ml — enough for 8–10 coffees. This is your daily PCOS hormone ritual in liquid form. The cinnamon + pecans are not just flavour additions — they're medicine.","Makes roughly 8 servings of 2 tbsp / 30ml each."]},{title:"High Protein Savoury Breakfast Muffins",category:"Breakfast",cal:190,protein:16,time:"30 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4 eggs","1 cup / 240ml milk of choice","1 tbsp allulose or honey (replaces maple syrup)","1½ cups / 150g almond flour + ½ cup / 60g oat flour + 1½ tsp baking powder","¼ tsp salt + pinch black pepper","½ lb / 225g cooked chicken or turkey sausage, crumbled (Bilinski or Al Fresco)","1 cup / 115g shredded cheddar","¼ cup / 25g sliced green onions"],metric:["4 eggs","240ml milk","15ml allulose or honey","150g almond flour + 60g oat flour + baking powder","Salt, pepper","225g cooked chicken or turkey sausage, crumbled","115g cheddar shredded","25g green onions sliced"],steps:["Preheat oven to 350°F / 175°C. Grease two muffin pans or line with muffin liners.","Whisk eggs, milk and allulose in a large bowl.","Fold in almond flour, oat flour, baking powder, salt and pepper. Mix until combined.","Add crumbled sausage, cheddar and green onions. Stir until evenly distributed.","Scoop into muffin tins. Bake 22–25 minutes until golden and cooked through.","🌸 Almond flour + oat flour base instead of pancake mix drops the GI dramatically. Allulose instead of maple syrup removes essentially all the sugar while keeping sweetness. Chicken or turkey sausage provides complete protein. At 190 kcal and 16g protein per 2-muffin serving these are far superior to the original.","💡 Makes 10–12 muffins — batch Sunday and grab 2–3 each morning. They freeze perfectly. Defrost overnight in the fridge or 60 seconds in the microwave."]},{title:"PCOS Hormone Support Blend",category:"Snack",cal:80,protein:7,time:"10 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1½ cups / 210g raw pumpkin seeds","½ cup / 80g chia seeds","¼ cup / 30g ground flaxseed","1 cup / 100g almond flour","¼ cup / 25g unsweetened cocoa powder","4 tbsp allulose or coconut sugar","½ tsp cinnamon","¼ tsp salt"],metric:["210g raw pumpkin seeds","80g chia seeds","30g ground flaxseed","100g almond flour","25g cocoa powder","Allulose or coconut sugar, cinnamon, salt"],steps:["Grind pumpkin seeds and chia seeds in a coffee or spice grinder until fine — you may need to do this in batches.","Combine ground seeds with almond flour, cocoa powder, sweetener, cinnamon and salt in a bowl. Whisk until evenly mixed.","Transfer to an airtight container. Refrigerate — lasts up to 1 month.","Use 1 scoop (¼ cup / 30g) per serving. Add to overnight oats, smoothies, yogurt, or mix into any liquid.","🌸 This is arguably the most PCOS-targeted thing in the entire app. Pumpkin seeds are the single highest food source of zinc — zinc directly regulates ovarian function and reduces androgen production. Chia seeds and flaxseed provide omega-3 fatty acids and lignans that help clear excess androgens. Ground flax specifically has been clinically studied for PCOS — daily intake for 3 months measurably reduces testosterone. Cocoa provides magnesium. This blend addresses 4 different PCOS mechanisms simultaneously.","💡 Add to your overnight oats every morning. 1 scoop takes 5 seconds to stir in and you won't taste it. This is the easiest daily PCOS supplement you'll ever take — and it's entirely food-based.","Store in the fridge to keep oils fresh. Lasts 1 month."]},{title:"Chipotle-Style Burrito Bowl",category:"Lunch",cal:420,protein:38,time:"25 min",airfryer:true,pcos:"great",bloat:"low",imperial:["5 oz / 140g chicken breast, seasoned with cumin, smoked paprika, garlic, chili powder, salt and pepper","½ cup / 90g cooked brown rice or cauliflower rice","¼ cup / 60g black beans, rinsed and drained","¼ cup / 60g corn (fresh, frozen, or canned)","¼ cup / 60g pico de gallo or fresh salsa (no added sugar)","2 tbsp / 30ml nonfat Greek yogurt (instead of sour cream)","¼ avocado, sliced","10g / 0.35 oz cotija or cheddar cheese, crumbled","Fresh lime juice + cilantro + hot sauce to taste","Optional: shredded romaine lettuce as base"],metric:["140g chicken breast, seasoned","90g cooked brown rice or cauliflower rice","60g black beans, rinsed","60g corn","60g pico de gallo or fresh salsa","30ml nonfat Greek yogurt","¼ avocado, sliced","10g cotija or cheddar cheese","Lime juice + cilantro + hot sauce","Optional: romaine lettuce base"],steps:["Season chicken breast generously with cumin, smoked paprika, garlic powder, chili powder, salt and pepper on both sides.","Air fry at 375°F / 190°C for 18–20 minutes until cooked through. Let rest 5 minutes then slice or dice.","Warm black beans in a small pan or microwave 60 seconds with a pinch of cumin and salt.","Warm corn in the same pan 1–2 minutes until lightly heated.","Build the bowl: rice or cauliflower rice base (or romaine for extra low carb), then black beans and corn side by side, then chicken on top.","Add pico de gallo, a dollop of Greek yogurt, sliced avocado and cheese. Squeeze lime over everything and top with cilantro and hot sauce.","🌸 This is essentially a perfectly constructed PCOS bowl — brown rice fibre slows glucose absorption, black beans are the highest-fibre legume and dramatically improve insulin sensitivity, chicken is lean protein, avocado provides hormone-supporting healthy fats, Greek yogurt replaces sour cream for probiotic benefit. Every element is working for you.","💡 Batch cook the chicken Sunday — make 4 servings at once. Assemble each bowl fresh from prepped ingredients in under 5 minutes all week. This is the definition of batch-friendly.","🔄 Sterling's version: scale to 7 oz / 200g chicken, add full avocado, double the beans and rice. Still one of the most nutritious meals in the entire app for him."]},// ── PEAR DESSERTS ──────────────────────────────────────────
{title:"Poached Pears in Spiced Pomegranate",category:"Dessert",cal:100,protein:1,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["2 ripe pears, peeled, halved and cored","1 cup / 240ml pomegranate juice (100% juice, no added sugar)","1 cinnamon stick","2 star anise","3 cloves","1 tsp / 5ml honey","Optional: Greek yogurt to serve, pomegranate seeds to garnish"],metric:["2 ripe pears, peeled, halved and cored","240ml pomegranate juice","1 cinnamon stick","2 star anise","3 cloves","5ml honey","Optional: Greek yogurt, pomegranate seeds"],steps:["Combine pomegranate juice, cinnamon stick, star anise, cloves and honey in a saucepan just wide enough to fit the pear halves.","Bring to a gentle simmer over medium heat, stirring to dissolve honey.","Add pear halves cut-side down. They should be mostly submerged — add a splash of water if needed.","Simmer gently 12–15 minutes, turning once halfway, until pears are completely tender when pierced with a knife.","Remove pears to a bowl. Increase heat and reduce the poaching liquid 3–4 minutes until slightly syrupy.","Pour the deep ruby syrup over the pears. Serve warm or cold with a spoonful of Greek yogurt and pomegranate seeds.","🌸 Pomegranate juice is one of the most studied foods for PCOS — it contains punicic acid and ellagitannins that directly reduce androgens and inflammation. This dessert is genuinely therapeutic.","💡 This looks like a restaurant dessert with almost zero effort. Make ahead and refrigerate — the pears absorb more colour and flavour overnight and are even better cold the next day."]},{title:"Pear & Ginger Chia Pudding",category:"Dessert",cal:190,protein:6,time:"5 min + chill",airfryer:false,pcos:"great",bloat:"low",imperial:["3 tbsp / 30g chia seeds","1 cup / 240ml milk of choice","½ ripe pear, blended or finely grated","½ tsp / 2.5ml fresh ginger, finely grated (or ¼ tsp ground ginger)","½ tsp / 2.5ml vanilla extract","1 tsp / 5ml honey","Pinch of cinnamon","Topping: thin pear slices, a pinch of ground ginger"],metric:["30g chia seeds","240ml milk of choice","½ ripe pear, blended or grated","2.5ml fresh ginger, grated (or 1.25ml ground ginger)","2.5ml vanilla extract","5ml honey","Pinch of cinnamon","Topping: pear slices, ginger"],steps:["Blend or finely grate half a ripe pear until almost smooth — it should be the consistency of applesauce.","Mix blended pear with milk, grated ginger, vanilla, honey and cinnamon in a jar or bowl.","Stir in chia seeds. Mix well, wait 5 minutes, then stir again to prevent clumping.","Refrigerate 4 hours or overnight until thick and creamy.","Top with thin pear slices and an extra pinch of ginger before serving.","🌸 Fresh ginger is one of the most powerful anti-inflammatory foods — it reduces prostaglandins which cause period pain in PCOS. Combined with pear pectin for gut health and chia omega-3, this is one of the most genuinely therapeutic desserts in the app.","💡 The pear replaces most of the sweetener — use a very ripe pear for maximum natural sweetness. Comice or Bartlett work best."]},{title:"Pear & Dark Chocolate Crumble",category:"Dessert",cal:210,protein:5,time:"20 min",airfryer:true,pcos:"good",bloat:"low",imperial:["2 ripe pears, diced into small chunks","1 tsp / 5ml cinnamon","1 tsp / 5ml honey","Crumble topping: 3 tbsp / 25g rolled oats + 2 tbsp / 15g almond flour + 1 tsp / 5ml coconut oil (melted) + 1 tsp / 5ml honey + pinch of salt","10g / 0.35 oz dark chocolate chips (70%+)","Optional: Greek yogurt to serve"],metric:["2 ripe pears, diced","5ml cinnamon","5ml honey","Crumble: 25g rolled oats + 15g almond flour + 5ml coconut oil + 5ml honey + pinch of salt","10g dark chocolate chips (70%+)","Optional: Greek yogurt"],steps:["Toss diced pears with cinnamon and honey. Place in a small oven-safe dish or air fryer basket.","Make the crumble: combine oats, almond flour, melted coconut oil, honey and salt in a bowl. Mix with your fingers until it clumps into a rough crumble texture.","Scatter crumble over the pears. Sprinkle dark chocolate chips on top.","Air fryer: 350°F / 175°C for 10–12 minutes until the crumble is golden and pears are bubbling.","Oven: 375°F / 190°C for 18–20 minutes.","Serve warm with a dollop of Greek yogurt.","🌸 The almond flour base makes this crumble significantly lower GI than a traditional oat-and-flour crumble. Dark chocolate chips add magnesium. The pear and cinnamon combination is one of the best post-dinner blood sugar stabilisers.","💡 Make a double batch of the crumble topping and keep it in a jar in the fridge — you can throw this together in 2 minutes any night of the week."]},{title:"Pear Ricotta Bowl",category:"Dessert",cal:180,protein:9,time:"5 min",airfryer:false,pcos:"good",bloat:"low",imperial:["½ cup / 120g part-skim ricotta","1 ripe pear, thinly sliced","1 tsp / 5ml honey","Zest of ½ lemon","Small handful of crushed pistachios (about 10g / 0.35 oz)","Optional: pinch of cinnamon, fresh mint"],metric:["120g part-skim ricotta","1 ripe pear, thinly sliced","5ml honey","Zest of ½ lemon","10g crushed pistachios","Optional: pinch of cinnamon, fresh mint"],steps:["Whip ricotta briefly with a fork or small whisk until light and fluffy — this makes it spreadable and airy.","Spoon whipped ricotta into a bowl or onto a plate, spreading it slightly.","Arrange pear slices fanned over the ricotta.","Drizzle honey over everything in a thin zigzag.","Add lemon zest — this is essential, it lifts the whole dish. Don't skip it.","Scatter crushed pistachios over the top. Add a pinch of cinnamon and fresh mint if using.","🇫🇷 This is your French-style dessert. Elegant, minimal, genuinely satisfying. The lemon zest and pistachios make it feel restaurant-quality with 5 minutes of effort.","💡 Use a perfectly ripe pear — slightly soft to the touch. An underripe pear has none of the sweetness that makes this work. Comice, Bosc or Bartlett all work beautifully."]},{title:"Pear & Cardamom Overnight Oats",category:"Breakfast",cal:280,protein:22,time:"5 min prep + overnight",airfryer:false,pcos:"great",bloat:"low",imperial:["½ cup / 45g rolled oats","1 scoop vanilla or unflavoured protein powder","1 tbsp / 10g chia seeds","½ ripe pear, grated directly into the oats","½ tsp / 2.5ml ground cardamom","¼ tsp / 1.25ml vanilla extract","1 tsp / 5ml honey","Water or milk to texture — start with ½ cup / 120ml","Topping: thin pear slices, extra cardamom"],metric:["45g rolled oats","1 scoop vanilla protein powder","10g chia seeds","½ ripe pear, grated","2.5ml ground cardamom","1.25ml vanilla extract","5ml honey","120ml water or milk to start","Topping: pear slices, cardamom"],steps:["Grate half a ripe pear directly into a jar or bowl — skin and all is fine, or peel first. The grated pear melts into the oats overnight and becomes almost jammy.","Add oats, protein powder, chia seeds, cardamom, vanilla and honey. Stir well.","Add liquid and mix until combined. The oats should be slightly looser than you want them — they thicken overnight.","Cover and refrigerate overnight. In the morning, stir well and add more liquid if needed.","Top with thin pear slices and an extra pinch of cardamom before eating.","🌸 Cardamom is a warming digestive spice that supports gut health and has mild anti-inflammatory properties — particularly beneficial for PCOS bloating. The pear pectin feeds beneficial gut bacteria. This is your most gut-friendly breakfast in the app.","💡 Grate the pear on the large holes of a box grater. The texture disappears overnight into the oats leaving just the flavour and natural sweetness — you won't need much honey at all."]},{title:"Caramelised Pear Cottage Cheese Bowl",category:"Dessert",cal:150,protein:15,time:"8 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 ripe pear, sliced into thin wedges","½ tsp / 2.5ml coconut oil or butter","1 tsp / 5ml cinnamon","1 tsp / 5ml honey","½ cup / 120g low-fat cottage cheese (cold)","Pinch of sea salt","Optional: crushed walnuts, vanilla extract"],metric:["1 ripe pear, sliced into wedges","2.5ml coconut oil or butter","5ml cinnamon","5ml honey","120g low-fat cottage cheese (cold)","Pinch of sea salt","Optional: crushed walnuts, vanilla"],steps:["Heat a small non-stick pan over medium-high heat. Add coconut oil or butter.","Add pear slices in a single layer. Don't move them for 2 minutes — let them get a proper golden caramelised crust on the bottom.","Flip each slice. Sprinkle cinnamon over the pears and drizzle with honey. Cook another 2 minutes until the honey bubbles and coats the pears.","Remove from heat. The pears should be golden, slightly soft and fragrant.","Spoon cold cottage cheese into a bowl. Top immediately with the hot caramelised pears and any pan juices.","Add a pinch of sea salt over the top — this is the secret ingredient that makes the sweetness pop.","🌸 The hot/cold contrast between caramelised pears and cold cottage cheese is genuinely excellent. Cottage cheese provides casein protein which digests slowly overnight — ideal as a post-dinner dessert. At 150 kcal and 15g protein, this is one of the most macro-efficient desserts in the entire app.","💡 The sea salt is not optional. Sweet + salty + hot + cold = a genuinely restaurant-quality dessert in under 10 minutes."]},{title:"Pear & Almond Protein Cake",category:"Dessert",cal:240,protein:20,time:"25 min",airfryer:false,pcos:"great",bloat:"low",imperial:["1 ripe pear, mashed (about ½ cup / 120g)","1 scoop vanilla protein powder","½ cup / 50g almond flour","2 eggs","1 tsp / 5g baking powder","1 tsp / 5ml honey","½ tsp / 2.5ml cinnamon","½ tsp / 2.5ml vanilla extract","Pinch of salt","Optional: sliced pear on top, dusting of cinnamon"],metric:["1 ripe pear, mashed (~120g)","1 scoop vanilla protein powder","50g almond flour","2 eggs","5g baking powder","5ml honey","2.5ml cinnamon","2.5ml vanilla extract","Pinch of salt","Optional: sliced pear topping, cinnamon"],steps:["Preheat oven to 350°F / 175°C. Grease 2 small ramekins or one small baking dish (15cm / 6 inch).","Mash pear thoroughly with a fork until smooth — very ripe pear works best.","In a bowl, combine mashed pear, eggs, honey and vanilla. Whisk until smooth.","Add almond flour, protein powder, baking powder, cinnamon and salt. Fold until just combined — don't overmix.","Pour into ramekins. Optional: press thin pear slices on top and dust with cinnamon.","Bake 18–22 minutes until set in the centre and golden on top. A toothpick should come out clean.","Let cool 5 minutes before eating — it continues cooking briefly.","🌸 Almond flour instead of regular flour makes this genuinely low GI — almond flour has almost no effect on blood sugar. The pear adds natural sweetness and moisture so you barely need any honey. At 20g protein per serving this is a dessert that actually builds muscle.","💡 The texture is somewhere between a cake and a dense muffin — moist, slightly nutty, warmly spiced. Serve with Greek yogurt on the side for extra protein and a creamy contrast."]},// ── BURGER BOWL VARIATIONS ─────────────────────────────────
{title:"Turkey Smash Taco Bowl",category:"Lunch",cal:360,protein:38,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4 oz / 115g 96% lean ground turkey","1 tsp cumin + 1 tsp smoked paprika + ½ tsp garlic powder + ½ tsp chili powder + salt","2 cups / 60g romaine lettuce, shredded","¼ cup / 60g pico de gallo or diced tomatoes","¼ avocado / 50g, sliced","2 tbsp / 30ml nonfat Greek yogurt (sour cream swap)","Lime juice + fresh cilantro","Optional: 10g / 0.35 oz cotija cheese, jalapeño slices"],metric:["115g 96% lean ground turkey","Seasoning: cumin, smoked paprika, garlic powder, chili powder, salt","60g romaine lettuce, shredded","60g pico de gallo or diced tomatoes","50g avocado, sliced","30ml nonfat Greek yogurt","Lime juice + cilantro","Optional: 10g cotija, jalapeño"],boyfriend:{imperial:["6 oz / 170g 96% lean ground turkey","1 tsp cumin + 1 tsp smoked paprika + ½ tsp garlic powder + ½ tsp chili powder + salt","2 cups / 60g romaine lettuce, shredded","¼ cup / 60g pico de gallo or diced tomatoes","½ avocado / 100g, sliced (extra)","¼ cup / 60g black beans, rinsed (added)","2 tbsp / 30ml nonfat Greek yogurt","Lime juice + fresh cilantro","Optional: cotija cheese, jalapeño slices"],metric:["170g 96% lean ground turkey","Seasoning: cumin, smoked paprika, garlic powder, chili powder, salt","60g romaine lettuce, shredded","60g pico de gallo or diced tomatoes","100g avocado, sliced (extra)","60g black beans, rinsed (added)","30ml nonfat Greek yogurt","Lime juice + cilantro","Optional: cotija, jalapeño"],cal:480,protein:50},steps:["Heat a pan over medium-high heat. Add ground turkey and break apart.","Season with cumin, smoked paprika, garlic powder, chili powder and salt. Cook 6–8 minutes until browned and fully cooked.","Build the bowl: shredded romaine as the base.","Top with seasoned turkey, pico de gallo, avocado slices.","Add a dollop of Greek yogurt in the centre. Squeeze lime generously over everything. Top with cilantro.","Add cotija and jalapeño if using.","🌸 Ground turkey is the leanest option here — less saturated fat than beef while hitting the same protein target. The Mexican spice blend (cumin + smoked paprika) is anti-inflammatory and the avocado provides hormone-supporting healthy fats.","💡 Meal prep friendly — cook a big batch of turkey Sunday, refrigerate. Assemble bowls fresh each morning for the lunchbox. Keeps 4 days.","🔄 Sterling's version: his full ingredient list and macros are shown above under the 🏃 Sterling tab — scaled to 6 oz turkey, extra avocado, and added black beans for extra fibre and protein."]},{title:"Greek Lamb Bowl",category:"Dinner",cal:380,protein:36,time:"20 min",airfryer:false,pcos:"great",bloat:"low",imperial:["4 oz / 115g lean ground lamb (or 96/4 ground beef)","1 tsp dried oregano + ½ tsp cumin + ½ tsp garlic powder + salt and pepper","Cucumber tomato salad: 75g / 2.6 oz cucumber diced + 75g / 2.6 oz tomatoes diced + 20g / 0.7 oz red onion + red wine vinegar + dried oregano + salt","2 tbsp / 30ml tzatziki (store-bought or homemade)","1 cup / 30g romaine lettuce","15g / 0.5 oz fat-free feta cheese, crumbled","Optional: Kalamata olives, fresh mint, warm pita on the side"],metric:["115g lean ground lamb or 96/4 beef","Seasoning: oregano, cumin, garlic powder, salt, pepper","75g cucumber + 75g tomatoes + 20g red onion + red wine vinegar + oregano + salt","30ml tzatziki","30g romaine lettuce","15g fat-free feta, crumbled","Optional: olives, mint, pita"],boyfriend:{imperial:["6 oz / 170g lean ground lamb (or 96/4 ground beef)","1 tsp dried oregano + ½ tsp cumin + ½ tsp garlic powder + salt and pepper","Cucumber tomato salad: 75g / 2.6 oz cucumber diced + 75g / 2.6 oz tomatoes diced + 20g / 0.7 oz red onion + red wine vinegar + dried oregano + salt","2 tbsp / 30ml tzatziki","1 cup / 30g romaine lettuce","15g / 0.5 oz fat-free feta cheese, crumbled","1 warm whole wheat pita (added)","Optional: Kalamata olives, fresh mint"],metric:["170g lean ground lamb or 96/4 beef","Seasoning: oregano, cumin, garlic powder, salt, pepper","75g cucumber + 75g tomatoes + 20g red onion + red wine vinegar + oregano + salt","30ml tzatziki","30g romaine lettuce","15g fat-free feta, crumbled","1 warm whole wheat pita (added)","Optional: olives, mint"],cal:540,protein:48},steps:["Season ground lamb with oregano, cumin, garlic powder, salt and pepper. Mix well.","Cook in a pan over medium-high heat 6–8 minutes, breaking apart until browned. Drain excess fat if any.","Make the cucumber tomato salad: dice cucumber, tomatoes and red onion. Season with salt, oregano and a splash of red wine vinegar. Toss and let sit 5 minutes.","Build the bowl: romaine base, then cucumber tomato salad, then the spiced lamb.","Add tzatziki and crumbled feta. Scatter olives and fresh mint if using.","🌸 Lamb is often avoided but it is actually lower in saturated fat per gram than regular ground beef and higher in zinc — zinc directly supports ovarian function and reduces PCOS androgen production. The Mediterranean spice profile (oregano + cumin) is strongly anti-inflammatory.","💡 This reheats beautifully — pack the lamb and salad separately in the lunchbox, assemble at work. The cucumber salad stays crisp for 2 days.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — scaled to 6 oz lamb with a warm whole wheat pita added. This becomes a proper full meal for him."]},{title:"Japanese-Style Ground Beef Bowl (Gyudon)",category:"Lunch",cal:370,protein:36,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["4 oz / 115g 96/4 lean ground beef","½ cup / 70g onion, thinly sliced","2 tbsp / 30ml low-sodium soy sauce","1 tbsp / 15ml mirin (or ½ tsp honey + 1 tbsp water)","½ tsp fresh ginger, grated","1 garlic clove, minced","1 cup cooked cauliflower rice or ½ cup / 90g regular rice","1 soft-boiled egg","Green onions + sesame seeds to top","Optional: pickled ginger, togarashi"],metric:["115g 96/4 lean ground beef","70g onion, thinly sliced","30ml low-sodium soy sauce","15ml mirin","2.5ml fresh ginger, grated","1 garlic clove","100g cauliflower rice or 90g regular rice","1 soft-boiled egg","Green onions + sesame seeds","Optional: pickled ginger, togarashi"],boyfriend:{imperial:["8 oz / 225g 96/4 lean ground beef (doubled)","½ cup / 70g onion, thinly sliced","3 tbsp / 45ml low-sodium soy sauce","1½ tbsp / 22ml mirin","½ tsp fresh ginger, grated","1 garlic clove, minced","1 cup / 180g regular rice (not cauliflower)","2 soft-boiled eggs (added)","Green onions + sesame seeds to top","Optional: pickled ginger, togarashi"],metric:["225g 96/4 lean ground beef (doubled)","70g onion, thinly sliced","45ml low-sodium soy sauce","22ml mirin","2.5ml fresh ginger, grated","1 garlic clove","180g regular rice","2 soft-boiled eggs (added)","Green onions + sesame seeds","Optional: pickled ginger, togarashi"],cal:610,protein:54},steps:["Soft boil the egg: bring water to boil, lower egg in gently, cook exactly 7 minutes. Transfer to ice water 2 minutes, peel carefully.","Cook onion slices in a sprayed pan over medium heat 4–5 minutes until soft and translucent.","Add ground beef. Break apart and cook until browned, 5–6 minutes.","Add garlic, ginger, soy sauce and mirin. Stir and cook 2 minutes until sauce thickens and coats the beef beautifully.","Plate over cauliflower or regular rice. Top with the halved soft-boiled egg.","Finish with sliced green onions and sesame seeds. Add pickled ginger and togarashi if using.","💡 The soft-boiled egg is the heart of this dish — the jammy yolk mixes with the soy-glazed beef and creates an incredible sauce. Don't skip it.","🌸 Low-sodium soy sauce significantly reduces the salt load. The ginger is actively anti-inflammatory. Use cauliflower rice for the most PCOS-friendly version.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — regular rice instead of cauliflower, doubled beef, a second egg added. This is one of his best lunchbox meals — keeps 3 days refrigerated."]},{title:"Korean BBQ Beef Bowl",category:"Lunch",cal:380,protein:36,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["4 oz / 115g 96/4 lean ground beef","Korean sauce: 1 tbsp low-sodium soy sauce + 1 tsp gochujang (Korean chili paste) + 1 tsp sesame oil + 1 tsp honey + 2 garlic cloves minced + ½ tsp ginger grated","1 cup cooked cauliflower rice","Quick pickled cucumber: ½ cucumber sliced + 1 tbsp rice vinegar + pinch of salt + pinch of sugar","Sesame seeds + green onions to garnish","Optional: kimchi on the side"],metric:["115g 96/4 lean ground beef","Sauce: 15ml soy sauce + 5ml gochujang + 5ml sesame oil + 5ml honey + 2 garlic cloves + 2.5ml ginger","100g cauliflower rice","Quick pickle: ½ cucumber + 15ml rice vinegar + pinch salt + pinch sugar","Sesame seeds + green onions","Optional: kimchi"],boyfriend:{imperial:["8 oz / 225g 96/4 lean ground beef (doubled)","Korean sauce: 1½ tbsp low-sodium soy sauce + 2 tsp gochujang (extra heat) + 1½ tsp sesame oil + 1½ tsp honey + 2 garlic cloves minced + ½ tsp ginger grated","1 cup / 180g regular rice (not cauliflower)","Quick pickled cucumber: ½ cucumber sliced + 1 tbsp rice vinegar + pinch of salt + pinch of sugar","Sesame seeds + green onions to garnish","Optional: kimchi on the side"],metric:["225g 96/4 lean ground beef (doubled)","Sauce: 22ml soy sauce + 10ml gochujang (extra heat) + 7ml sesame oil + 7ml honey + 2 garlic cloves + 2.5ml ginger","180g regular rice","Quick pickle: ½ cucumber + 15ml rice vinegar + pinch salt + pinch sugar","Sesame seeds + green onions","Optional: kimchi"],cal:610,protein:50},steps:["Make the quick pickled cucumber first: slice cucumber thinly, toss with rice vinegar, a pinch of salt and sugar. Set aside — it's ready in 10 minutes.","Mix the Korean sauce ingredients in a small bowl.","Cook ground beef in a pan over medium-high heat until browned, 6–8 minutes. Break apart well.","Pour sauce over the beef. Stir and cook 2 more minutes until sauce caramelises slightly and everything is deeply flavoured.","Plate over cauliflower rice. Top with pickled cucumber, sesame seeds and green onions.","Add kimchi on the side if using — it's an excellent probiotic.","🌸 Gochujang adds depth and mild heat — the capsaicin in chili paste has been shown to boost metabolism and reduce inflammation. Keep to 1 tsp to control the heat level.","💡 This is one of the best lunchbox meals in the app — the Korean BBQ beef reheats in 90 seconds and the flavour actually intensifies overnight. Make a double batch Sunday.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — doubled beef, regular rice instead of cauliflower, extra gochujang for more heat."]},{title:"Cheeseburger Salad",category:"Lunch",cal:320,protein:35,time:"15 min",airfryer:false,pcos:"good",bloat:"low",imperial:["4 oz / 115g 96/4 lean ground beef","Salt, pepper, garlic powder, onion powder to taste","2 cups / 120g shredded iceberg lettuce","50g / 1.75 oz cherry tomatoes, halved","30g / 1 oz diced red onion","Dill pickles, sliced","10g / 0.35 oz American or cheddar cheese, shredded","Mustard vinaigrette: 1 tsp Dijon mustard + 1 tsp apple cider vinegar + 1 tsp olive oil + salt and pepper — whisked","Optional: crumbled turkey bacon"],metric:["115g 96/4 lean ground beef","Salt, pepper, garlic powder, onion powder","120g shredded iceberg lettuce","50g cherry tomatoes, halved","30g red onion, diced","Dill pickles, sliced","10g cheese, shredded","Mustard vinaigrette: 5ml Dijon + 5ml ACV + 5ml olive oil + seasoning","Optional: crumbled turkey bacon"],boyfriend:{imperial:["6 oz / 170g 96/4 lean ground beef","Salt, pepper, garlic powder, onion powder to taste","2 cups / 120g shredded iceberg lettuce","50g / 1.75 oz cherry tomatoes, halved","30g / 1 oz diced red onion","Dill pickles, sliced (extra)","20g / 0.7 oz American or cheddar cheese, shredded (doubled)","2 slices turkey bacon, cooked and crumbled (added)","Mustard vinaigrette: 1 tsp Dijon mustard + 1 tsp apple cider vinegar + 1 tsp olive oil + salt and pepper"],metric:["170g 96/4 lean ground beef","Salt, pepper, garlic powder, onion powder","120g shredded iceberg lettuce","50g cherry tomatoes, halved","30g red onion, diced","Dill pickles, sliced (extra)","20g cheese, shredded (doubled)","2 slices turkey bacon, crumbled (added)","Mustard vinaigrette: 5ml Dijon + 5ml ACV + 5ml olive oil + seasoning"],cal:480,protein:46},steps:["Season ground beef with salt, pepper, garlic powder and onion powder. Cook in a pan over medium-high heat 6–8 minutes until browned. Break into small crumbles — small pieces work better in a salad.","Make the mustard vinaigrette: whisk Dijon, apple cider vinegar, olive oil, salt and pepper together.","Build the salad: shredded iceberg as the base — the crunch is essential here.","Top with warm beef crumbles, cherry tomatoes, red onion, pickles and cheese.","Drizzle mustard vinaigrette over everything and toss lightly.","🌸 This is the Burger Bowl's lighter sibling — the mustard vinaigrette replaces the Greek yogurt burger sauce for even fewer calories. Iceberg lettuce is more hydrating and gentler on digestion than romaine. The apple cider vinegar in the dressing supports insulin sensitivity.","💡 The mustard vinaigrette is what makes this feel like a real burger rather than just a meat salad — it has that tangy, slightly sharp quality that cuts through the beef perfectly.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — 6 oz beef, double cheese, turkey bacon and extra pickles added."]},{title:"BBQ Turkey Meatball Bowl",category:"Lunch",cal:350,protein:38,time:"25 min",airfryer:true,pcos:"great",bloat:"low",imperial:["4 oz / 115g 96% lean ground turkey","1 garlic clove, minced","½ tsp smoked paprika + ½ tsp onion powder + salt and pepper","5g / 1 tsp breadcrumbs (optional binder)","2–3 tbsp / 30–45ml G-Hughes Sugar Free BBQ Sauce","1 cup / 75g coleslaw mix (shredded cabbage + carrots)","Coleslaw dressing: 2 tbsp / 30ml nonfat Greek yogurt + 1 tsp apple cider vinegar + ½ tsp honey + salt","1 cup cooked cauliflower rice"],metric:["115g 96% lean ground turkey","1 garlic clove, minced","Smoked paprika, onion powder, salt, pepper","5g breadcrumbs optional","30–45ml G-Hughes Sugar Free BBQ Sauce","75g coleslaw mix","Dressing: 30ml Greek yogurt + 5ml ACV + 2.5ml honey + salt","100g cauliflower rice"],steps:["Mix ground turkey with garlic, smoked paprika, onion powder, salt, pepper and breadcrumbs if using. Roll into 8–10 small meatballs.","Air fry at 400°F / 200°C for 12–14 minutes until golden and cooked through.","Make the Greek yogurt coleslaw: toss coleslaw mix with Greek yogurt, apple cider vinegar, honey and salt. Mix well and refrigerate while meatballs cook — it softens slightly and improves.","Microwave cauliflower rice 3 minutes.","Remove meatballs from air fryer. Toss immediately in BBQ sauce while hot — the heat helps the sauce caramelise and coat them.","Build the bowl: cauliflower rice base, then coleslaw alongside, then BBQ meatballs on top.","🌸 Ground turkey meatballs are the most PCOS-friendly version of this format — lower saturated fat than beef while hitting 38g protein. The Greek yogurt coleslaw adds probiotics and replaces mayo completely.","💡 This is an outstanding lunchbox meal — make 20 meatballs Sunday, refrigerate, reheat 2 minutes and toss in BBQ sauce fresh. Keeps 4 days. The coleslaw gets better on day 2."]},{title:"Sloppy Joe Bowl",category:"Dinner",cal:360,protein:36,time:"20 min",airfryer:false,pcos:"good",bloat:"low",imperial:["4 oz / 115g 96/4 lean ground beef","Sloppy Joe sauce: ½ cup / 120ml canned diced tomatoes + 1 tbsp / 15ml no-added-sugar ketchup + 1 tsp Worcestershire sauce + 1 tsp Dijon mustard + ½ tsp garlic powder + ½ tsp onion powder + salt and pepper","1 cup / 30g shredded iceberg or romaine lettuce","50g / 1.75 oz diced tomatoes","Optional: 10g / 0.35 oz shredded cheddar, dill pickles, diced red onion"],metric:["115g 96/4 lean ground beef","Sauce: 120ml canned diced tomatoes + 15ml no-sugar ketchup + 5ml Worcestershire + 5ml Dijon + garlic powder + onion powder + salt","30g shredded lettuce","50g diced tomatoes","Optional: 10g cheddar, pickles, red onion"],boyfriend:{imperial:["6 oz / 170g 96/4 lean ground beef","Sloppy Joe sauce: ½ cup / 120ml canned diced tomatoes + 1 tbsp / 15ml no-added-sugar ketchup + 1 tsp Worcestershire sauce + 1 tsp Dijon mustard + ½ tsp garlic powder + ½ tsp onion powder + salt and pepper","1 toasted whole wheat bun or ½ cup / 90g cooked rice (instead of lettuce base)","20g / 0.7 oz shredded cheddar, melted on top","Optional: dill pickles, diced red onion"],metric:["170g 96/4 lean ground beef","Sauce: 120ml canned diced tomatoes + 15ml no-sugar ketchup + 5ml Worcestershire + 5ml Dijon + garlic powder + onion powder + salt","1 toasted whole wheat bun or 90g cooked rice","20g shredded cheddar, melted on top","Optional: pickles, red onion"],cal:520,protein:46},steps:["Cook ground beef in a pan over medium-high heat until browned, 6–8 minutes. Break into small pieces.","Add all sauce ingredients: canned tomatoes, ketchup, Worcestershire, Dijon, garlic powder, onion powder, salt and pepper. Stir well.","Simmer 5–7 minutes until sauce thickens and becomes glossy. It should coat the beef and not be watery.","Serve over shredded lettuce instead of a bun — the lettuce wilts slightly under the hot meat which is actually delicious.","Top with diced tomatoes, optional cheese, pickles and red onion.","🌸 Worcestershire sauce is low calorie but very high in flavour — it gives that deep umami quality that makes Sloppy Joe taste like comfort food without any extra fat.","💡 This is the ultimate childhood comfort food made macro-friendly. Serve over lettuce and it genuinely doesn't need a bun — the saucy beef is satisfying on its own.","🔄 Sterling's version: his full ingredient list and macros are above under the 🏃 Sterling tab — served over a toasted whol
